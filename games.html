<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div style="padding: 20px; text-align: center;">
        <h2 style="color: var(--binance-yellow);">REWARD HUB</h2>
        <p style="color: var(--text-sub); font-size: 0.8rem;">Play to extract ABP Tokens</p>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px;">
        <div class="glass-card" onclick="playScratch()" style="margin:0">🎰 Scratch Card</div>
        <div class="glass-card" style="margin:0; opacity: 0.5;">🃏 Teen Patti</div>
        <div class="glass-card" style="margin:0; opacity: 0.5;">💣 Mines</div>
        <div class="glass-card" style="margin:0; opacity: 0.5;">🎡 Spin Wheel</div>
        <div class="glass-card" style="margin:0; opacity: 0.5;">🎟️ Lottery</div>
        <div class="glass-card" style="margin:0; opacity: 0.5;">❓ Quiz</div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item active"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="invite.html" class="nav-item"><span>🔗</span>Invite</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function playScratch() {
            const chance = Math.random() * 100;
            let reward = 0;
            
            // 2-3% users get 1500-2000 ABP, others get 1000-1200
            if(chance <= 3) {
                reward = Math.floor(Math.random() * (2000 - 1500 + 1)) + 1500;
                showNotification("JACKPOT! You found " + reward + " ABP");
            } else {
                reward = Math.floor(Math.random() * (1200 - 1000 + 1)) + 1000;
                showNotification("You won " + reward + " ABP");
            }
            
            userStats.balance += reward;
            saveToFirebase();
        }
    </script>
</body>
</html>
