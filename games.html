<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .game-card {
            background: linear-gradient(145deg, #1a2230, #000);
            border: 1px solid var(--border-dim); border-radius: 25px;
            padding: 15px; margin-bottom: 20px; display: flex; align-items: center;
            position: relative; overflow: hidden;
        }
        .game-img { width: 80px; height: 80px; border-radius: 15px; margin-right: 15px; object-fit: cover; }
        .badge-hot { 
            position: absolute; top: 10px; right: -25px; background: var(--neon-red);
            padding: 2px 30px; transform: rotate(45deg); font-size: 0.5rem; font-weight: bold;
        }
    </style>
</head>
<body onload="updateUI()">

    <div class="header-pro" style="padding: 20px 15px;">
        <h2 style="color: var(--binance-yellow);">GAMES ARENA</h2>
        <p style="color: var(--text-sub); font-size: 0.7rem;">MULTIPLY YOUR ASSETS IN REAL-TIME</p>
    </div>

    <div style="padding: 0 15px;">
        <div class="game-card" onclick="location.href='mines.html'">
            <div class="badge-hot">POPULAR</div>
            <img src="https://img.freepik.com/premium-photo/explosive-bomb-dark-background-generative-ai_1022461-1224.jpg" class="game-img">
            <div>
                <h3 style="margin: 0; color: var(--neon-blue);">CRYPTO MINES</h3>
                <p style="font-size: 0.6rem; color: var(--text-sub);">Avoid bombs, find diamonds. Up to 100x!</p>
            </div>
        </div>

        <div class="game-card" onclick="location.href='teenpatti.html'">
            <img src="https://img.freepik.com/free-vector/playing-card-background-design_1212-325.jpg" class="game-img">
            <div>
                <h3 style="margin: 0; color: var(--binance-yellow);">TEEN PATTI</h3>
                <p style="font-size: 0.6rem; color: var(--text-sub);">Pure luck and skill. Master the deck.</p>
            </div>
        </div>

        <div class="game-card" onclick="location.href='lottery.html'">
            <img src="https://img.freepik.com/free-vector/lucky-lottery-background-design_23-2148011244.jpg" class="game-img">
            <div>
                <h3 style="margin: 0; color: var(--neon-green);">GLOBAL JACKPOT</h3>
                <p style="font-size: 0.6rem; color: var(--text-sub);">Buy tickets, win the protocol pool.</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item active"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
