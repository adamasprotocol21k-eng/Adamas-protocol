<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Zone | ADAMAS Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --nav-bg: rgba(10, 11, 16, 0.8);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(112, 0, 255, 0.1), transparent);
        }

        .container { padding: 80px 20px 120px; max-width: 450px; margin: auto; text-align: center; }

        /* Balance Display */
        .balance-pill {
            position: fixed; top: 20px; right: 20px;
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--primary);
            padding: 8px 15px; border-radius: 50px; font-family: 'Orbitron';
            font-size: 0.8rem; backdrop-filter: blur(10px); z-index: 1000;
        }

        h1 { font-family: 'Orbitron'; font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 30px; }

        /* Game Cards */
        .game-list { display: grid; grid-template-columns: 1fr; gap: 15px; }

        .glass-card {
            background: var(--glass); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); text-align: left;
            text-decoration: none; color: white; transition: 0.3s;
            display: flex; align-items: center; gap: 20px;
            backdrop-filter: blur(10px);
        }

        .glass-card:hover { transform: scale(1.02); border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }

        .icon-box { font-size: 2rem; min-width: 50px; text-align: center; }

        .game-info h3 { margin: 0; font-family: 'Orbitron'; font-size: 0.95rem; color: var(--primary); }
        .game-info p { margin: 5px 0 0; font-size: 0.75rem; opacity: 0.6; }

        /* Navigation Dock */
        .dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--nav-bg); backdrop-filter: blur(25px);
            padding: 12px 25px; border-radius: 35px; display: flex; gap: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); z-index: 9999;
        }
        .dock-item {
            text-decoration: none; color: rgba(255, 255, 255, 0.4); font-size: 1.25rem;
            position: relative; transition: 0.4s; display: flex; flex-direction: column; align-items: center;
        }
        .dock-item span { font-size: 0.55rem; font-family: 'Orbitron'; position: absolute; bottom: -15px; opacity: 0; transition: 0.3s; color: var(--primary); letter-spacing: 1px; }
        .dock-item.active { color: var(--primary); transform: translateY(-5px); }
        .dock-item.active span { opacity: 1; transform: translateY(-3px); }
        .dock-item.active i { filter: drop-shadow(0 0 8px var(--primary)); }

    </style>
</head>
<body>

    <div class="balance-pill">
        <span id="gameBalance">0.00</span> <span style="color: var(--gold);">ABP</span>
    </div>

    <div class="container">
        <h1>GAMING <span style="color: var(--primary);">HUB</span></h1>
        
        <div class="game-list">
            <a href="mines.html" class="glass-card" style="border-left: 4px solid #ff0055;">
                <div class="icon-box">💣</div>
                <div class="game-info">
                    <h3>Mines Jackpot</h3>
                    <p>High Risk • Up to 25x Multiplier</p>
                </div>
            </a>

            <a href="scratch.html" class="glass-card" style="border-left: 4px solid var(--primary);">
                <div class="icon-box">✨</div>
                <div class="game-info">
                    <h3>Lucky Scratch</h3>
                    <p>Daily Free • Win up to 500 ABP</p>
                </div>
            </a>

            <a href="lottery.html" class="glass-card" style="border-left: 4px solid var(--gold);">
                <div class="icon-box">🎟️</div>
                <div class="game-info">
                    <h3>Mega Lottery</h3>
                    <p>Next Draw: 50,000 ABP Pool</p>
                </div>
            </a>

            <a href="teenpatti.html" class="glass-card" style="border-left: 4px solid #7000ff;">
                <div class="icon-box">🃏</div>
                <div class="game-info">
                    <h3>Teen Patti Royale</h3>
                    <p>Skill & Luck • Classic 3-Card Poker</p>
                </div>
            </a>
        </div>
    </div>

    <div class="dock">
        <a href="dashboard.html" class="dock-item">
            <i class="fas fa-th-large"></i>
            <span>HOME</span>
        </a>
        <a href="games.html" class="dock-item active">
            <i class="fas fa-gamepad"></i>
            <span>GAMES</span>
        </a>
        <a href="wallet.html" class="dock-item">
            <i class="fas fa-wallet"></i>
            <span>WALLET</span>
        </a>
        <a href="invite.html" class="dock-item">
            <i class="fas fa-users"></i>
            <span>FRIENDS</span>
        </a>
        <a href="profile.html" class="dock-item">
            <i class="fas fa-user-astronaut"></i>
            <span>USER</span>
        </a>
    </div>

    <script>
        // Update Balance Logic
        function updateBalance() {
            const balance = localStorage.getItem('lastBalance') || "0.00";
            document.getElementById('gameBalance').innerText = parseFloat(balance).toFixed(2);
        }

        window.onload = updateBalance;
        // Refresh balance if user wins something
        setInterval(updateBalance, 2000);
    </script>
</body>
</html>
