<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Zone | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-animation"></div>

    <div class="balance-pill">
        <span class="abp-balance-display">0</span> ABP
    </div>

    <div class="container" style="padding-top: 80px; text-align: center;">
        <h1 style="margin-bottom: 30px;">Choose Your <span style="color: var(--primary-neon);">Game</span></h1>
        
        <div style="display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 400px; margin: auto;">
            <div class="glass-card" onclick="window.location.href='mines.html'" style="cursor: pointer; transition: 0.3s; border-left: 5px solid #00f2ff;">
                <h3 style="margin:0;">💣 Mines Jackpot</h3>
                <p style="font-size: 0.7rem; opacity: 0.6; margin-top: 5px;">High Risk • Up to 25x Multiplier</p>
            </div>

            <div class="glass-card" onclick="window.location.href='teenpatti.html'" style="cursor: pointer; transition: 0.3s; border-left: 5px solid #ff0055;">
                <h3 style="margin:0;">🃏 Teen Patti Royale</h3>
                <p style="font-size: 0.7rem; opacity: 0.6; margin-top: 5px;">Skill & Luck • Classic 3-Card Poker</p>
            </div>

            <div class="glass-card" onclick="window.location.href='spin.html'" style="cursor: pointer; transition: 0.3s; border-left: 5px solid #ffcc00;">
                <h3 style="margin:0;">✨ Lucky Scratch</h3>
                <p style="font-size: 0.7rem; opacity: 0.6; margin-top: 5px;">Daily Free • Win up to 500 ABP</p>
            </div>
        </div>
        
        <button class="neon-btn" onclick="window.location.href='dashboard.html'" style="margin-top: 40px; font-size: 0.7rem;">Back to Dashboard</button>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
