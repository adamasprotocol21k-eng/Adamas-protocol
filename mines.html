<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS MINES | Play & Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --dark: #05060a; --glass: rgba(255, 255, 255, 0.05); --danger: #ff4444; --success: #00ff88; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
        
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 242, 255, 0.2); position: sticky; top: 0; z-index: 100; }
        
        .container { padding: 20px; max-width: 450px; margin: auto; text-align: center; }
        
        .game-stats { display: flex; justify-content: space-between; background: var(--glass); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .stat-box span { display: block; font-size: 0.6rem; color: var(--primary); font-family: 'Orbitron'; letter-spacing: 1px; }
        .stat-box strong { font-size: 1.1rem; font-family: 'Orbitron'; }

        /* Mines Grid */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 25px; }
        .tile { aspect-ratio: 1/1; background: rgba(255,255,255,0.08); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tile:hover { background: rgba(0, 242, 255, 0.1); transform: scale(1.05); }
        .tile.active { transform: rotateY(180deg); }
        
        .tile.revealed-diamond { background: rgba(0, 255, 136, 0.2); border-color: var(--success); color: var(--success); text-shadow: 0 0 10px var(--success); }
        .tile.revealed-bomb { background: rgba(255, 68, 68, 0.2); border-color: var(--danger); color: var(--danger); text-shadow: 0 0 10px var(--danger); }

        /* Controls */
        .controls { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .bet-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--primary); padding: 12px; border-radius: 12px; color: white; font-family: 'Orbitron'; text-align: center; margin-bottom: 15px; outline: none; transition: 0.3s; }
        .bet-input:disabled { opacity: 0.5; border-color: rgba(255,255,255,0.2); }
        
        .play-btn { width: 100%; padding: 16px; border-radius: 100px; border: none; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(112, 0, 255, 0.3); }
        .play-btn:active { transform: scale(0.95); }
        
        .cashout-btn { width: 100%; padding: 16px; border-radius: 100px; border: 2px solid var(--success); background: rgba(0, 255, 136, 0.1); color: var(--success); font-family: 'Orbitron'; font-weight: bold; margin-top: 10px; cursor: pointer; display: none; transition: 0.3s; }
        .cashout-btn:hover { background: var(--success); color: black; }
    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header">
        <a href="games.html" style="text-decoration:none; color:var(--primary); font-family:'Orbitron'; font-size:0.7rem;">← BACK</a>
        <div style="font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px;">ADAMAS <span style="color:var(--primary)">MINES</span></div>
        <div id="balanceDisplay" style="font-family: 'Orbitron'; font-size: 0.7rem; color: var(--success);">0.00 ABP</div>
    </div>

    <div class="container">
        <div class="game-stats">
            <div class="stat-box"><span>MULTIPLIER</span><strong id="multiplier">1.00x</strong></div>
            <div class="stat-box"><span>POTENTIAL</span><strong id="profit" style="color:var(--success)">0.00</strong></div>
        </div>

        <div class="mines-grid" id="grid"></div>

        <div class="controls">
            <input type="number" class="bet-input" id="betAmount" value="10" min="1" step="1">
            <button class="play-btn" id="startBtn" onclick="startGame()">START MISSION</button>
            <button class="cashout-btn" id="cashoutBtn" onclick="cashout()">CASHOUT</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, update, onValue, increment } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let userWallet = "", userShort = "";
        let currentBalance = 0;
        let mines = [], gameActive = false, currentMultiplier = 1.0;
        let betValue = 0, diamondsFound = 0;

        async function initGame() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) {
                    userWallet = accounts[0];
                    userShort = userWallet.substring(0, 10);
                    onValue(ref(db, 'users/' + userShort), (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            currentBalance = data.currentBalance || 0;
                            document.getElementById('balanceDisplay').innerText = currentBalance.toFixed(2) + " ABP";
                        }
                    });
                }
            }
            createGrid();
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerHTML = '<i class="fas fa-question" style="opacity:0.2; font-size:0.8rem"></i>';
                tile.onclick = () => revealTile(i, tile);
                grid.appendChild(tile);
            }
        }

        window.startGame = async () => {
            betValue = parseFloat(document.getElementById('betAmount').value);
            if (betValue > currentBalance || betValue <= 0 || isNaN(betValue)) {
                alert("Invalid Bet or Insufficient Balance!");
                return;
            }

            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.innerText = "LOCKED IN...";

            // Deduct Bet from Firebase
            await update(ref(db, 'users/' + userShort), { currentBalance: increment(-betValue) });

            gameActive = true;
            diamondsFound = 0;
            currentMultiplier = 1.0;
            document.getElementById('multiplier').innerText = "1.00x";
            document.getElementById('profit').innerText = "0.00";
            document.getElementById('betAmount').disabled = true;
            
            // Random Mines Setup (5 Bombs for better house edge)
            mines = Array(25).fill(false);
            let count = 0;
            while(count < 5) {
                let r = Math.floor(Math.random() * 25);
                if(!mines[r]) { mines[r] = true; count++; }
            }

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('cashoutBtn').style.display = 'block';
            createGrid();
        };

        window.revealTile = (index, element) => {
            if(!gameActive || element.classList.contains('revealed-diamond')) return;

            if(mines[index]) {
                // GAME OVER - BOOM
                gameActive = false;
                revealAllBombs();
                element.classList.add('revealed-bomb');
                element.innerHTML = '<i class="fas fa-bomb"></i>';
                
                setTimeout(() => {
                    alert("MISSION FAILED! You hit a mine.");
                    resetGame();
                }, 800);
            } else {
                // SUCCESS - DIAMOND
                diamondsFound++;
                element.classList.add('revealed-diamond');
                element.innerHTML = '<i class="fas fa-gem"></i>';
                
                // Real Multiplier Logic: 1.2x, 1.5x, 1.9x...
                currentMultiplier = 1 + (diamondsFound * 0.25); 
                document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x";
                document.getElementById('profit').innerText = (betValue * currentMultiplier).toFixed(2);
                
                if(diamondsFound === 20) cashout(); // Auto-win if all diamonds found
            }
        };

        function revealAllBombs() {
            const tiles = document.querySelectorAll('.tile');
            mines.forEach((isBomb, idx) => {
                if(isBomb) {
                    tiles[idx].classList.add('revealed-bomb');
                    tiles[idx].innerHTML = '<i class="fas fa-bomb"></i>';
                }
            });
        }

        window.cashout = async () => {
            if(!gameActive || diamondsFound === 0) return;
            gameActive = false;
            const winnings = betValue * currentMultiplier;
            
            await update(ref(db, 'users/' + userShort), { currentBalance: increment(winnings) });

            alert(`MISSION SUCCESS! +${winnings.toFixed(2)} ABP credited.`);
            resetGame();
        };

        function resetGame() {
            gameActive = false;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "START MISSION";
            document.getElementById('cashoutBtn').style.display = 'none';
            document.getElementById('betAmount').disabled = false;
            createGrid();
        }

        // Animated Space Background
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const starsGeo = new THREE.BufferGeometry();
        const posArray = new Float32Array(1500 * 3);
        for(let i=0; i<4500; i++) posArray[i] = (Math.random() - 0.5) * 10;
        starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({size: 0.005, color: 0x00f2ff}));
        scene.add(stars); camera.position.z = 2;
        function animate() { requestAnimationFrame(animate); stars.rotation.y += 0.001; renderer.render(scene, camera); }
        animate();

        window.onload = initGame;
    </script>
</body>
</html>
