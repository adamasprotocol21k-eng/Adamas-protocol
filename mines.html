<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines Game | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 20px auto;
        }
        .mine-cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .mine-cell:hover { background: rgba(0, 242, 255, 0.2); }
        .mine-cell.revealed { background: #1a1b26; cursor: default; }
        .mine-cell.diamond { color: var(--primary-neon); text-shadow: 0 0 10px var(--primary-neon); }
        .mine-cell.bomb { color: #ff4444; text-shadow: 0 0 10px #ff4444; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="balance-pill">
        <span class="abp-balance-display">0</span> ABP
    </div>

    <div class="container" style="padding-top: 80px; text-align: center;">
        <div class="glass-card" style="max-width: 500px; margin: auto;">
            <h2>Mines Jackpot</h2>
            
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <div>
                    <label style="font-size: 0.7rem; opacity: 0.6;">Bet Amount</label>
                    <input type="number" id="betAmount" value="50" style="width: 80px; background: #000; border: 1px solid var(--primary-neon); color: white; padding: 5px; border-radius: 5px;">
                </div>
                <div>
                    <label style="font-size: 0.7rem; opacity: 0.6;">Mines (1-24)</label>
                    <input type="number" id="minesCount" value="3" style="width: 60px; background: #000; border: 1px solid var(--primary-neon); color: white; padding: 5px; border-radius: 5px;">
                </div>
            </div>

            <div class="mines-grid" id="grid"></div>

            <div style="margin-top: 20px;">
                <button class="neon-btn" id="startBtn" onclick="startGame()">Start Game</button>
                <button class="neon-btn" id="cashoutBtn" onclick="cashout()" style="display:none; border-color: #00ff00; color: #00ff00;">Cashout (1.0x)</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let mines = [];
        let gameActive = false;
        let multiplier = 1.0;
        let revealedCount = 0;

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.dataset.index = i;
                cell.onclick = () => revealCell(i);
                grid.appendChild(cell);
            }
        }

        async function startGame() {
            const bet = parseInt(document.getElementById('betAmount').value);
            if (userData.abp_balance < bet) return alert("Not enough ABP!");

            await updateABP(bet, 'minus');
            
            const count = parseInt(document.getElementById('minesCount').value);
            mines = [];
            while(mines.length < count) {
                let r = Math.floor(Math.random() * 25);
                if(!mines.includes(r)) mines.push(r);
            }

            gameActive = true;
            revealedCount = 0;
            multiplier = 1.0;
            createGrid();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('cashoutBtn').style.display = 'inline-block';
            document.getElementById('cashoutBtn').innerText = `Cashout (${multiplier}x)`;
        }

        function revealCell(index) {
            if (!gameActive) return;
            const cell = document.querySelector(`[data-index="${index}"]`);
            if (cell.classList.contains('revealed')) return;

            cell.classList.add('revealed');
            if (mines.includes(index)) {
                cell.innerHTML = '💣';
                cell.classList.add('bomb');
                gameActive = false;
                setTimeout(() => { alert("Game Over! Better luck next time."); location.reload(); }, 500);
            } else {
                cell.innerHTML = '💎';
                cell.classList.add('diamond');
                revealedCount++;
                multiplier += (mines.length * 0.15);
                document.getElementById('cashoutBtn').innerText = `Cashout (${multiplier.toFixed(2)}x)`;
            }
        }

        async function cashout() {
            if (!gameActive) return;
            let win = Math.floor(document.getElementById('betAmount').value * multiplier);
            await updateABP(win, 'plus');
            alert(`You won ${win} ABP!`);
            location.reload();
        }

        createGrid();
    </script>
</body>
</html>
