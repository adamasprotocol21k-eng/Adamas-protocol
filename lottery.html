<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS LOTTERY | Win Big</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }

        .container { padding: 30px 20px 120px; max-width: 450px; margin: auto; text-align: center; }

        /* Jackpot Timer Card */
        .jackpot-card {
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.1), rgba(0, 242, 255, 0.1));
            border-radius: 30px; padding: 40px 20px; border: 1px solid var(--primary);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            margin-bottom: 30px; position: relative; overflow: hidden;
        }

        .timer {
            font-family: 'Orbitron'; font-size: 2.5rem; color: #fff;
            text-shadow: 0 0 20px var(--primary); margin: 15px 0;
        }

        .prize-pool {
            font-family: 'Orbitron'; font-size: 1.2rem; color: var(--gold);
            letter-spacing: 2px;
        }

        /* Ticket Buy Section */
        .ticket-box {
            background: var(--glass); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        .ticket-input {
            width: 80%; background: rgba(0,0,0,0.5); border: 1px solid var(--primary);
            padding: 12px; border-radius: 10px; color: white; font-family: 'Orbitron';
            text-align: center; font-size: 1.2rem; margin-bottom: 20px; outline: none;
        }

        .buy-btn {
            width: 100%; padding: 18px; border-radius: 100px; border: none;
            background: var(--primary); color: black; font-family: 'Orbitron';
            font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px var(--primary);
        }

        /* --- NEW: TICKET HISTORY SECTION --- */
        .my-tickets-section { text-align: left; margin-top: 30px; }
        .section-label { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--primary); margin-bottom: 15px; display: block; }
        
        .ticket-list { display: flex; flex-direction: column; gap: 10px; }
        .ticket-item {
            background: rgba(255,255,255,0.03); border: 1px dashed rgba(0, 242, 255, 0.3);
            padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .t-no { font-family: 'Orbitron'; color: var(--gold); font-size: 1.1rem; }
        .t-info { font-size: 0.7rem; opacity: 0.5; }

        /* Nav Dock (Corrected with Gaming Section) */
        .dock {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 11, 16, 0.85); backdrop-filter: blur(25px);
            padding: 12px 30px; border-radius: 100px; display: flex; gap: 25px;
            border: 1px solid rgba(0, 242, 255, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
        }
        .dock-item { text-decoration: none; font-size: 1.4rem; opacity: 0.4; transition: 0.4s; color: white; }
        .dock-item.active { opacity: 1; color: var(--primary); transform: scale(1.3) translateY(-5px); }

    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header">
        <a href="games.html" style="text-decoration:none; color:var(--primary);">← GAMES</a>
        <div style="font-family: 'Orbitron'; letter-spacing: 1px;">ADS <span style="color:var(--gold)">LOTTERY</span></div>
    </div>

    <div class="container">
        <div class="jackpot-card">
            <div style="font-size: 0.8rem; letter-spacing: 3px; opacity: 0.7;">NEXT DRAW IN</div>
            <div class="timer" id="timer">00:00:00</div>
            <div class="prize-pool">POOL: 50,000 ABP ✨</div>
        </div>

        <div class="ticket-box">
            <div style="font-family: 'Orbitron'; font-size: 0.7rem; margin-bottom: 15px; opacity: 0.6;">ENTER QUANTITY</div>
            <input type="number" class="ticket-input" id="ticketQty" value="1" min="1">
            <div style="font-size: 0.9rem; margin-bottom: 20px; opacity: 0.8;">Total: <span id="totalCost" style="color:var(--primary)">100</span> ABP</div>
            <button class="buy-btn" onclick="buyTickets()">BUY TICKETS</button>
        </div>

        <div class="my-tickets-section">
            <span class="section-label">YOUR TICKETS</span>
            <div id="ticketContainer" class="ticket-list">
                <div style="text-align: center; opacity: 0.3; font-size: 0.9rem;">No tickets found.</div>
            </div>
        </div>
    </div>

    <div class="dock">
        <a href="dashboard.html" class="dock-item">🏠</a>
        <a href="games.html" class="dock-item active">🎮</a>
        <a href="wallet.html" class="dock-item">💰</a>
        <a href="invite.html" class="dock-item">👥</a>
        <a href="profile.html" class="dock-item">👤</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Gold Particle Background
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(500 * 3);
        for(let i=0; i<1500; i++) posArray[i] = (Math.random()-0.5)*10;
        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.005, color: 0xffcc00 });
        const mesh = new THREE.Points(geometry, material);
        scene.add(mesh); camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); mesh.rotation.y += 0.0015; renderer.render(scene, camera); } animate();

        // 2. Ticket Purchase & Display Logic
        const input = document.getElementById('ticketQty');
        const costText = document.getElementById('totalCost');
        
        input.addEventListener('input', () => { costText.innerText = input.value * 100; });

        function loadTickets() {
            const container = document.getElementById('ticketContainer');
            const tickets = JSON.parse(localStorage.getItem('myLotteryTickets') || "[]");
            
            if(tickets.length > 0) {
                container.innerHTML = tickets.map(t => `
                    <div class="ticket-item">
                        <div>
                            <div class="t-no">#${t.id}</div>
                            <div class="t-info">Purchased: ${t.date}</div>
                        </div>
                        <div style="color: #00ff88; font-size: 0.7rem; font-weight: bold;">ACTIVE</div>
                    </div>
                `).join('');
            }
        }

        function buyTickets() {
            const qty = parseInt(input.value);
            const total = qty * 100;
            let balance = parseFloat(localStorage.getItem('lastBalance') || "0");

            if(total > balance) {
                alert("Insufficient Balance! Mine more ABP.");
                return;
            }

            // Deduct Balance
            balance -= total;
            localStorage.setItem('lastBalance', balance);

            // Generate & Save Tickets
            const tickets = JSON.parse(localStorage.getItem('myLotteryTickets') || "[]");
            for(let i=0; i < qty; i++) {
                tickets.unshift({
                    id: Math.floor(100000 + Math.random() * 900000),
                    date: new Date().toLocaleDateString()
                });
            }
            localStorage.setItem('myLotteryTickets', JSON.stringify(tickets));

            alert(`Success! ${qty} Tickets added to your wallet. 🚀`);
            loadTickets();
        }

        // 3. Timer
        function updateTimer() {
            let now = new Date();
            let hours = 23 - now.getHours();
            let mins = 59 - now.getMinutes();
            let secs = 59 - now.getSeconds();
            document.getElementById('timer').innerText = 
                `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        setInterval(updateTimer, 1000);
        
        window.onload = () => { updateTimer(); loadTickets(); };
    </script>
</body>
</html>
