<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Lottery | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .timer-box {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        .time-unit {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--primary-neon);
            padding: 10px;
            border-radius: 10px;
            min-width: 60px;
        }
        .ticket-card {
            background: linear-gradient(45deg, #1a1b26, #2a2b36);
            border-left: 5px solid var(--primary-neon);
            padding: 15px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
        }
        .prize-distribution {
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="balance-pill">
        <span class="abp-balance-display">0</span> ABP
    </div>

    <div class="container" style="padding-top: 80px; text-align: center;">
        <div class="glass-card" style="max-width: 600px; margin: auto;">
            <h1 style="color: var(--primary-neon);">GRAND LOTTERY</h1>
            <p>Next Draw In:</p>
            
            <div class="timer-box" id="lottery-timer">
                <div class="time-unit"><div id="days">14</div><small>Days</small></div>
                <div class="time-unit"><div id="hours">23</div><small>Hrs</small></div>
                <div class="time-unit"><div id="mins">59</div><small>Mins</small></div>
            </div>

            <div style="margin: 30px 0; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 15px;">
                <h3>Current Prize Pool: <span id="prize-pool" style="color: #00ff00;">500,000</span> ABP</h3>
                <div class="prize-distribution">
                    <span>🏆 Winners: 90%</span>
                    <span>🏢 Platform Fee: 10%</span>
                </div>
            </div>

            <button class="neon-btn" onclick="buyTicket()" style="width: 100%; margin-bottom: 20px;">Buy Ticket (500 ABP)</button>
            
            <div style="text-align: left;">
                <h4 style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">Your Tickets</h4>
                <div id="my-tickets-list">
                    <p id="no-tickets" style="opacity: 0.5; font-size: 0.8rem;">You haven't bought any tickets yet.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // 1. Countdown Timer Logic
        function updateTimer() {
            // Static example for now, can be synced with Firebase Timestamp
            let d = document.getElementById('days');
            let h = document.getElementById('hours');
            let m = document.getElementById('mins');
            
            // Basic decrement logic
            if(parseInt(m.innerText) > 0) m.innerText = parseInt(m.innerText) - 1;
        }
        setInterval(updateTimer, 60000);

        // 2. Buy Ticket Logic
        async function buyTicket() {
            const ticketPrice = 500;
            if(userData.abp_balance < ticketPrice) return alert("Not enough ABP for a ticket!");

            await updateABP(ticketPrice, 'minus');

            // Generate 10-digit random ticket number
            const ticketNum = Math.floor(1000000000 + Math.random() * 9000000000);
            
            // Add to UI
            const list = document.getElementById('my-tickets-list');
            const noTick = document.getElementById('no-tickets');
            if(noTick) noTick.remove();

            const div = document.createElement('div');
            div.className = 'ticket-card';
            div.innerHTML = `
                <span style="letter-spacing: 2px; font-family: monospace;">#${ticketNum}</span>
                <span style="font-size: 0.7rem; color: var(--primary-neon);">ACTIVE</span>
            `;
            list.appendChild(div);

            // Update Prize Pool (Add 90% of ticket price to pool)
            const poolEl = document.getElementById('prize-pool');
            let currentPool = parseInt(poolEl.innerText.replace(/,/g, ''));
            poolEl.innerText = (currentPool + (ticketPrice * 0.9)).toLocaleString();

            alert("Ticket Purchased! Good luck for the draw.");
        }
    </script>
</body>
</html>
