<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS LOTTERY | Win Big</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --dark: #05060a; --glass: rgba(255, 255, 255, 0.05); --gold: #ffcc00; --nav-bg: rgba(10, 11, 16, 0.85); }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
        
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 242, 255, 0.2); position: sticky; top: 0; z-index: 100; }
        
        .container { padding: 30px 20px 150px; max-width: 450px; margin: auto; text-align: center; }
        
        /* Jackpot Card */
        .jackpot-card { background: linear-gradient(135deg, rgba(112, 0, 255, 0.1), rgba(0, 242, 255, 0.1)); border-radius: 30px; padding: 40px 20px; border: 1px solid var(--primary); box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); margin-bottom: 30px; position: relative; overflow: hidden; animation: pulse 3s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); } 50% { box-shadow: 0 0 40px rgba(0, 242, 255, 0.4); } 100% { box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); } }
        
        .timer { font-family: 'Orbitron'; font-size: 2.2rem; color: #fff; text-shadow: 0 0 20px var(--primary); margin: 15px 0; }
        .prize-pool { font-family: 'Orbitron'; font-size: 1rem; color: var(--gold); letter-spacing: 2px; }

        /* Ticket Input Section */
        .ticket-box { background: var(--glass); border-radius: 25px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); margin-bottom: 20px; }
        .ticket-input { width: 80%; background: rgba(0,0,0,0.5); border: 1px solid var(--primary); padding: 12px; border-radius: 15px; color: white; font-family: 'Orbitron'; text-align: center; font-size: 1.2rem; margin-bottom: 20px; outline: none; transition: 0.3s; }
        .ticket-input:focus { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        
        .buy-btn { width: 100%; padding: 18px; border-radius: 100px; border: none; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3); }
        .buy-btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        .buy-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Tickets List */
        .my-tickets-section { text-align: left; margin-top: 30px; }
        .section-label { font-family: 'Orbitron'; font-size: 0.75rem; color: var(--primary); margin-bottom: 15px; display: block; letter-spacing: 1px; }
        .ticket-list { display: flex; flex-direction: column; gap: 12px; }
        .ticket-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .ticket-item:hover { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }
        .t-no { font-family: 'Orbitron'; color: var(--gold); font-size: 1rem; }
        .t-info { font-size: 0.65rem; opacity: 0.5; margin-top: 4px; }

        /* Navigation Dock */
        .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--nav-bg); backdrop-filter: blur(25px); padding: 12px 25px; border-radius: 35px; display: flex; gap: 25px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); z-index: 1000; }
        .dock-item { text-decoration: none; color: rgba(255, 255, 255, 0.4); font-size: 1.2rem; transition: 0.4s; display: flex; flex-direction: column; align-items: center; position: relative; }
        .dock-item span { font-size: 0.55rem; font-family: 'Orbitron'; margin-top: 5px; opacity: 0; transition: 0.3s; color: var(--primary); letter-spacing: 1px; }
        .dock-item.active { color: var(--primary); transform: translateY(-5px); }
        .dock-item.active span { opacity: 1; }
    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header">
        <a href="games.html" style="text-decoration:none; color:var(--primary); font-size: 0.7rem; font-family: 'Orbitron';">
            <i class="fas fa-chevron-left"></i> BACK
        </a>
        <div style="font-family: 'Orbitron'; letter-spacing: 1px; font-size: 0.9rem;">ADAMAS <span style="color:var(--gold)">LOTTERY</span></div>
        <div id="balanceDisplay" style="font-family: 'Orbitron'; font-size: 0.7rem; color: var(--primary);">0.00 ABP</div>
    </div>

    <div class="container">
        <div class="jackpot-card">
            <div style="font-size: 0.7rem; letter-spacing: 3px; opacity: 0.7; font-family: 'Orbitron';">NEXT DRAW IN</div>
            <div class="timer" id="timer">00:00:00</div>
            <div class="prize-pool">POOL: 50,000 ABP ✨</div>
        </div>

        <div class="ticket-box">
            <div style="font-family: 'Orbitron'; font-size: 0.65rem; margin-bottom: 15px; opacity: 0.6; letter-spacing: 1px;">ENTER QUANTITY (100 ABP / Ticket)</div>
            <input type="number" class="ticket-input" id="ticketQty" value="1" min="1" max="100">
            <div style="font-size: 0.9rem; margin-bottom: 20px; font-family: 'Orbitron';">Total: <span id="totalCost" style="color:var(--gold)">100</span> ABP</div>
            <button class="buy-btn" id="buyBtn">BUY TICKETS</button>
        </div>

        <div class="my-tickets-section">
            <span class="section-label">YOUR ACTIVE TICKETS</span>
            <div id="ticketContainer" class="ticket-list">
                <div style="text-align: center; opacity: 0.3; font-size: 0.8rem; padding: 20px;">Fetching tickets...</div>
            </div>
        </div>
    </div>

    <div class="dock">
        <a href="dashboard.html" class="dock-item">
            <i class="fas fa-th-large"></i><span>HOME</span>
        </a>
        <a href="games.html" class="dock-item active">
            <i class="fas fa-gamepad"></i><span>GAMES</span>
        </a>
        <a href="wallet.html" class="dock-item">
            <i class="fas fa-wallet"></i><span>WALLET</span>
        </a>
        <a href="invite.html" class="dock-item">
            <i class="fas fa-users"></i><span>FRIENDS</span>
        </a>
        <a href="profile.html" class="dock-item">
            <i class="fas fa-user-astronaut"></i><span>USER</span>
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, update, onValue, push, set, increment } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let userWallet = "";
        let currentBalance = 0;
        let userShort = "";

        async function initLottery() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) {
                    userWallet = accounts[0];
                    userShort = userWallet.substring(0, 10);
                    
                    onValue(ref(db, 'users/' + userShort), (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            currentBalance = data.currentBalance || 0;
                            document.getElementById('balanceDisplay').innerText = Math.floor(currentBalance).toLocaleString() + " ABP";
                            renderTickets(data.lotteryTickets);
                        }
                    });
                } else { window.location.href = 'index.html'; }
            }
        }

        function renderTickets(ticketsObj) {
            const container = document.getElementById('ticketContainer');
            if(!ticketsObj) {
                container.innerHTML = `<div style="text-align: center; opacity: 0.3; font-size: 0.8rem; padding: 20px;">No active tickets. Get your first one!</div>`;
                return;
            }

            const tickets = Object.values(ticketsObj).reverse();
            container.innerHTML = tickets.map(t => `
                <div class="ticket-item">
                    <div>
                        <div class="t-no">#${t.id}</div>
                        <div class="t-info"><i class="far fa-clock"></i> ${t.date}</div>
                    </div>
                    <div style="color: #00ff88; font-size: 0.6rem; font-weight: bold; font-family: 'Orbitron';">
                         ACTIVE <i class="fas fa-check-circle"></i>
                    </div>
                </div>
            `).join('');
        }

        window.buyTickets = async () => {
            const qtyInput = document.getElementById('ticketQty');
            const qty = parseInt(qtyInput.value);
            const totalCost = qty * 1000;

            if(isNaN(qty) || qty < 1) return alert("Enter valid quantity!");
            if(totalCost > currentBalance) return alert("Insufficient ABP Balance!");

            const btn = document.getElementById('buyBtn');
            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            try {
                const userRef = ref(db, 'users/' + userShort);
                const ticketRef = ref(db, 'users/' + userShort + '/lotteryTickets');

                // Update balance using increment (negative for deduction)
                await update(userRef, { currentBalance: increment(-totalCost) });

                // Add Tickets
                for(let i=0; i<qty; i++) {
                    const newTicket = push(ticketRef);
                    await set(newTicket, {
                        id: Math.floor(100000 + Math.random() * 900000),
                        date: new Date().toLocaleDateString('en-GB') + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                    });
                }
                alert(`🚀 Success! You bought ${qty} tickets.`);
            } catch (e) {
                console.error(e);
                alert("Transaction failed! Try again.");
            } finally {
                btn.disabled = false;
                btn.innerText = "BUY TICKETS";
            }
        };

        // UI Listeners
        document.getElementById('ticketQty').addEventListener('input', (e) => {
            let val = parseInt(e.target.value);
            if(val > 1000) e.target.value = 1000;
            document.getElementById('totalCost').innerText = (e.target.value || 0) * 1000;
        });

        document.getElementById('buyBtn').onclick = window.buyTickets;

        // Timer
        setInterval(() => {
            let now = new Date();
            let h = 23 - now.getHours();
            let m = 59 - now.getMinutes();
            let s = 59 - now.getSeconds();
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);

        // Three.js Gold Dust Background
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 1500;
        const posArray = new Float32Array(starsCount * 3);
        for(let i=0; i<starsCount*3; i++) posArray[i] = (Math.random() - 0.5) * 10;
        starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({size: 0.005, color: 0xffcc00}));
        scene.add(stars); camera.position.z = 2;
        function animate() { requestAnimationFrame(animate); stars.rotation.y += 0.001; renderer.render(scene, camera); } animate();

        window.onload = initLottery;
    </script>
</body>
</html>
