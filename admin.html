<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | ADAMAS Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --danger: #ff4444; --success: #00ff88; --dark: #05060a; --glass: rgba(255, 255, 255, 0.05); --gold: #ffcc00; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; min-height: 100vh; background: radial-gradient(circle at top right, #0a0b14, #05060a); }
        
        .container { padding: 40px 20px; max-width: 900px; margin: auto; }
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 25px; backdrop-filter: blur(15px); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h1, h3 { font-family: 'Orbitron'; letter-spacing: 2px; }
        .neon-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 14px 20px; border-radius: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.75rem; transition: 0.3s; width: 100%; font-weight: bold; letter-spacing: 1px; }
        .neon-btn:hover { background: var(--primary); color: black; box-shadow: 0 0 25px var(--primary); transform: translateY(-2px); }
        .neon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center; }
        .stat-item { padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .stat-item small { font-size: 0.65rem; color: var(--primary); text-transform: uppercase; font-family: 'Orbitron'; opacity: 0.8; }
        .stat-item h2 { margin: 10px 0 0 0; font-family: 'Orbitron'; font-size: 1.5rem; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        input { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #333; padding: 15px; border-radius: 12px; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; font-family: 'Orbitron'; font-size: 0.8rem; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        #resultBox { display: none; animation: slideUp 0.4s ease; border-left: 4px solid var(--primary); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        pre { background: #000; padding: 15px; border-radius: 10px; font-size: 0.85rem; color: var(--success); overflow-x: auto; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <h1 style="margin: 0;">ADAMAS <span style="color: var(--primary);">HQ</span></h1>
            <div id="adminStatus" style="font-size: 0.7rem; font-family: 'Orbitron'; color: var(--success);">
                <i class="fas fa-shield-alt"></i> SECURE CONNECTION
            </div>
        </div>
        
        <div class="glass-card">
            <h3 style="font-size: 0.9rem; margin-bottom: 25px; opacity: 0.8;"><i class="fas fa-database"></i> PROTOCOL OVERVIEW</h3>
            <div class="stat-grid">
                <div class="stat-item"><small>Nodes (Users)</small><h2 id="stat-users">0</h2></div>
                <div class="stat-item"><small>Lottery Pool</small><h2 id="stat-pool" style="color: var(--gold);">0</h2></div>
                <div class="stat-item"><small>Admin Revenue</small><h2 id="stat-share" style="color: var(--success);">0</h2></div>
            </div>
        </div>

        <div class="control-grid">
            <div class="glass-card">
                <h3 style="font-size: 1rem;">DRAW PROTOCOL</h3>
                <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 25px;">Execute a decentralized draw to select the jackpot winner.</p>
                <button class="neon-btn" style="border-color: var(--success); color: var(--success);" id="drawBtn">
                    <i class="fas fa-trophy"></i> EXECUTE DRAW
                </button>
            </div>

            <div class="glass-card">
                <h3 style="font-size: 1rem;">MEMBER SEARCH</h3>
                <input type="text" id="targetWallet" placeholder="WALLET PREFIX (0x...)">
                <button class="neon-btn" id="checkBtn">
                    <i class="fas fa-search"></i> FETCH DATA
                </button>
            </div>
        </div>

        <div id="resultBox" class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="resultTitle" style="font-size: 0.9rem; margin: 0;">QUERY RESULT</h3>
                <i class="fas fa-times" style="cursor: pointer; opacity: 0.5;" onclick="this.parentElement.parentElement.style.display='none'"></i>
            </div>
            <pre id="resultData"></pre>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CRITICAL SECURITY: ONLY YOUR WALLET CAN ACCESS ---
        const AUTHORIZED_ADMIN = "0x6DbC17D995"; // Pehle 10 characters

        async function verifyAdmin() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                const user = accounts[0] || "";
                if (!user.toLowerCase().startsWith(AUTHORIZED_ADMIN.toLowerCase())) {
                    document.body.innerHTML = `
                        <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; color:red; font-family:'Orbitron';">
                            <i class="fas fa-user-shield" style="font-size:4rem; margin-bottom:20px;"></i>
                            <h1>403 - UNAUTHORIZED ACCESS</h1>
                            <p style="color:white; opacity:0.6;">Admin wallet signature required.</p>
                        </div>
                    `;
                }
            } else {
                alert("Please connect Metamask");
            }
        }

        // Live Stats Sync
        onValue(ref(db, 'users'), (snapshot) => {
            const users = snapshot.val();
            if (users) {
                const userKeys = Object.keys(users);
                document.getElementById('stat-users').innerText = userKeys.length;
                
                let totalTickets = 0;
                let totalRev = 0;
                userKeys.forEach(u => {
                    if(users[u].lotteryTickets) totalTickets += Object.keys(users[u].lotteryTickets).length;
                    // Example Revenue Calculation (10% of balance as mock data)
                    totalRev += (users[u].currentBalance || 0) * 0.01; 
                });
                
                document.getElementById('stat-pool').innerText = (totalTickets * 100).toLocaleString() + " ABP";
                document.getElementById('stat-share').innerText = totalRev.toFixed(2) + " ABP";
            }
        });

        // Draw Logic
        document.getElementById('drawBtn').onclick = async () => {
            const btn = document.getElementById('drawBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> CALCULATING...`;

            try {
                const snapshot = await get(ref(db, 'users'));
                const users = snapshot.val();
                let allTickets = [];

                Object.keys(users).forEach(u => {
                    if(users[u].lotteryTickets) {
                        Object.keys(users[u].lotteryTickets).forEach(tId => {
                            allTickets.push({ wallet: u, ticket: users[u].lotteryTickets[tId] });
                        });
                    }
                });

                if(allTickets.length === 0) {
                    alert("Zero active tickets in pool.");
                } else {
                    const winner = allTickets[Math.floor(Math.random() * allTickets.length)];
                    document.getElementById('resultBox').style.display = 'block';
                    document.getElementById('resultTitle').innerText = "WINNER DRAWN SUCCESS! 🎉";
                    document.getElementById('resultData').innerText = `WALLET: ${winner.wallet}\nTICKET_ID: ${winner.ticket.id}\nPOOL_SHARE: 100%`;
                }
            } catch (e) {
                alert("Draw failed: " + e.message);
            }
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-trophy"></i> EXECUTE DRAW`;
        };

        // User Check
        document.getElementById('checkBtn').onclick = async () => {
            const wallet = document.getElementById('targetWallet').value.trim();
            if(!wallet) return;
            
            const snapshot = await get(ref(db, 'users/' + wallet));
            if(snapshot.exists()) {
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('resultTitle').innerText = `DATA FOR: ${wallet}`;
                document.getElementById('resultData').innerText = JSON.stringify(snapshot.val(), null, 2);
            } else {
                alert("No node found with this address.");
            }
        };

        window.onload = verifyAdmin;
    </script>
</body>
</html>
