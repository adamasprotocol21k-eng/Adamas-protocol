<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-card { border-left: 4px solid var(--neon-red); margin-bottom: 20px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: var(--text-sub); margin-bottom: 5px; text-transform: uppercase; }
        .status-badge { background: var(--neon-red); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.6rem; float: right; }
    </style>
</head>
<body onload="checkAdminAuth()">

    <div class="header-pro">
        <span class="status-badge">ROOT ACCESS</span>
        <h2 style="color: var(--neon-red);">MASTER CONTROL</h2>
        <p style="font-size: 0.7rem; color: var(--text-sub);">GLOBAL PROTOCOL MANAGEMENT</p>
    </div>

    <div id="adminContent" style="padding: 0 15px; display: none;">
        
        <div class="glass-card admin-card">
            <h4>📢 Global News Ticker</h4>
            <div class="control-group" style="margin-top:10px;">
                <label>Ticker Message</label>
                <input type="text" id="newTickerMsg" placeholder="Enter new alert...">
            </div>
            <button class="btn-neon" style="border-color: var(--neon-blue); color: var(--neon-blue);" onclick="updateGlobalTicker()">UPDATE TICKER</button>
        </div>

        <div class="glass-card admin-card" style="border-color: var(--binance-yellow);">
            <h4>🎟️ Lottery Management</h4>
            <div class="control-group" style="margin-top:10px;">
                <label>Jackpot Prize Pool (ABP)</label>
                <input type="number" id="newPool" placeholder="e.g. 100000">
            </div>
            <button class="btn-neon" style="border-color: var(--binance-yellow); color: var(--binance-yellow);" onclick="updateJackpot()">UPDATE POOL</button>
        </div>

        <div class="glass-card admin-card" style="border-color: var(--neon-green);">
            <h4>💰 Economy Boost</h4>
            <div class="control-group">
                <label>Reward Multiplier</label>
                <select id="rewardRate" style="width:100%; background:#2b2f36; color:white; padding:10px; border-radius:10px;">
                    <option value="1.0">1.0x (Normal)</option>
                    <option value="1.5">1.5x (Boost)</option>
                    <option value="2.0">2.0x (Double)</option>
                </select>
            </div>
            <button class="btn-neon" style="border-color: var(--neon-green); color: var(--neon-green);" onclick="updateEconomy()">SET MULTIPLIER</button>
        </div>

    </div>

    <div id="denied" style="text-align: center; padding: 50px; display: none;">
        <h1 style="font-size: 5rem;">🚫</h1>
        <h2>ACCESS DENIED</h2>
        <p>This terminal is restricted to the Protocol Architect.</p>
        <button class="btn-neon" onclick="location.href='dashboard.html'">GO BACK</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        const MASTER_WALLET = "0x6DbC17D9950e0b3A7627ec6bFc6b210A998da690";

        function checkAdminAuth() {
            const userWallet = localStorage.getItem('adamas_wallet');
            if(userWallet === MASTER_WALLET) {
                document.getElementById('adminContent').style.display = 'block';
            } else {
                document.getElementById('denied').style.display = 'block';
            }
        }

        function updateGlobalTicker() {
            const msg = document.getElementById('newTickerMsg').value;
            if(!msg) return;
            db.ref('settings/ticker').set(msg);
            alert("Ticker Updated Globally!");
        }

        function updateJackpot() {
            const val = document.getElementById('newPool').value;
            if(!val) return;
            db.ref('settings/lotteryPool').set(val);
            alert("Jackpot Updated!");
        }

        function updateEconomy() {
            const rate = document.getElementById('rewardRate').value;
            db.ref('settings/multiplier').set(rate);
            alert("Economy Rate Updated to " + rate + "x");
        }
    </script>
</body>
</html>
