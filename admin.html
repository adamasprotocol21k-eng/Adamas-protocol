<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-animation"></div>

    <div class="container" style="padding-top: 50px;">
        <h1 style="text-align: center; color: #ff4444;">Admin <span style="color: white;">Dashboard</span></h1>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px;">
            <div class="glass-card">
                <h3>Lottery Management</h3>
                <p style="font-size: 0.8rem; opacity: 0.6;">Pick a random winner from the database.</p>
                <button class="neon-btn" style="width:100%; border-color: #00ff00; color: #00ff00;" onclick="drawWinner()">Draw Winner Now</button>
            </div>

            <div class="glass-card">
                <h3>User Management</h3>
                <input type="text" id="targetWallet" placeholder="User Wallet Address" style="width:100%; background: #000; border: 1px solid #333; color: white; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
                <button class="neon-btn" style="width:100%;" onclick="checkUser()">Check User Stats</button>
            </div>
        </div>

        <div class="glass-card" style="margin-top: 20px;">
            <h3>Platform Statistics</h3>
            <div style="display: flex; justify-content: space-around; padding: 20px;">
                <div><small>Total Users</small><h2 id="stat-users">--</h2></div>
                <div><small>Total ABP Burned</small><h2 id="stat-burn" style="color: #ff4444;">--</h2></div>
                <div><small>Company Share</small><h2 id="stat-share" style="color: #00ff00;">--</h2></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>

                return alert("Access Denied! You are not the admin.");
            }
            // Logic to pick a winner from Firebase
            alert("Winner selection process started...");
        }
    </script>
</body>
</html>
