<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn ABP | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-animation"></div>

    <div class="balance-pill">
        <span class="abp-balance-display">0</span> ABP
    </div>

    <div class="container" style="padding-top: 80px; text-align: center;">
        <h2 style="margin-bottom: 10px;">Extra Rewards</h2>
        <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 30px;">Complete simple tasks to boost your balance.</p>

        <div style="max-width: 500px; margin: auto;">
            <div class="glass-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 15px;">
                <div style="text-align: left;">
                    <h4 style="margin: 0;">Follow on Twitter</h4>
                    <small style="color: var(--primary-neon);">+200 ABP</small>
                </div>
                <button class="neon-btn" style="padding: 5px 15px; font-size: 0.7rem;" onclick="doTask('twitter', 200)">Go</button>
            </div>

            <div class="glass-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 15px;">
                <div style="text-align: left;">
                    <h4 style="margin: 0;">Join Telegram Channel</h4>
                    <small style="color: var(--primary-neon);">+300 ABP</small>
                </div>
                <button class="neon-btn" style="padding: 5px 15px; font-size: 0.7rem;" onclick="doTask('telegram', 300)">Go</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function doTask(platform, reward) {
            const link = platform === 'twitter' ? 'https://twitter.com/DiamoProtocol' : 'https://t.me/daimodmo';
            window.open(link, '_blank');
            
            // Logic: Rewards only once per user
            alert(`Verifying task... ${reward} ABP will be added to your account.`);
            await updateABP(reward, 'plus');
        }
    </script>
</body>
</html>
