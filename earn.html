<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn | Adamas Protocol</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="updateUI()">

    <div style="padding: 20px;">
        <h2 style="color: #F3BA2F; margin: 0;">MINING MISSIONS</h2>
        <p style="color: #848e9c; font-size: 0.75rem;">Complete tasks to unlock more ABP rewards.</p>
    </div>

    <div style="padding: 0 15px;">
        <div class="glass-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div>
                <b style="font-size: 0.9rem;">Join Telegram Fleet</b><br>
                <small style="color: #00ff88;">+50 ABP Tokens</small>
            </div>
            <button class="btn-neon" style="width: auto; padding: 5px 15px;" onclick="doSocialTask('tg', 'https://t.me/ADSProtocol')">JOIN</button>
        </div>

        <div class="glass-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div>
                <b style="font-size: 0.9rem;">Follow X Protocol</b><br>
                <small style="color: #00ff88;">+50 ABP Tokens</small>
            </div>
            <button class="btn-neon" style="width: auto; padding: 5px 15px;" onclick="doSocialTask('x', 'https://x.com/DiamoProtocol')">FOLLOW</button>
        </div>

        <div class="glass-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div>
                <b style="font-size: 0.9rem;">Promote Adamas</b><br>
                <small style="color: #00ff88;">+100 ABP Tokens</small>
            </div>
            <button class="btn-neon" style="width: auto; padding: 5px 15px;" onclick="doSocialTask('share', '#')">SHARE</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item active"><span>⛏️</span>Earn</a>
        <a href="invite.html" class="nav-item"><span>🔗</span>Invite</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function doSocialTask(platform, link) {
            if(link !== '#') window.open(link, '_blank');
            showNotification(`${platform.toUpperCase()} Task Verified!`);
            
            // Add Reward
            userStats.balance += 50;
            saveToFirebase();
        }
    </script>
</body>
</html>
