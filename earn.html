<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .day-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; }
        .day-box { 
            background: var(--glass); border: 1px solid var(--border-dim); 
            padding: 15px 5px; border-radius: 15px; text-align: center; font-size: 0.7rem;
        }
        .day-box.active { border-color: var(--neon-green); color: var(--neon-green); }
        .task-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--glass); padding: 15px; border-radius: 15px; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div style="padding: 20px;">
        <h3 style="color: var(--binance-yellow);">DAILY EXTRACTION</h3>
        <div class="day-grid" id="checkInGrid">
            </div>
        <button class="btn-neon" id="claimBtn" onclick="claimDaily()">CLAIM TODAY'S REWARD</button>
    </div>

    <div style="padding: 0 20px;">
        <h4>SOCIAL MISSIONS</h4>
        <div class="task-row">
            <div><b>Telegram</b><br><small>+50 ABP</small></div>
            <button class="btn-neon" style="width:auto; padding:5px 15px;" onclick="doSocialTask('tg')">JOIN</button>
        </div>
        <div class="task-row">
            <div><b>Twitter (X)</b><br><small>+50 ABP</small></div>
            <button class="btn-neon" style="width:auto; padding:5px 15px;" onclick="doSocialTask('x')">FOLLOW</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item active"><span>⛏️</span>Earn</a>
        <a href="invite.html" class="nav-item"><span>🔗</span>Invite</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function claimDaily() {
            // Logic: Check last claim date, add reward, update Firebase
            showNotification("Day Claimed! +100 ABP");
            userStats.balance += 100;
            saveToFirebase();
        }
        function doSocialTask(type) {
            window.open(type === 'tg' ? 'https://t.me/ADSProtocol' : 'https://x.com/DiamoProtocol', '_blank');
            showNotification("Task Registered!");
        }
    </script>
</body>
</html>
