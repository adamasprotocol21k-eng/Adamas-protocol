<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn ABP | Adamas Protocol</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="initMining()">

    <div class="header" style="padding: 20px; text-align: center;">
        <h2 style="color: var(--neon-blue);">EARNING ENGINE</h2>
        <p style="font-size: 0.8rem; opacity: 0.7;">Active Proof of Work (ABP)</p>
    </div>

    <div class="card" style="text-align: center; background: radial-gradient(circle, #1c2128, #0d1117);">
        <div id="miningStatus" style="color: #8b949e; font-size: 0.9rem; margin-bottom: 10px;">System: Idle</div>
        <h1 id="livePoints" style="font-size: 2.5rem; margin: 10px 0; color: var(--neon-blue);">0.00</h1>
        <p style="font-size: 0.8rem; margin-bottom: 20px;">Mining Power: 1.0x (Standard)</p>
        <button id="mineBtn" class="btn-neon" style="width: 80%; padding: 15px;" onclick="toggleMining()">Start Mining</button>
    </div>

    <div class="card">
        <h4>Daily Lab Tasks</h4>
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #30363d;">
            <span>Daily Check-in</span>
            <button class="btn-neon" style="font-size: 10px; padding: 5px 10px;" onclick="claimDaily()">Claim</button>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
            <span>Knowledge Quiz</span>
            <button class="btn-neon" style="font-size: 10px; padding: 5px 10px;" onclick="alert('Quiz Loading...')">Solve</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html">🏠<br>Home</a>
        <a href="earn.html" class="active">⛏️<br>Earn</a>
        <a href="stake.html">🔐<br>Stake</a>
        <a href="refer.html">👥<br>Refer</a>
        <a href="wallet.html">💰<br>Wallet</a>
    </nav>

    <script src="js/app.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
