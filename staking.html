<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staking Vault | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .staking-card { text-align: center; padding: 30px; border: 1px solid var(--primary-neon); margin-bottom: 20px; }
        .lock-timer { color: var(--error); font-size: 0.7rem; margin-top: 10px; display: none; }
        .stat-row { display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.75rem; color: #888; }
        .input-stake { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; margin: 15px 0; text-align: center; }
    </style>
</head>
<body>
    <div class="universe-bg"></div>
    <div style="padding: 20px; padding-bottom: 100px;">
        <header style="display: flex; align-items: center; gap: 15px;">
            <button onclick="window.location.href='dashboard.html'" class="btn-cosmic" style="padding: 5px 15px;">←</button>
            <h1 class="title-font" style="font-size: 1rem; color: var(--gold);">STAKING VAULT</h1>
        </header>

        <div class="glass-card staking-card" style="margin-top: 20px;">
            <div style="font-size: 0.6rem; color: var(--primary-neon); letter-spacing: 2px;">TOTAL STAKED</div>
            <div class="val" id="stakedAmount" style="font-size: 2rem; margin: 10px 0;">0.00</div>
            <div class="stat-row">
                <span>Daily Reward:</span>
                <span id="dailyReward" style="color: #00ff88;">+0.00 ABP</span>
            </div>
        </div>

        <div class="glass-card">
            <input type="number" id="stakeInput" class="input-stake" placeholder="Enter ABP Amount">
            <button class="btn-cosmic" style="width: 100%;" onclick="StakingModule.stake()">STAKE NOW</button>
            <div id="lockMessage" class="lock-timer">⚠️ SECURITY LOCK: Active for 24 Days</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
            <button class="btn-cosmic btn-gold" style="font-size: 0.7rem;" onclick="StakingModule.claim()">CLAIM REWARD</button>
            <button class="btn-cosmic" style="font-size: 0.7rem; border-color: #ff3366; color: #ff3366;" onclick="StakingModule.unstake()">UNSTAKE ALL</button>
        </div>
    </div>

    <div id="navbar-placeholder"></div>
    <script src="js/notify.js"></script>
    <script src="js/database.js" type="module"></script>
    <script src="js/staking-logic.js" type="module"></script>
    <script src="js/nav.js"></script>
</body>
</html>
