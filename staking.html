<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staking Vault | ADAMAS PROTOCOL</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">ADAMAS <span>PROTOCOL</span></div>
            <nav class="nav-menu">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="staking.html" class="active">Staking</a>
                <a href="games.html">Games</a>
                <a href="wallet.html">Wallet</a>
            </nav>
            <button id="connectBtn" class="neon-btn">CONNECT WALLET</button>
        </div>
    </header>

    <main class="staking-container">
        <div class="page-header">
            <h1 class="neon-text">ABP STAKING VAULT</h1>
            <p>Stake your ABP to earn passive rewards. Beware of the 24-day lock on every 3rd claim.</p>
        </div>

        <div class="staking-grid">
            <div class="glass-card">
                <h3>Deposit ABP</h3>
                <div class="input-group">
                    <input type="number" id="stakeInput" placeholder="Min 500 ABP">
                    <button id="stakeConfirmBtn" class="btn-main">STAKE NOW</button>
                </div>
                <p class="small-info">Estimated APY: <span class="neon-blue">144%</span></p>
            </div>

            <div class="glass-card">
                <h3>Your Rewards</h3>
                <div class="reward-box">
                    <span class="label">Pending ABP:</span>
                    <h2 id="pendingRewards" class="neon-gold">0.00</h2>
                </div>
                <div class="stats-mini">
                    <span>Claims Done: <b id="claimCountText">0/3</b></span>
                    <span id="lockStatus" class="status-badge">Unlocked</span>
                </div>
                
                <div id="countdownBox" style="display: none; color: #ff4d4d; margin: 10px 0;">
                    Lock Ends in: <span id="timerDisplay">24d 00h 00m</span>
                </div>

                <button id="claimRewardBtn" class="btn-neon" style="width: 100%;">CLAIM REWARDS</button>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/staking.js"></script>
</body>
</html>
