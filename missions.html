<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Mission Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00f2ff; 
            --cyan-glow: rgba(0, 242, 255, 0.4); 
            --gold: #ffcc00;
            --p-green: #adff2f; 
            --glass: rgba(255, 255, 255, 0.05); 
        }

        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .mission-wrapper { min-height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; width: 100%; max-width: 440px; margin: 0 auto; padding-bottom: 120px; }

        /* --- ARCADE GRID --- */
        .arcade-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .game-item {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; text-align: center; transition: 0.3s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .game-item:active { transform: scale(0.95); }
        .game-icon-svg { width: 50px; height: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--cyan)); }
        .game-label { font-family: 'Orbitron'; font-size: 8px; color: #fff; letter-spacing: 1px; }

        /* --- DIAMOND HUNT SECTION --- */
        #mines-sec { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 25px; padding: 20px; position: relative; overflow: hidden;
            transition: all 0.5s ease;
        }
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; display: none; }
        .mine-tile { 
            aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; 
            justify-content: center; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }
        .mine-tile:active { transform: scale(0.9); }
        .mine-tile.revealed { background: rgba(0, 242, 255, 0.1); border-color: var(--cyan); }

        /* --- OVERLAY STYLES --- */
        .game-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .game-window {
            width: 90%; max-width: 400px; background: #050505; border: 1.5px solid var(--cyan);
            border-radius: 30px; padding: 20px; text-align: center; box-shadow: 0 0 40px var(--cyan-glow); position: relative;
        }

        .header-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 18px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status-pill { background: var(--cyan); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-size: 10px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .status-pill:active { transform: scale(0.95); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #111; z-index: 100; }
        .nav-item { text-decoration: none; color: #444; font-size: 9px; font-family: 'Orbitron'; text-align: center; }
        .nav-item.active { color: var(--cyan); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .live-win { color: var(--p-green); font-family: 'Orbitron'; font-size: 12px; margin-top: 10px; animation: pulse 1s infinite; }
    </style>
</head>
<body>

    <div id="game-overlay" class="game-overlay">
        <div class="game-window">
            <span onclick="closeGame()" style="position:absolute; top: -40px; right: 0; color: #555; font-family:'Orbitron'; cursor:pointer; font-size: 10px;">[×] TERMINATE_SESSION</span>
            <h2 id="overlay-title" style="font-family:'Orbitron'; color:#fff; font-size: 12px; margin-bottom: 15px;">MODULE</h2>
            
            <div id="crash-box" style="display:none;">
                <canvas id="crash-canvas" width="300" height="180" style="background:#000; border-radius:15px;"></canvas>
                <div id="crash-multiplier" style="font-size: 40px; font-family:'Orbitron'; color:var(--gold); margin-top: -110px; position: relative; z-index: 5;">1.00x</div>
            </div>

            <div id="spin-sync-box" style="display:none; margin: 20px 0;">
                <svg width="200" height="200" viewBox="0 0 200 200" id="wheel-svg" style="transition: transform 4s cubic-bezier(0.15, 0, 0.1, 1);">
                    <circle cx="100" cy="100" r="95" fill="none" stroke="#111" stroke-width="10"/>
                    <path d="M100,100 L100,5 A95,95 0 0,1 195,100 Z" fill="#ff3b3b"/>
                    <path d="M100,100 L195,100 A95,95 0 0,1 100,195 Z" fill="#00f2ff"/>
                    <path d="M100,100 L100,195 A95,95 0 0,1 5,100 Z" fill="#ffcc00"/>
                    <path d="M100,100 L5,100 A95,95 0 0,1 100,5 Z" fill="#adff2f"/>
                </svg>
            </div>
            
            <div id="bet-container" style="margin-top: 70px;">
                <div class="bet-box" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:15px; margin-bottom:15px;">
                    <span style="font-size: 9px; font-family:'Orbitron'; color:#666;">BET: </span>
                    <input type="number" id="bet-amount" value="50" style="background:transparent; border:none; color:var(--cyan); font-family:'Orbitron'; text-align:center; width:60px;">
                    <span style="font-size: 9px; font-family:'Orbitron'; color:var(--cyan);">ABP</span>
                </div>
                <button id="main-game-btn" class="status-pill" style="width: 100%;">INITIALIZE</button>
            </div>
        </div>
    </div>

    <div class="mission-wrapper">
        <header class="header-card">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:35px; height:35px; border-radius:50%; border:1px solid var(--cyan); display:flex; align-items:center; justify-content:center; background:rgba(0,242,255,0.1);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--cyan)"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <div>
                    <span style="font-size: 8px; color: #555; font-family: 'Orbitron';">LIVE_VAULT</span>
                    <span id="header-balance" style="display:block; color:#fff; font-family:'Orbitron'; font-size: 1.1rem; font-weight: 900;">0.00</span>
                </div>
            </div>
            <div id="streak-badge" style="color: var(--p-green); border: 1px solid rgba(173, 255, 47, 0.2); font-size: 8px; padding: 6px 12px; border-radius: 20px; font-family: 'Orbitron';">STREAK: 1</div>
        </header>

        <h2 style="font-family: 'Orbitron'; font-size: 10px; color: var(--gold); margin-bottom: 15px;">🎰 QUANTUM_ARCADE</h2>
        <div class="arcade-grid">
            <div class="game-item" onclick="openCrash()">
                <svg class="game-icon-svg" viewBox="0 0 24 24" fill="var(--cyan)"><path d="M21 16v2L13 13v5L16 21V23L12 22L8 23V21L11 18V13L3 18V16L11 8L8 4H12L14 4L11 8L21 16Z"/></svg>
                <div class="game-label">CRASH</div>
            </div>
            <div class="game-item" onclick="openSpinSync()">
                <svg class="game-icon-svg" viewBox="0 0 24 24" fill="var(--gold)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 7h2v5h-2zm0 6h2v2h-2z"/></svg>
                <div class="game-label">SPIN</div>
            </div>
        </div>

        <section id="mines-sec">
            <div id="mines-intro" style="text-align:center;">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="var(--p-green)" style="margin-bottom:10px;"><path d="M12.14 2.14L3.07 11.21L12.14 20.28L21.21 11.21L12.14 2.14ZM12.14 6.38L16.97 11.21L12.14 16.04L7.31 11.21L12.14 6.38Z"/></svg>
                <h3 style="font-family:'Orbitron'; font-size:12px; margin:0;">DIAMOND_HUNT_V2</h3>
                <p style="font-size:9px; color:#666;">Multi-node decryption protocol</p>
                <button class="status-pill" onclick="initMines()" style="margin-top:10px; width:100%;">START DECRYPTION (50 ABP)</button>
            </div>

            <div id="mines-grid" class="mines-grid"></div>
            
            <div id="mines-controls" style="display:none; text-align:center;">
                <div class="live-win" id="mines-live-reward">PROFIT: 0 ABP</div>
                <button class="status-pill" style="background:var(--p-green); width:100%; margin-top:10px;" onclick="cashoutMines()">SECURE EARNINGS</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠<br>HOME</a>
            <a href="vault.html" class="nav-item">🔒<br>VAULT</a>
            <a href="missions.html" class="nav-item active">⚡<br>TASKS</a>
            <a href="referral.html" class="nav-item">👥<br>NETWORK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        const userWallet = localStorage.getItem('adamas_user');
        const userRef = db.ref('users/' + userWallet);
        let currentBalance = 0;

        function formatABP(val) {
            if (val >= 1e6) return (val / 1e6).toFixed(2) + 'M';
            if (val >= 1e3) return (val / 1e3).toFixed(1) + 'K';
            return parseFloat(val).toFixed(2);
        }

        userRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                currentBalance = data.balance || 0;
                document.getElementById('header-balance').innerText = formatABP(currentBalance);
                document.getElementById('streak-badge').innerText = "STREAK: " + (data.streak || 1);
            }
        });

        // --- DIAMOND HUNT (EMBEDDED) ---
        let mineNodes = []; let minesActive = false; let gemsFound = 0;
        async function initMines() {
            if(currentBalance < 50) return alert("Low Balance!");
            
            // Deduct immediately
            await userRef.update({ balance: firebase.database.ServerValue.increment(-50) });
            
            document.getElementById('mines-intro').style.display = 'none';
            const grid = document.getElementById('mines-grid');
            grid.style.display = 'grid';
            grid.innerHTML = '';
            document.getElementById('mines-controls').style.display = 'block';
            
            mineNodes = Array(25).fill('💎');
            for(let i=0; i<4; i++) {
                let r = Math.floor(Math.random()*25);
                mineNodes[r] = '💣';
            }
            
            gemsFound = 0; minesActive = true;
            updateMinesProfit();

            for(let i=0; i<25; i++) {
                const tile = document.createElement('div');
                tile.className = 'mine-tile';
                tile.onclick = () => revealTile(tile, i);
                grid.appendChild(tile);
            }
        }

        async function revealTile(el, idx) {
            if(!minesActive || el.classList.contains('revealed')) return;
            el.classList.add('revealed');
            
            if(mineNodes[idx] === '💣') {
                el.innerText = '💣';
                el.style.background = 'red';
                minesActive = false;
                setTimeout(() => {
                    alert("NODE CRITICAL: Assets Lost");
                    resetMinesUI();
                }, 500);
            } else {
                el.innerText = '💎';
                gemsFound++;
                updateMinesProfit();
            }
        }

        function updateMinesProfit() {
            const profit = gemsFound * 25;
            document.getElementById('mines-live-reward').innerText = `PROFIT: ${profit} ABP`;
        }

        async function cashoutMines() {
            if(!minesActive || gemsFound === 0) return;
            const win = gemsFound * 25;
            await userRef.update({ balance: firebase.database.ServerValue.increment(win) });
            minesActive = false;
            alert(`SUCCESS: +${win} ABP Secured`);
            resetMinesUI();
        }

        function resetMinesUI() {
            document.getElementById('mines-intro').style.display = 'block';
            document.getElementById('mines-grid').style.display = 'none';
            document.getElementById('mines-controls').style.display = 'none';
        }

        // --- CRASH ---
        let crashInterval; let mult = 1.00; let isFlying = false;
        const canvas = document.getElementById('crash-canvas');
        const ctx = canvas.getContext('2d');

        function openCrash() {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('overlay-title').innerText = "CRASH_PROTOCOL";
            document.getElementById('crash-box').style.display = 'block';
            document.getElementById('spin-sync-box').style.display = 'none';
            document.getElementById('main-game-btn').innerText = "INITIALIZE";
            document.getElementById('main-game-btn').onclick = () => startCrash();
            mult = 1.00;
            ctx.clearRect(0,0,300,180);
        }

        async function startCrash() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            if(currentBalance < bet) return alert("Low Balance!");
            
            await userRef.update({ balance: firebase.database.ServerValue.increment(-bet) });
            isFlying = true;
            document.getElementById('main-game-btn').innerText = "CASH OUT";
            document.getElementById('main-game-btn').onclick = () => cashoutCrash(bet);
            
            const crashPoint = Math.random() < 0.1 ? 1.00 : (1 + Math.random() * 5);
            
            crashInterval = setInterval(() => {
                mult += 0.01 * (mult * 1.1);
                document.getElementById('crash-multiplier').innerText = mult.toFixed(2) + "x";
                if(mult >= crashPoint) {
                    clearInterval(crashInterval);
                    isFlying = false;
                    document.getElementById('crash-multiplier').innerText = "CRASHED";
                    document.getElementById('main-game-btn').innerText = "RETRY";
                    document.getElementById('main-game-btn').onclick = () => openCrash();
                }
            }, 100);
        }

        async function cashoutCrash(bet) {
            if(!isFlying) return;
            clearInterval(crashInterval);
            isFlying = false;
            const win = Math.floor(bet * mult);
            await userRef.update({ balance: firebase.database.ServerValue.increment(win) });
            alert(`VAULTED: +${win} ABP`);
            closeGame();
        }

        // --- SPIN SYNC ---
        function openSpinSync() {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('overlay-title').innerText = "SPIN_SYNC";
            document.getElementById('spin-sync-box').style.display = 'block';
            document.getElementById('crash-box').style.display = 'none';
            document.getElementById('main-game-btn').innerText = "SPIN (100 ABP)";
            document.getElementById('main-game-btn').onclick = () => spin();
        }

        async function spin() {
            if(currentBalance < 100) return alert("Low Balance!");
            await userRef.update({ balance: firebase.database.ServerValue.increment(-100) });
            
            const deg = 1800 + Math.floor(Math.random() * 360);
            document.getElementById('wheel-svg').style.transform = `rotate(${deg}deg)`;
            
            setTimeout(async () => {
                const win = 200; // Simplified for logic
                await userRef.update({ balance: firebase.database.ServerValue.increment(win) });
                alert("SYNCED: +200 ABP");
                closeGame();
            }, 4000);
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            clearInterval(crashInterval);
            isFlying = false;
        }
    </script>
</body>
</html>
