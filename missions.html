<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Missions</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Styles for Missions & Game */
        .mission-card {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px; border-radius: 18px; margin-bottom: 12px;
        }

        .status-pill {
            background: var(--cyan); color: #000; border: none;
            padding: 8px 15px; border-radius: 8px; font-size: 10px;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            min-width: 80px; transition: 0.3s;
        }

        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .mine-tile { 
            aspect-ratio: 1; background: rgba(255, 255, 255, 0.05); border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.1); display: flex; 
            align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer;
        }
        .mine-tile.revealed { pointer-events: none; }
        .mine-tile.win { background: rgba(173, 255, 47, 0.15); border-color: var(--p-green); color: var(--p-green); }
        .mine-tile.loss { background: rgba(255, 51, 102, 0.15); border-color: #ff3366; color: #ff3366; }
    </style>
</head>
<body>

    <div class="mission-wrapper">
        <header class="premium-card" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span style="font-size: 9px; color: #666; letter-spacing: 1px; font-family: 'Orbitron';">AVAILABLE ABP</span>
                <span id="header-balance" style="display:block; color:#fff; font-family:'Orbitron'; font-size: 1.2rem; font-weight: 900;">0.00</span>
            </div>
            <div style="background: rgba(173, 255, 47, 0.1); color: var(--p-green); border: 1px solid var(--p-green); font-size: 9px; padding: 4px 8px; border-radius: 5px; font-family: 'Orbitron';">● HUB ONLINE</div>
        </header>

        <h2 style="font-family: 'Orbitron'; font-size: 11px; color: #fff; margin: 20px 0 15px 0; letter-spacing: 2px;">⚡ DAILY MISSIONS</h2>
        
        <div id="mission-list">
            <div class="mission-card">
                <div>
                    <h4 style="font-size: 12px; color: #fff; margin: 0;">Join ADS Channel</h4>
                    <p style="font-size: 9px; color: #666; margin-top: 4px;">+100 ABP REWARD</p>
                </div>
                <button class="status-pill" id="btn-t1" onclick="handleMission('t1', 'https://t.me/ADSProtocol', 100)">START</button>
            </div>
            <div class="mission-card">
                <div>
                    <h4 style="font-size: 12px; color: #fff; margin: 0;">Join Community</h4>
                    <p style="font-size: 9px; color: #666; margin-top: 4px;">+100 ABP REWARD</p>
                </div>
                <button class="status-pill" id="btn-t2" onclick="handleMission('t2', 'https://t.me/adsprotocolcommunity', 100)">START</button>
            </div>
            <div class="mission-card">
                <div>
                    <h4 style="font-size: 12px; color: #fff; margin: 0;">Follow Diamo X</h4>
                    <p style="font-size: 9px; color: #666; margin-top: 4px;">+150 ABP REWARD</p>
                </div>
                <button class="status-pill" id="btn-t3" onclick="handleMission('t3', 'https://x.com/DiamoProtocol', 150)">START</button>
            </div>
            <div class="mission-card">
                <div>
                    <h4 style="font-size: 12px; color: #fff; margin: 0;">Follow Adamas X</h4>
                    <p style="font-size: 9px; color: #666; margin-top: 4px;">+150 ABP REWARD</p>
                </div>
                <button class="status-pill" id="btn-t4" onclick="handleMission('t4', 'https://x.com/AdamasADS', 150)">START</button>
            </div>
        </div>

        <section class="game-section" style="margin-top: 30px;">
            <h2 style="font-family: 'Orbitron'; font-size: 11px; color: var(--cyan); letter-spacing: 2px;">💎 DIAMOND HUNT</h2>
            <div class="premium-card">
                <div id="mines-grid" class="mines-grid"></div>
                <button id="mine-start-btn" class="btn-primary" onclick="initMines()">INITIALIZE HUNT (50 ABP)</button>
                <div id="game-controls" style="display:none; gap: 10px;">
                    <button class="btn-primary" style="background: var(--p-green); color: #000;" onclick="cashout()">CASHOUT</button>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠 HOME</a>
            <a href="missions.html" class="nav-item active">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        const userWallet = localStorage.getItem('adamas_user');
        if (!userWallet) window.location.href = "index.html";
        const userRef = db.ref('users/' + userWallet);

        function formatABP(num) {
            if (num >= 1000000000) return (num / 1000000000).toFixed(2) + 'B';
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return parseFloat(num).toFixed(2);
        }

        userRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('header-balance').innerText = formatABP(data.balance || 0);
                
                const today = new Date().toDateString();
                if(data.lastMissionDate !== today) {
                    userRef.update({ lastMissionDate: today, completedMissions: {} });
                }

                if(data.completedMissions) {
                    Object.keys(data.completedMissions).forEach(mId => {
                        const btn = document.getElementById('btn-' + mId);
                        if(btn) {
                            btn.innerText = "DONE";
                            btn.disabled = true;
                            btn.style.background = "#222";
                            btn.style.color = "#666";
                        }
                    });
                }
            }
        });

        async function handleMission(mId, link, reward) {
            window.open(link, '_blank');
            const btn = document.getElementById('btn-' + mId);
            btn.innerText = "VERIFYING...";
            btn.disabled = true;
            
            setTimeout(async () => {
                try {
                    await userRef.update({
                        balance: firebase.database.ServerValue.increment(reward)
                    });
                    await userRef.child('completedMissions').child(mId).set(true);
                } catch(e) { 
                    console.error(e); 
                    btn.innerText = "START";
                    btn.disabled = false;
                }
            }, 5000);
        }

        // Diamond Hunt Logic
        let mines = [];
        let gameActive = false;
        let diamondsFound = 0;

        async function initMines() {
            const snap = await userRef.child('balance').get();
            const currentBal = snap.val() || 0;
            if(currentBal < 50) { alert("Insufficient ABP! Need 50 ABP to start."); return; }

            const grid = document.getElementById('mines-grid');
            grid.innerHTML = '';
            gameActive = true;
            diamondsFound = 0;
            
            // Generate Grid
            mines = Array(25).fill('💎');
            let mCount = 0;
            while(mCount < 5) {
                let r = Math.floor(Math.random() * 25);
                if(mines[r] !== '💣') { mines[r] = '💣'; mCount++; }
            }

            for(let i=0; i<25; i++) {
                const tile = document.createElement('div');
                tile.className = 'mine-tile';
                tile.onclick = () => revealTile(tile, i);
                grid.appendChild(tile);
            }
            document.getElementById('mine-start-btn').style.display = 'none';
            document.getElementById('game-controls').style.display = 'flex';
        }

        async function revealTile(el, idx) {
            if(!gameActive || el.classList.contains('revealed')) return;
            el.classList.add('revealed');
            
            if(mines[idx] === '💣') {
                el.innerText = '💣'; el.classList.add('loss');
                gameActive = false;
                // Instant deduction on hit
                await userRef.update({ balance: firebase.database.ServerValue.increment(-50) });
                alert('CRASH! -50 ABP lost.');
                setTimeout(resetGame, 1000);
            } else {
                el.innerText = '💎'; el.classList.add('win');
                diamondsFound++;
            }
        }

        async function cashout() {
            if(diamondsFound === 0) return;
            const reward = diamondsFound * 15;
            await userRef.update({ balance: firebase.database.ServerValue.increment(reward) });
            alert(`SUCCESS! +${reward} ABP extracted.`);
            resetGame();
        }

        function resetGame() {
            gameActive = false;
            document.getElementById('mine-start-btn').style.display = 'block';
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('mines-grid').innerHTML = '';
        }
    </script>
</body>
</html>
