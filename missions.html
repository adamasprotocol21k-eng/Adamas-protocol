<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Mission Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --bg: #000; --card: rgba(255, 255, 255, 0.03); --border: rgba(0, 242, 255, 0.2); --neon-green: #00ff88; --neon-red: #ff4444; }
        body { background-color: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        .mission-wrapper { padding: 20px; }
        
        /* Glassmorphism Header */
        .mission-header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            padding: 15px; border-radius: 15px; border: 1px solid var(--border); 
            margin-bottom: 20px; position: sticky; top: 10px; z-index: 100;
        }

        .energy-bar { width: 100px; height: 6px; background: #111; border-radius: 10px; overflow: hidden; margin-top: 5px; border: 1px solid #222; }
        .energy-fill { height: 100%; background: linear-gradient(90deg, #ff8800, #ffcc00); transition: width 0.3s; box-shadow: 0 0 10px #ff8800; }
        .mult-val { display: block; font-size: 22px; font-family: 'Orbitron'; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        .section-title { font-family: 'Orbitron'; font-size: 12px; margin: 25px 0 15px; color: #555; letter-spacing: 2px; text-transform: uppercase; }

        /* PREMIUM MISSION BUTTON */
        .premium-mission-btn {
            background: linear-gradient(90deg, #00f2ff, #0066ff);
            padding: 20px; border-radius: 15px; text-align: center;
            position: relative; cursor: pointer; overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3); transition: 0.3s;
        }
        .premium-mission-btn:active { transform: scale(0.96); }
        .btn-text { font-family: 'Orbitron'; font-weight: bold; font-size: 16px; color: #000; display: block; }
        .btn-subtext { font-size: 10px; color: rgba(0,0,0,0.7); font-weight: bold; margin-top: 2px; display: block; }

        /* CASINO GRID STYLES */
        .casino-container {
            background: var(--card); border: 1px solid var(--border);
            padding: 15px; border-radius: 20px; margin-top: 10px;
        }
        .casino-stats { display: flex; justify-content: space-between; margin-bottom: 12px; font-family: 'Orbitron'; font-size: 10px; color: #888; }
        .chicken-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .casino-tile { 
            aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s;
        }
        .casino-tile:hover { background: rgba(0, 242, 255, 0.05); border-color: var(--cyan); }
        .tile-win { background: rgba(0, 255, 136, 0.15) !important; border-color: var(--neon-green) !important; box-shadow: inset 0 0 10px var(--neon-green); }
        .tile-loss { background: rgba(255, 68, 68, 0.15) !important; border-color: var(--neon-red) !important; box-shadow: inset 0 0 10px var(--neon-red); }

        /* TERMINAL OVERLAY */
        .mission-terminal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 2000; padding: 20px;
            display: none; flex-direction: column;
        }
        .terminal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .close-term { background: var(--neon-red); color: #fff; border: none; padding: 5px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .scroll-container { flex: 1; overflow-y: auto; margin-top: 20px; padding-bottom: 50px; }

        .task-card { 
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .task-done { opacity: 0.4; border-left: 3px solid var(--neon-green); }

        .btn-cashout {
            width: 100%; margin-top: 15px; padding: 15px; background: var(--neon-green);
            color: #000; border: none; border-radius: 12px; font-weight: bold;
            font-family: 'Orbitron'; cursor: pointer; display: none;
        }

        /* Bottom Nav Sync */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 18px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { text-decoration: none; color: #444; font-size: 10px; font-weight: bold; font-family: 'Orbitron'; }
        .nav-item.active { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
    </style>
</head>
<body>

    <div class="mission-wrapper">
        <header class="mission-header">
            <div>
                <span style="font-size: 10px; color: #555;">CORE ENERGY</span>
                <div class="energy-bar"><div id="energy-fill" class="energy-fill" style="width: 100%;"></div></div>
                <span id="energy-val" style="font-size: 10px; color: var(--cyan);">100/100</span>
            </div>
            <div class="multiplier-badge" style="text-align: right;">
                <span style="font-size: 10px; color: #555;">ACTIVE BOOST</span>
                <span id="active-multiplier" class="mult-val">1.0x</span>
            </div>
        </header>

        <section class="mission-section">
            <h2 class="section-title">⚡ PROTOCOL TASKS</h2>
            <div class="premium-mission-btn" onclick="toggleMissionList()">
                <div class="btn-glow"></div>
                <span class="btn-text">OPEN MISSION TERMINAL</span>
                <span class="btn-subtext">50+ DYNAMIC MISSIONS SYNCED</span>
            </div>
        </section>

        <section class="mission-section">
            <h2 class="section-title">🎰 NODE CROSSER (CASINO)</h2>
            <div class="casino-container">
                <div class="casino-stats">
                    <span>COST: 20 ENERGY</span>
                    <span id="current-multiplier-display" style="color:var(--neon-green)">POTENTIAL: 1.0x</span>
                </div>
                <div id="chicken-grid" class="chicken-grid">
                    </div>
                <button id="cashout-btn" class="btn-cashout" onclick="cashout()">CASHOUT BOOST</button>
            </div>
        </section>

        <div id="mission-terminal" class="mission-terminal-overlay">
            <div class="terminal-header">
                <span style="font-family:'Orbitron'; color:var(--cyan); font-size:12px;">> COMMAND_LOG: ACTIVE_MISSIONS</span>
                <button onclick="toggleMissionList()" class="close-term">EXIT</button>
            </div>
            <div id="mission-list-container" class="scroll-container">
                </div>
        </div>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">TERMINAL</a>
            <a href="missions.html" class="nav-item active">MISSIONS</a>
            <a href="#" class="nav-item">AIRDROP</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script>
        if(!localStorage.getItem('adamas_user')) {
            window.location.href = "index.html";
        }
    </script>
    <script src="missions.js"></script>
</body>
</html>
