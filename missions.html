<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Mission Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00f2ff; 
            --cyan-glow: rgba(0, 242, 255, 0.4); 
            --gold: #ffcc00;
            --p-green: #adff2f; 
            --glass: rgba(255, 255, 255, 0.03); 
            --card-bg: rgba(10, 10, 10, 0.9);
        }

        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .mission-wrapper { min-height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; width: 100%; max-width: 440px; margin: 0 auto; padding-bottom: 120px; }

        /* --- ARCADE GRID --- */
        .arcade-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .game-item {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; text-align: center; transition: 0.3s; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .game-item:active { transform: scale(0.95); border-color: var(--cyan); }
        .game-icon-svg { width: 40px; height: 40px; margin-bottom: 10px; filter: drop-shadow(0 0 8px var(--cyan)); }
        .game-label { font-family: 'Orbitron'; font-size: 8px; color: #fff; letter-spacing: 2px; font-weight: 700; }

        /* --- SOCIAL TASKS --- */
        .task-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .task-card { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); 
            padding: 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center;
        }
        .task-info h4 { margin: 0; font-size: 11px; font-family: 'Orbitron'; color: #eee; }
        .task-info p { margin: 3px 0 0; font-size: 9px; color: var(--p-green); font-weight: bold; }

        /* --- DIAMOND HUNT --- */
        #mines-sec { 
            background: var(--card-bg); border: 1px solid rgba(173, 255, 47, 0.2); 
            border-radius: 30px; padding: 25px; margin-bottom: 25px; transition: all 0.5s ease;
        }
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; display: none; }
        .mine-tile { aspect-ratio: 1; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; }
        .mine-tile.revealed { background: rgba(0, 242, 255, 0.15); border-color: var(--cyan); }

        /* --- OVERLAYS --- */
        .game-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .game-window { width: 88%; max-width: 380px; background: #080808; border: 1.5px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 25px; text-align: center; position: relative; }

        .header-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 18px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status-pill { background: var(--cyan); color: #000; border: none; padding: 12px 20px; border-radius: 15px; font-size: 10px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; box-shadow: 0 4px 15px var(--cyan-glow); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #151515; z-index: 100; backdrop-filter: blur(10px); }
        .nav-item { text-decoration: none; color: #555; font-size: 8px; font-family: 'Orbitron'; text-align: center; }
        .nav-item.active { color: var(--cyan); }

        .live-win { color: var(--p-green); font-family: 'Orbitron'; font-size: 14px; margin-top: 10px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="game-overlay" class="game-overlay">
        <div class="game-window">
            <span onclick="closeGame()" style="position:absolute; top: -45px; right: 0; color: #666; font-family:'Orbitron'; cursor:pointer; font-size: 10px;">[ TERMINATE_SESSION ]</span>
            
            <div id="crash-box" style="display:none;">
                <canvas id="crash-canvas" width="300" height="180" style="background:#000; border-radius:20px;"></canvas>
                <div id="crash-multiplier" style="font-size: 48px; font-family:'Orbitron'; color:var(--gold); margin-top: -120px; position: relative; z-index: 5;">1.00x</div>
            </div>

            <div id="spin-sync-box" style="display:none; margin: 20px 0;">
                <div style="position:relative; width: 210px; height: 210px; margin: auto;">
                    <svg width="210" height="210" viewBox="0 0 200 200" id="wheel-svg" style="transition: transform 4s cubic-bezier(0.15, 0, 0.1, 1);">
                        <path d="M100,100 L100,5 A95,95 0 0,1 195,100 Z" fill="#ff3b3b"/><text x="130" y="60" fill="white" font-size="12" font-family="Orbitron">0x</text>
                        <path d="M100,100 L195,100 A95,95 0 0,1 100,195 Z" fill="#00f2ff"/><text x="130" y="150" fill="black" font-size="12" font-family="Orbitron">1.5x</text>
                        <path d="M100,100 L100,195 A95,95 0 0,1 5,100 Z" fill="#ffcc00"/><text x="50" y="150" fill="black" font-size="12" font-family="Orbitron">2x</text>
                        <path d="M100,100 L5,100 A95,95 0 0,1 100,5 Z" fill="#adff2f"/><text x="50" y="60" fill="black" font-size="12" font-family="Orbitron">5x</text>
                    </svg>
                    <div style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:12px solid transparent; border-right:12px solid transparent; border-top:25px solid #fff; z-index:10;"></div>
                </div>
            </div>
            
            <div id="bet-container" style="margin-top: 85px;">
                <input type="number" id="bet-amount" value="50" style="background:rgba(255,255,255,0.05); border:none; color:var(--cyan); font-family:'Orbitron'; text-align:center; width:100px; font-size: 1.2rem; margin-bottom: 15px; border-radius: 10px; padding: 5px;">
                <button id="main-game-btn" class="status-pill" style="width: 100%;">START OPERATION</button>
            </div>
        </div>
    </div>

    <div class="mission-wrapper">
        <header class="header-card">
            <div>
                <span style="font-size: 8px; color: #555; font-family: 'Orbitron';">TOTAL_VAULT</span>
                <span id="header-balance" style="display:block; color:#fff; font-family:'Orbitron'; font-size: 1.2rem; font-weight: 900;">0.00</span>
            </div>
            <div id="streak-badge" style="color: var(--p-green); border: 1px solid rgba(173, 255, 47, 0.2); font-size: 8px; padding: 8px 14px; border-radius: 20px; font-family: 'Orbitron';">STREAK: 1</div>
        </header>

        <h2 style="font-family: 'Orbitron'; font-size: 10px; color: var(--gold); margin-bottom: 15px; letter-spacing: 2px;">🎰 ARCADE_ZONE</h2>
        <div class="arcade-grid">
            <div class="game-item" onclick="openCrash()">
                <svg class="game-icon-svg" viewBox="0 0 24 24" fill="var(--cyan)"><path d="M21 16v2L13 13v5L16 21V23L12 22L8 23V21L11 18V13L3 18V16L11 8L8 4H12L14 4L11 8L21 16Z"/></svg>
                <div class="game-label">CRASH</div>
            </div>
            <div class="game-item" onclick="openSpinSync()">
                <svg class="game-icon-svg" viewBox="0 0 24 24" fill="var(--gold)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                <div class="game-label">SPIN</div>
            </div>
        </div>

        <section id="mines-sec">
            <div id="mines-intro" style="text-align:center;">
                <h3 style="font-family:'Orbitron'; font-size:12px; margin:0;">DIAMOND_HUNT_V2</h3>
                <button class="status-pill" onclick="initMines()" style="margin-top:15px; width:100%; background: var(--p-green);">DECRYPT (50 ABP)</button>
            </div>
            <div id="mines-grid-box" style="display:none;">
                <div id="mines-live-reward" class="live-win" style="text-align: center; margin-bottom: 10px;">PROFIT: 0.00</div>
                <div id="mines-grid" class="mines-grid"></div>
                <button class="status-pill" style="background:var(--gold); width:100%;" onclick="cashoutMines()">CASHOUT</button>
            </div>
        </section>

        <h2 style="font-family: 'Orbitron'; font-size: 10px; color: var(--cyan); margin: 10px 0; letter-spacing: 2px;">📱 SOCIAL_TASKS</h2>
        <div class="task-list">
            <div class="task-card">
                <div class="task-info">
                    <h4>Follow X (Twitter)</h4>
                    <p>+500 ABP</p>
                </div>
                <button class="status-pill" onclick="doTask('https://x.com/yourlink', 500)">GO</button>
            </div>
            <div class="task-card">
                <div class="task-info">
                    <h4>Join Telegram</h4>
                    <p>+1000 ABP</p>
                </div>
                <button class="status-pill" onclick="doTask('https://t.me/yourlink', 1000)">GO</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠<br>HOME</a>
            <a href="vault.html" class="nav-item">🔒<br>VAULT</a>
            <a href="profile.html#rank-section" class="nav-item">🏆<br>RANK</a>
            <a href="missions.html" class="nav-item active">⚡<br>TASKS</a>
            <a href="referral.html" class="nav-item">👥<br>NETWORK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        const userWallet = localStorage.getItem('adamas_user');
        const userRef = db.ref('users/' + userWallet);
        let currentBalance = 0;

        userRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                currentBalance = data.balance || 0;
                document.getElementById('header-balance').innerText = currentBalance.toFixed(2);
            }
        });

        // --- TASK SYSTEM ---
        async function doTask(link, reward) {
            window.open(link, '_blank');
            await userRef.update({ balance: firebase.database.ServerValue.increment(reward) });
            alert(`TASK COMPLETED: +${reward} ABP Added!`);
        }

        // --- DIAMOND HUNT ---
        let mineNodes = []; let minesActive = false; let gemsFound = 0;
        async function initMines() {
            if(currentBalance < 50) return alert("No Balance!");
            await userRef.update({ balance: firebase.database.ServerValue.increment(-50) });
            document.getElementById('mines-intro').style.display = 'none';
            document.getElementById('mines-grid-box').style.display = 'block';
            const grid = document.getElementById('mines-grid');
            grid.style.display = 'grid'; grid.innerHTML = '';
            mineNodes = Array(25).fill('💎');
            for(let i=0; i<4; i++) mineNodes[Math.floor(Math.random()*25)] = '💣';
            gemsFound = 0; minesActive = true;
            for(let i=0; i<25; i++) {
                const tile = document.createElement('div');
                tile.className = 'mine-tile';
                tile.onclick = () => {
                    if(!minesActive || tile.classList.contains('revealed')) return;
                    tile.classList.add('revealed');
                    if(mineNodes[i] === '💣') {
                        tile.innerText = '💣'; tile.style.background = '#ff3b3b';
                        minesActive = false; setTimeout(() => { alert("BOOM!"); resetMinesUI(); }, 500);
                    } else {
                        tile.innerText = '💎'; gemsFound++;
                        document.getElementById('mines-live-reward').innerText = `PROFIT: ${gemsFound * 20}`;
                    }
                };
                grid.appendChild(tile);
            }
        }
        function cashoutMines() {
            if(!minesActive || gemsFound === 0) return;
            userRef.update({ balance: firebase.database.ServerValue.increment(gemsFound * 20) });
            minesActive = false; resetMinesUI();
        }
        function resetMinesUI() { document.getElementById('mines-intro').style.display = 'block'; document.getElementById('mines-grid-box').style.display = 'none'; }

        // --- SPIN SYNC ---
        function openSpinSync() {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('spin-sync-box').style.display = 'block';
            document.getElementById('crash-box').style.display = 'none';
            document.getElementById('main-game-btn').onclick = spin;
        }

        async function spin() {
            const bet = 100;
            if(currentBalance < bet) return alert("Low Balance!");
            await userRef.update({ balance: firebase.database.ServerValue.increment(-bet) });
            
            const randomDeg = Math.floor(Math.random() * 360);
            const totalDeg = 1800 + randomDeg;
            document.getElementById('wheel-svg').style.transform = `rotate(${totalDeg}deg)`;
            
            setTimeout(async () => {
                let multiplier = 0;
                const finalDeg = randomDeg % 360;
                if(finalDeg >= 0 && finalDeg < 90) multiplier = 5;      // Green
                else if(finalDeg >= 90 && finalDeg < 180) multiplier = 2; // Gold
                else if(finalDeg >= 180 && finalDeg < 270) multiplier = 1.5; // Cyan
                else multiplier = 0; // Red

                const win = bet * multiplier;
                await userRef.update({ balance: firebase.database.ServerValue.increment(win) });
                alert(`WHEEL STOPPED: ${multiplier}x | WON: ${win} ABP`);
                closeGame();
            }, 4000);
        }

        function closeGame() { document.getElementById('game-overlay').style.display = 'none'; }
    </script>
</body>
</html>
