<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>

    <section id="screen-landing" class="view active">
        <div class="hero-container">
            <div class="diamond-logo">ADS</div>
            <h1 class="title">ADAMAS <span>PROTOCOL</span></h1>
            <p class="subtitle">Gold is heavy. Diamonds are Forever.</p>
            <div class="pills">
                <span>SUPPLY: 21K</span>
                <span>NETWORK: AMOY</span>
            </div>
            <button onclick="openAuth()" class="btn-main">CLAIM YOUR DESTINY</button>
        </div>
    </section>

    <div id="modal-auth" class="modal">
        <div class="modal-content glass">
            <h2>PROTOCOL ACCESS</h2>
            <div class="wallet-box">
                <small>Connected Wallet</small>
                <p>0x7A0F...5D08</p>
                <span class="status">Verified</span>
            </div>
            <p class="modal-info">Complete social validation to unlock the mining node.</p>
            <button onclick="enterDash()" class="btn-verify">VERIFY & ENTER</button>
        </div>
    </div>

    <section id="screen-dash" class="view">
        <div class="dash-container">
            <header class="dash-head">
                <span>CONTROL CENTER</span>
                <div class="streak" onclick="addBonus()">🔥 Day 1</div>
            </header>

            <div class="mining-card glass-premium">
                <div class="node-ui">
                    <div class="orbit"></div>
                    <div class="node-text">LIVE</div>
                </div>
                <h1 id="abp-val">0.0000</h1>
                <small>ABP MINED</small>
            </div>

            <div class="menu-grid">
                <div class="card glass" onclick="alert('Mines: Coming Soon')"><span>💣</span><p>MINES</p><b class="hot">HOT</b></div>
                <div class="card glass" onclick="alert('Quiz: Coming Soon')"><span>🧠</span><p>QUIZ</p></div>
                <div class="card glass" onclick="alert('Vault: Coming Soon')"><span>🔒</span><p>VAULT</p></div>
                <div class="card glass" onclick="alert('Invite: Coming Soon')"><span>👥</span><p>INVITE</p></div>
            </div>

            <nav class="bottom-bar glass">
                <div class="nav-btn active">🏠</div>
                <div class="nav-btn">🏆</div>
                <div class="nav-btn">💳</div>
            </nav>
        </div>
    </section>

    <script>
        let balance = 0.0000;
        function openAuth() { document.getElementById('modal-auth').style.display = 'flex'; }
        function enterDash() {
            document.getElementById('modal-auth').style.display = 'none';
            document.getElementById('screen-landing').classList.remove('active');
            document.getElementById('screen-dash').classList.add('active');
            setInterval(() => {
                balance += 0.0001;
                document.getElementById('abp-val').innerText = balance.toFixed(4);
            }, 3000);
        }
        function addBonus() {
            balance += 100;
            document.getElementById('abp-val').innerText = balance.toFixed(4);
            alert("100 ABP Added!");
        }
    </script>
</body>
</html>
