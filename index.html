<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | The Digital Diamond</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="entry-theme">

    <div class="glow-overlay"></div>

    <main class="landing-wrapper">
        <div class="hero-content">
            <div class="diamond-container">
                <div class="diamond-3d">💎</div>
                <div class="diamond-shadow"></div>
            </div>
            
            <h1 class="brand-logo ultra-glow-text">ADAMAS</h1>
            <p class="hero-tagline">Bitcoin was Gold. Adamas is the <b>Diamond</b>.</p>
            
            <div class="network-badge">
                <span class="pulse-dot"></span> Polygon Amoy Testnet
            </div>

            <div class="action-area">
                <button id="connectBtn" class="btn-primary main-cta" onclick="handleAuth()">
                    CONNECT WALLET
                </button>
            </div>
        </div>
    </main>

    <div id="socialModal" class="modal-overlay">
        <div class="modal-content glass-effect">
            <h2 class="ultra-glow-text">COMMUNITY LOCK</h2>
            <p style="font-size: 0.9rem; opacity: 0.8;">Complete tasks to unlock the ecosystem.</p>
            
            <div class="social-grid">
                <div class="social-item" onclick="taskDone('x')">
                    <a href="https://x.com/adamas" target="_blank">
                        <span class="icon">🐦</span> Follow on X
                    </a>
                    <span id="x-status" class="status-icon">❌</span>
                </div>
                <div class="social-item" onclick="taskDone('tg')">
                    <a href="https://t.me/adamas" target="_blank">
                        <span class="icon">📢</span> Join Telegram
                    </a>
                    <span id="tg-status" class="status-icon">❌</span>
                </div>
            </div>

            <button id="verifyBtn" class="btn-disabled" disabled onclick="enterDashboard()">
                VERIFY & ENTER
            </button>
        </div>
    </div>

    <script src="js/web3.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
