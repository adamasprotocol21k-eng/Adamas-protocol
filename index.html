<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | Royal Cyber Terminal</title>
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* 🔥 CORE DESIGN INJECTED - Multi-Color & Extreme Glow */
        :root { 
            --cyan: #00f2ff; 
            --neon-purple: #bc13fe;
            --neon-red: #ff0033;
            --parrot-green: #adff2f;
            --neon-blue: #0077ff;
            --bg-dark: #000000;
            --card-bg: rgba(10, 10, 10, 0.6); 
            
            /* Glowing Sub-Variables */
            --cyan-glow: rgba(0, 242, 255, 0.5);
            --purple-glow: rgba(188, 19, 254, 0.4);
            --red-glow: rgba(255, 0, 51, 0.4);
            --green-glow: rgba(173, 255, 47, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg-dark); 
            /* 🔥 ROYAL MESH GRADIENT BACKGROUND */
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(188, 19, 254, 0.15) 0%, transparent 35%),   /* Purple */
                radial-gradient(circle at 95% 5%, rgba(255, 0, 51, 0.1) 0%, transparent 35%),    /* Red */
                radial-gradient(circle at 5% 95%, rgba(0, 119, 255, 0.1) 0%, transparent 35%),   /* Blue */
                radial-gradient(circle at 95% 95%, rgba(173, 255, 47, 0.08) 0%, transparent 35%),/* Green */
                radial-gradient(circle at 50% 50%, #050505 0%, #000 100%);
            background-attachment: fixed;
            color: #eee; 
            font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        #phase-intro, #phase-social { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .active-phase { display: flex !important; animation: fadeIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* 🔥 GLOWING LOGO FIXED */
        #typing-logo {
            font-family: 'Orbitron'; font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; 
            min-height: 45px; margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--parrot-green), var(--parrot-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--green-glow));
        }
        #typing-logo::after { content: "|"; animation: blink 0.7s infinite; color: var(--parrot-green); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* VIBRATING ACTION BUTTONS */
        .btn-action-main { 
            background: rgba(0,0,0,0.4); 
            color: var(--parrot-green); 
            border: 1px solid var(--parrot-green); 
            padding: 18px 50px; 
            font-family: 'Orbitron'; 
            font-weight: 900; 
            cursor: pointer;
            transition: 0.4s; 
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(173, 255, 47, 0.3);
            position: relative;
            overflow: hidden;
        }
        .btn-action-main::before {
            content: ''; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        .btn-action-main:hover::before { top: 100%; left: 100%; }
        .btn-action-main:hover { 
            background: var(--parrot-green); color: #000; 
            box-shadow: 0 0 35px var(--parrot-green);
        }

        /* PREMIUM REWARD SECTION */
        .premium-card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(40px); border-radius: 28px; padding: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .highlight-bonus {
            margin: 15px 0 25px 0; background: rgba(188, 19, 254, 0.05); 
            padding: 10px; border-radius: 12px; border: 1px solid var(--neon-purple);
            box-shadow: 0 0 15px var(--purple-glow);
        }

        .balance-label { font-family: 'Rajdhani'; font-weight: 700; color: #fff; font-size: 11px; letter-spacing: 2px; }
        .balance-value { font-family: 'Orbitron'; color: var(--parrot-green); font-size: 20px; font-weight: 900; text-shadow: 0 0 10px var(--green-glow); }

        .task-card {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 20px; margin-top: 15px; text-align: left;
        }
        .reward-summary { font-family: 'Orbitron'; color: var(--cyan); font-size: 13px; font-weight: 900; margin-bottom: 12px; filter: drop-shadow(0 0 5px var(--cyan-glow)); }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-social-action {
            display: flex; flex-direction: column; align-items: center; padding: 12px 5px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px; text-decoration: none; transition: 0.3s all;
        }
        .btn-social-action:hover { border-color: var(--parrot-green); background: rgba(173, 255, 47, 0.03); transform: translateY(-2px); }

        .unit-reward { font-size: 8px; color: var(--parrot-green); font-weight: 900; font-family: 'Orbitron'; margin-bottom: 3px; }
        .btn-label { font-size: 9px; color: #fff; font-weight: bold; letter-spacing: 1px; }

        /* Verified State with Multi-Color Vibe */
        .btn-social-action.verified { border-color: var(--parrot-green); background: rgba(173, 255, 47, 0.08); box-shadow: 0 0 15px rgba(173, 255, 47, 0.15); }
        .btn-social-action.verified .btn-label { color: var(--parrot-green); text-shadow: 0 0 5px var(--green-glow); }
        
        #lock-msg { font-size: 9px; color: var(--neon-red); margin-top: 10px; font-weight: bold; font-family: 'Orbitron'; letter-spacing: 1px; }

        /* Primary action button glow updated */
        .btn-primary-vibe {
            width: 100%; padding: 18px; 
            background: linear-gradient(90deg, var(--neon-red), var(--neon-purple));
            color: #fff; border: none; border-radius: 20px; font-weight: 900;
            font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 20px var(--purple-glow);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <section id="phase-intro" class="active-phase">
            <div style="text-align: center;">
                <h1 id="typing-logo"></h1>
                <p style="font-size: 10px; color: #777; margin-top: 8px; letter-spacing: 3px; text-transform: uppercase;">Decentralized Node Infrastructure</p>
                <div style="margin-top: 55px;">
                    <button class="btn-action-main" onclick="startJourney()">INITIALIZE NODE</button>
                </div>
            </div>
        </section>

        <section id="phase-social">
            <div class="premium-card" style="width: 92%; max-width: 400px; text-align: center;">
                <h2 style="font-family: 'Orbitron'; font-size: 1.3rem; letter-spacing: 2px;">ELITE <span style="color: var(--neon-purple);">COMMAND</span></h2>
                
                <div class="highlight-bonus">
                    <p class="balance-label">TOTAL BONUS POINTS READY</p>
                    <p class="balance-value">800 ABP</p>
                </div>

                <div class="task-card">
                    <p class="reward-summary">STEP 01: TELEGRAM HUB</p>
                    <div class="social-grid">
                        <a href="https://t.me/ADSProtocol" target="_blank" class="btn-social-action" onclick="verifyTask(this)">
                            <span class="unit-reward">+200 ABP</span>
                            <span class="btn-label">CHANNEL</span>
                        </a>
                        <a href="https://t.me/adsprotocolcommunity" target="_blank" class="btn-social-action" onclick="verifyTask(this)">
                            <span class="unit-reward">+200 ABP</span>
                            <span class="btn-label">COMMUNITY</span>
                        </a>
                    </div>
                </div>

                <div class="task-card">
                    <p class="reward-summary">STEP 02: X COMMAND</p>
                    <div class="social-grid">
                        <a href="https://x.com/DiamoProtocol" target="_blank" class="btn-social-action" onclick="verifyTask(this)">
                            <span class="unit-reward">+200 ABP</span>
                            <span class="btn-label">FOLLOW X1</span>
                        </a>
                        <a href="https://x.com/AdamasADS" target="_blank" class="btn-social-action" onclick="verifyTask(this)">
                            <span class="unit-reward">+200 ABP</span>
                            <span class="btn-label">FOLLOW X2</span>
                        </a>
                    </div>
                </div>

                <button id="connect-wallet-btn" class="btn-primary-vibe" onclick="connectWeb3()" style="margin-top: 30px; opacity: 0.15; pointer-events: none; transition: 0.5s;">CONNECT WEB3 WALLET</button>
                <p id="lock-msg">[!] COMPLETE ALL 4 TASKS TO UNLOCK NODE</p>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

</body>
</html>
