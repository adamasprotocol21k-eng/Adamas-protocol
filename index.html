<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS Protocol | Scarcity Redefined</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body, html {
            height: 100%;
            overflow: hidden; 
            background: #000;
            margin: 0;
            font-family: sans-serif;
        }

        /* Animated Background */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a2230 0%, #000 100%);
            z-index: -1;
        }

        /* Floating Diamonds Effect */
        .diamond-particle {
            position: absolute;
            color: rgba(0, 210, 255, 0.3);
            font-size: 20px;
            pointer-events: none;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .hero-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .logo-glow {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.8);
            letter-spacing: 5px;
            animation: pulseText 2s infinite alternate;
        }

        @keyframes pulseText {
            from { text-shadow: 0 0 20px rgba(0, 210, 255, 0.5); }
            to { text-shadow: 0 0 40px rgba(0, 210, 255, 1), 0 0 10px #fff; }
        }

        .launch-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(243, 186, 47, 0.2);
            padding: 40px 30px;
            border-radius: 30px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Essential Button Style if CSS doesn't load */
        .btn-neon {
            cursor: pointer;
            background: none;
            color: #F3BA2F;
            border: 1px solid #F3BA2F;
            border-radius: 12px;
            transition: 0.3s;
        }
        .btn-neon:hover {
            background: #F3BA2F;
            color: #000;
            box-shadow: 0 0 20px #F3BA2F;
        }
    </style>
</head>
<body>

    <div class="bg-animate" id="particles"></div>

    <div class="hero-container">
        <div class="logo-glow">ADAMAS</div>
        <p style="color: #F3BA2F; letter-spacing: 4px; font-size: 0.7rem; margin-bottom: 40px; font-weight: bold;">
            SCARCITY PROTOCOL v2.0
        </p>

        <div class="launch-box">
            <h3 style="margin-bottom: 10px; font-weight: 300; color: #fff;">Ready to Mine?</h3>
            <p style="color: #848e9c; font-size: 0.8rem; margin-bottom: 30px;">
                Connect your secure wallet to access the <br>
                <span style="color: #00d2ff;">Diamond Asset Ecosystem</span>
            </p>

            <button id="launchBtn" class="btn-neon" style="width: 100%; padding: 20px; font-size: 1rem; letter-spacing: 2px; font-weight: bold;" onclick="enterProtocol()">
                LAUNCH TERMINAL
            </button>
        </div>

        <div style="margin-top: 40px; display: flex; gap: 20px;">
            <div style="color: #848e9c; font-size: 0.6rem;">● SECURE</div>
            <div style="color: #848e9c; font-size: 0.6rem;">● DECENTRALIZED</div>
            <div style="color: #848e9c; font-size: 0.6rem;">● SCARCE</div>
        </div>
    </div>

    <script>
        // Function to move to next page
        function enterProtocol() {
            window.location.href = "connect.html";
        }

        // Generate Floating Diamonds
        function createParticles() {
            const container = document.getElementById('particles');
            if(!container) return;
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'diamond-particle';
                p.innerHTML = '💎';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 5 + 5) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
    </script>
</body>
</html>
