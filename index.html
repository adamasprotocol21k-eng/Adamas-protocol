<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | PRO-ELITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --p-green: #adff2f;
            --neon-blue: #00f2ff;
            --bg-dark: #000000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark); color: #fff;
            font-family: 'Orbitron', sans-serif; overflow: hidden;
        }

        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(173, 255, 47, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .app-container { width: 100%; max-width: 500px; height: 100vh; margin: auto; position: relative; z-index: 1; }

        section { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; box-sizing: border-box; }
        .active-phase { display: flex !important; animation: scanIn 0.5s ease-out; }

        @keyframes scanIn { from { opacity: 0; filter: brightness(2); } to { opacity: 1; filter: brightness(1); } }

        .auth-badge {
            background: rgba(173, 255, 47, 0.1); border: 1px solid var(--p-green);
            color: var(--p-green); padding: 4px 15px; border-radius: 20px;
            font-size: 8px; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px;
        }

        .main-logo {
            font-size: 2.5rem; font-weight: 900; color: var(--p-green);
            text-shadow: 0 0 20px rgba(173, 255, 47, 0.6); margin: 0; letter-spacing: 2px;
        }

        .sub-heading { font-size: 10px; color: #fff; letter-spacing: 2px; margin-bottom: 30px; opacity: 0.8; }

        .terminal-box {
            background: rgba(15, 15, 15, 0.6); border: 1px solid rgba(173, 255, 47, 0.4);
            border-radius: 25px; width: 90%; padding: 25px; margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .spec-row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 0.5px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .spec-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .spec-value { font-size: 10px; font-weight: bold; color: var(--neon-blue); letter-spacing: 1px; }

        .btn-slanted {
            background: var(--p-green); color: #000; border: none;
            padding: 18px 50px; font-family: 'Orbitron'; font-weight: 900;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            cursor: pointer; transition: 0.3s; width: 85%; font-size: 14px; letter-spacing: 2px;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(173, 255, 47, 0.2);
            border-radius: 15px; padding: 15px; margin-bottom: 12px; transition: 0.3s;
        }
        .task-card.verified { border-color: var(--p-green); background: rgba(173, 255, 47, 0.05); }

        .social-link { text-decoration: none; display: flex; justify-content: space-between; align-items: center; }
        .task-info { text-align: left; }
        .task-title { font-size: 10px; color: #fff; font-weight: bold; }
        .task-points { font-size: 9px; color: var(--p-green); display: block; margin-top: 4px; }
        .status-pill { font-size: 8px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 5px; color: #aaa; }
        .verified .status-pill { background: var(--p-green); color: #000; }

        #lock-msg { font-size: 10px; color: #ff3366; margin-top: 15px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="app-container">
        <section id="phase-intro" class="active-phase">
            <div class="auth-badge">AUTHORIZED BY: SYSTEM-ROOT-V12</div>
            <h1 class="main-logo">ADAMAS</h1>
            <h1 class="main-logo" style="margin-top: -10px;">PROTOCOL</h1>
            <p class="sub-heading">DECENTRALIZED NODE INFRASTRUCTURE</p>

            <div class="terminal-box">
                <div class="spec-row">
                    <span class="spec-label">Admin</span>
                    <span class="spec-value">PRO-ELITE SYSTEM</span>
                </div>
                <div class="spec-row">
                    <span class="spec-label">Status</span>
                    <span class="spec-value" style="color:var(--p-green)">● ACTIVE NODE</span>
                </div>
                <div class="spec-row" style="border:none; margin-bottom:0;">
                    <span class="spec-label">Network</span>
                    <span class="spec-value">MAINNET V12</span>
                </div>
            </div>

            <button class="btn-slanted" onclick="startJourney()">INITIALIZE NODE</button>
        </section>

        <section id="phase-social">
            <h2 style="color:var(--p-green); font-size: 1.5rem; margin-bottom: 5px;">ELITE ACCESS</h2>
            <p style="font-size: 9px; color: #aaa; margin-bottom: 25px;">SYNC SOCIAL DATA TO RECEIVE 800 ABP</p>

            <div class="task-container" style="width: 100%;">
                <div class="task-card" id="card-t1">
                    <a href="https://t.me/ADSProtocol" target="_blank" class="social-link" onclick="handleVerify('t1')">
                        <div class="task-info">
                            <span class="task-title">JOIN TELEGRAM CHANNEL</span>
                            <span class="task-points">+200 ABP REWARD</span>
                        </div>
                        <div class="status-pill" id="pill-t1">PENDING</div>
                    </a>
                </div>
                </div>

            <button id="wallet-btn" class="btn-slanted" style="margin-top: 20px; opacity: 0.2; pointer-events: none; background: #fff;" onclick="connectWeb3()">AUTHORIZE WALLET</button>
            <p id="lock-msg">[!] COMPLETE ALL NODE CHECKS</p>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
            authDomain: "adamas-protocol-v2.firebaseapp.com",
            databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol-v2",
            appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // [SYSTEM LOGIC] Referral & Auth Check
        window.onload = function() {
            // 1. Referral Capture
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if(ref) {
                localStorage.setItem('adamas_referrer', ref);
                console.log("Referrer Captured: " + ref);
            }

            // 2. Auto-Login
            const savedUser = localStorage.getItem('adamas_user');
            if(savedUser) {
                window.location.href = "dashboard.html";
            }
        }

        function startJourney() {
            document.getElementById('phase-intro').classList.remove('active-phase');
            document.getElementById('phase-social').classList.add('active-phase');
        }

        let tasksDone = 0;
        const totalTasks = 1; // Testing ke liye 1 rakha hai, isse 4 kar dena baad mein

        function handleVerify(id) {
            const pill = document.getElementById('pill-' + id);
            const card = document.getElementById('card-' + id);
            
            if(pill.innerText !== "VERIFIED") {
                pill.innerText = "CHECKING...";
                setTimeout(() => {
                    pill.innerText = "VERIFIED";
                    card.classList.add('verified');
                    tasksDone++;
                    if(tasksDone >= totalTasks) {
                        enableWalletBtn();
                    }
                }, 3000);
            }
        }

        function enableWalletBtn() {
            const wb = document.getElementById('wallet-btn');
            wb.style.opacity = "1";
            wb.style.pointerEvents = "all";
            wb.style.background = "var(--p-green)";
            document.getElementById('lock-msg').innerText = "NODE VERIFIED: 800 ABP READY";
            document.getElementById('lock-msg').style.color = "var(--p-green)";
        }

        async function connectWeb3() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const wallet = accounts[0].toLowerCase(); // Case-sensitive issues avoid karne ke liye
                    
                    const userRef = db.ref('users/' + wallet);
                    
                    userRef.once('value').then(async (snapshot) => {
                        if (!snapshot.exists()) {
                            const referrer = localStorage.getItem('adamas_referrer') || "DIRECT";
                            
                            await userRef.set({
                                balance: 800,
                                abp_balance: 800,
                                wallet: wallet,
                                refCode: wallet.substring(2, 8).toUpperCase(),
                                referredBy: referrer,
                                joinedAt: new Date().toISOString(),
                                lastLogin: new Date().toISOString()
                            });

                            // Referral Bonus logic with safety transaction
                            if(referrer !== "DIRECT") {
                                db.ref('users').orderByChild('refCode').equalTo(referrer).once('value', snap => {
                                    if(snap.exists()) {
                                        const refWallet = Object.keys(snap.val())[0];
                                        db.ref('users/' + refWallet).child('balance').transaction(b => (b || 0) + 100);
                                    }
                                });
                            }
                        } else {
                            await userRef.update({ lastLogin: new Date().toISOString() });
                        }

                        localStorage.setItem('adamas_user', wallet);
                        window.location.href = "dashboard.html";
                    });

                } catch (e) { console.error(e); }
            } else { alert("Please use Trust Wallet or MetaMask browser."); }
        }
    </script>
</body>
</html>
