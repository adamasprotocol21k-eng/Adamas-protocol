<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | Elite Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #phase-intro, #phase-social { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .active-phase { display: flex !important; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #typing-logo::after { content: "|"; animation: blink 0.7s infinite; margin-left: 5px; color: var(--parrot-green); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .btn-entry { 
            background: transparent; color: var(--parrot-green); border: 1px solid var(--parrot-green); 
            padding: 15px 40px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            letter-spacing: 2px; box-shadow: 0 0 15px rgba(173, 255, 47, 0.2);
        }
        .btn-entry:hover { background: var(--parrot-green); color: #000; box-shadow: 0 0 30px var(--parrot-green); }

        /* 🔥 CRYSTAL HIGHLIGHT TASK CARDS */
        .task-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
            text-align: left;
            transition: 0.3s ease;
        }

        .reward-tag {
            background: var(--parrot-green);
            color: #000;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 5px;
            float: right;
            box-shadow: 0 0 10px var(--parrot-green);
        }

        /* PREMIUM BUTTONS */
        .btn-social-action {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--cyan);
            color: #fff;
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 10px;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .btn-social-action:active, .btn-social-action:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 20px var(--cyan-glow);
        }

        .btn-social-action.verified {
            background: var(--parrot-green) !important;
            border-color: var(--parrot-green) !important;
            color: #000 !important;
            box-shadow: 0 0 20px var(--parrot-green) !important;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <section id="phase-intro" class="active-phase">
            <div style="text-align: center;">
                <h1 id="typing-logo" class="glow-text" style="font-family: 'Orbitron'; font-size: 2rem; letter-spacing: 5px; min-height: 40px;"></h1>
                <p style="font-size: 10px; color: #555; margin-top: 10px; letter-spacing: 3px; text-transform: uppercase;">Decentralized Node Infrastructure</p>
                <div style="margin-top: 50px;">
                    <button class="btn-entry" onclick="startJourney()">INITIALIZE SYSTEM</button>
                </div>
            </div>
        </section>

        <section id="phase-social">
            <div class="premium-card" style="width: 92%; max-width: 400px; text-align: center;">
                <h2 style="font-family: 'Orbitron'; font-size: 1.1rem; margin-bottom: 5px; letter-spacing: 1px;">ELITE <span style="color: var(--parrot-green);">REWARDS</span></h2>
                <p style="font-size: 10px; color: #666; margin-bottom: 20px;">CLAIM 800 ABP TO ACTIVATE NODE</p>
                
                <div class="task-list" style="margin-bottom: 30px;">
                    <div class="task-card">
                        <span class="reward-tag">+400 ABP</span>
                        <span style="font-size: 9px; color: var(--cyan); font-family: 'Orbitron';">STEP 01</span>
                        <p style="font-weight: bold; font-size: 14px; color: #eee; margin-top: 5px;">JOIN TELEGRAM HUB</p>
                        <div style="display: flex; gap: 10px;">
                            <a href="https://t.me/ADSProtocol" target="_blank" class="btn-social-action" onclick="verifyTask(this)">CHANNEL</a>
                            <a href="https://t.me/adsprotocolcommunity" target="_blank" class="btn-social-action" onclick="verifyTask(this)">COMMUNITY</a>
                        </div>
                    </div>

                    <div class="task-card">
                        <span class="reward-tag">+400 ABP</span>
                        <span style="font-size: 9px; color: var(--cyan); font-family: 'Orbitron';">STEP 02</span>
                        <p style="font-weight: bold; font-size: 14px; color: #eee; margin-top: 5px;">FOLLOW X COMMAND</p>
                        <div style="display: flex; gap: 10px;">
                            <a href="https://x.com/DiamoProtocol" target="_blank" class="btn-social-action" onclick="verifyTask(this)">FOLLOW X1</a>
                            <a href="https://x.com/AdamasADS" target="_blank" class="btn-social-action" onclick="verifyTask(this)">FOLLOW X2</a>
                        </div>
                    </div>
                </div>

                <button id="connect-wallet-btn" class="btn-primary" onclick="connectWeb3()" style="letter-spacing: 1px; opacity: 0.5;">CONNECT WEB3 WALLET</button>
                <p style="font-size: 9px; color: #444; margin-top: 15px; font-style: italic;">*Bonus points required for node authorization.</p>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
    const ADMIN_WALLET = "0xC9267828a11dB4cb32f0A5Ea5FC29b38FF0fF25e";

    const firebaseConfig = {
      apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
      authDomain: "adamas-protocol-v2.firebaseapp.com",
      databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
      projectId: "adamas-protocol-v2",
      storageBucket: "adamas-protocol-v2.firebasestorage.app",
      messagingSenderId: "197711342782",
      appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef",
      measurementId: "G-FKP19J67TT"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const logoText = "ADAMAS PROTOCOL";
    let charIndex = 0;
    function typeEffect() {
        if (charIndex < logoText.length) {
            document.getElementById("typing-logo").innerHTML += logoText.charAt(charIndex);
            charIndex++;
            setTimeout(typeEffect, 100);
        }
    }

    // 🔥 FIX: Redirect if already logged in
    window.onload = () => {
        typeEffect();
        if (localStorage.getItem('adamas_user')) {
            window.location.href = "dashboard.html";
            return;
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) localStorage.setItem('adamas_referrer', refCode);
    };

    function startJourney() {
        document.getElementById('phase-intro').classList.remove('active-phase');
        document.getElementById('phase-social').classList.add('active-phase');
    }

    let completedTasks = 0;
    function verifyTask(btn) {
        btn.classList.add('verified');
        btn.innerText = "VERIFIED ✅";
        completedTasks++;
        if(completedTasks >= 2) {
            const connectBtn = document.getElementById('connect-wallet-btn');
            connectBtn.style.opacity = "1";
            connectBtn.style.boxShadow = "0 0 20px var(--purple-glow)";
        }
    }

    async function connectWeb3() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                const btn = document.getElementById('connect-wallet-btn');
                btn.innerText = "AUTHORIZING...";
                btn.disabled = true;
                
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const wallet = accounts[0];

                const isAdmin = wallet.toLowerCase() === ADMIN_WALLET.toLowerCase();
                const userRef = database.ref('users/' + wallet);

                userRef.once('value').then((snapshot) => {
                    if (!snapshot.exists()) {
                        const referrer = localStorage.getItem('adamas_referrer') || "DIRECT";
                        // 💎 800 ABP WELCOME BONUS
                        let welcomeBonus = isAdmin ? 1000000 : 800;

                        userRef.set({
                            balance: welcomeBonus,
                            referredBy: referrer,
                            streak: 0,
                            lastClaim: "NEVER",
                            role: isAdmin ? "FOUNDER" : "USER",
                            joinedAt: new Date().toISOString(),
                            currentMultiplier: isAdmin ? 5.0 : 1.0,
                            miningStatus: false
                        }).then(() => {
                            if (referrer !== "DIRECT" && !isAdmin) {
                                database.ref('users/' + referrer + '/balance').transaction(b => (b || 0) + 100);
                            }
                        });
                    }
                    // 🔥 SAVE WALLET BEFORE REDIRECT
                    localStorage.setItem('adamas_user', wallet);
                    btn.innerText = "SECURE ✅";
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 800);
                });
            } catch (err) {
                btn.disabled = false;
                btn.innerText = "RETRY CONNECTION";
            }
        } else {
            alert("Please use Trust Wallet or MetaMask Browser.");
        }
    }
    </script>
</body>
</html>
