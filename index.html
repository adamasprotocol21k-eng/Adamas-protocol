<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --bg: #000205; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .universe-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.12) 0%, transparent 70%); z-index: -1; }
        .gate-card { width: 90%; max-width: 380px; text-align: center; background: rgba(255,255,255,0.02); padding: 40px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
        .title { font-family: 'Orbitron'; font-size: 2.2rem; letter-spacing: 6px; margin-bottom: 5px; background: linear-gradient(180deg, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-action { width: 100%; padding: 20px; border-radius: 15px; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 25px; font-size: 0.8rem; }
        .btn-connect { background: #fff; color: #000; box-shadow: 0 10px 40px rgba(0, 242, 255, 0.2); }
        .task-list { display: none; margin-top: 30px; text-align: left; animation: fadeIn 0.5s ease; }
        .task-item { background: rgba(255,255,255,0.05); padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: #fff; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .btn-enter { background: var(--cyan); color: #000; display: none; box-shadow: 0 0 20px var(--cyan); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-msg { margin-top: 15px; font-size: 0.6rem; color: #666; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="universe-bg"></div>
    <div class="gate-card">
        <h1 class="title">ADAMAS</h1>
        <p style="font-size: 0.55rem; letter-spacing: 3px; color: #555; font-weight: 900;">BLOCKCHAIN NODE ENTRANCE</p>
        
        <button id="connectBtn" class="btn-action btn-connect">CONNECT METAMASK</button>

        <div id="taskSection" class="task-list">
            <p style="font-size: 0.6rem; color: #ffd700; margin-bottom: 20px; font-weight: 800; text-align: center; letter-spacing: 1px;">VERIFICATION REQUIRED</p>
            <div class="task-item" onclick="verifyTask('tw', 'https://x.com/AdamasADS')">
                <span>Follow Twitter (+50 ABP)</span> <b id="tw-status">✈️</b>
            </div>
            <div class="task-item" onclick="verifyTask('tg', 'https://t.me/ADSProtocol')">
                <span>Join Telegram (+50 ABP)</span> <b id="tg-status">🚀</b>
            </div>
             <div class="task-item" onclick="verifyTask('tg', 'https://t.me/adsprotocolcommunity')">
                <span>Follow Adamas Protocol Community (+50 ABP)</span> <b id="tw-status">📢</b>
             </div>
            <button id="enterBtn" class="btn-action btn-enter">LAUNCH DASHBOARD</button>
        </div>
        <p id="statusMsg" class="status-msg">Standby for Web3 Handshake...</p>
    </div>

    <script type="module">
        import { DBModule } from './js/database.js';
        let tasks = { tw: false, tg: false };

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                try {
                    document.getElementById('statusMsg').innerText = "Requesting MetaMask...";
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const wallet = accounts[0]; 
                    
                    localStorage.setItem('userWallet', wallet);
                    
                    // Create Firebase Profile using Real Wallet
                    await DBModule.createProfile(wallet); 
                    
                    document.getElementById('connectBtn').style.display = 'none';
                    document.getElementById('taskSection').style.display = 'block';
                    document.getElementById('statusMsg').innerText = "Wallet Linked: " + wallet.substring(0,6) + "..." + wallet.substring(wallet.length-4);
                } catch (error) {
                    document.getElementById('statusMsg').innerText = "Connection Rejected. Try Again.";
                }
            } else {
                alert("MetaMask not found! Please open this in a Web3 browser or install MetaMask.");
                window.open("https://metamask.io/", "_blank");
            }
        };

        window.verifyTask = (type, url) => {
            window.open(url, '_blank');
            setTimeout(() => {
                tasks[type] = true;
                document.getElementById(`${type}-status`).innerText = "✅";
                document.getElementById(`${type}-status`).style.color = "#00f2ff";
                if(tasks.tw && tasks.tg) {
                    document.getElementById('enterBtn').style.display = 'block';
                    document.getElementById('statusMsg').innerText = "Verification Complete!";
                }
            }, 2000);
        };

        document.getElementById('enterBtn').onclick = () => {
            document.getElementById('statusMsg').innerText = "Synchronizing Protocol...";
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        };
    </script>
</body>
</html>
