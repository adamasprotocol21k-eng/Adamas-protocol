<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Quantum Node Infrastructure</title>
    <style>
        :root { --cyan: #00f2ff; --cyan-glow: rgba(0, 242, 255, 0.4); --p-green: #adff2f; }
        body { background: #000; color: #fff; margin: 0; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        .app-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* Wallet Button */
        #top-wallet-box { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .wallet-btn {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan);
            color: var(--cyan); padding: 12px 24px; border-radius: 12px;
            font-size: 11px; cursor: pointer; box-shadow: 0 0 15px var(--cyan-glow);
            backdrop-filter: blur(10px); transition: 0.3s; font-weight: bold;
        }

        section { display: none; width: 100%; max-width: 420px; flex-direction: column; align-items: center; text-align: center; }
        section.active-phase { display: flex; animation: fadeIn 0.8s ease; }

        /* Impression Landing */
        .logo-container { margin-top: 20%; }
        .main-logo { font-size: 3.8rem; font-weight: 900; background: linear-gradient(180deg, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px var(--cyan-glow)); letter-spacing: 8px; margin: 0; }
        
        .terminal-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(0, 242, 255, 0.15); width: 100%; padding: 25px; border-radius: 20px; text-align: left; margin-top: 30px; }
        .term-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px; font-family: monospace; }
        
        #handshake-loader { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 15px; display: none; overflow: hidden; }
        #handshake-bar { width: 40%; height: 100%; background: var(--cyan); animation: loadingSlide 1s infinite linear; }
        @keyframes loadingSlide { from { transform: translateX(-100%); } to { transform: translateX(300%); } }

        /* Social Phase */
        .task-list { width: 100%; display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .task-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; }
        .status-pill { font-size: 10px; padding: 10px 18px; border-radius: 10px; color: var(--cyan); border: 1px solid var(--cyan); cursor: pointer; min-width: 85px; }
        .status-pill.verify-mode { background: #ffcc00; color: #000; border-color: #ffcc00; font-weight: bold; }

        .btn-unlock { background: linear-gradient(90deg, var(--cyan), #8e2de2); color: #fff; padding: 18px; border-radius: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; margin-top: 30px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        .locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="top-wallet-box">
            <button id="connect-trigger" class="wallet-btn" onclick="handleEntry()">CONNECT WALLET</button>
        </div>

        <section id="phase-intro" class="active-phase">
            <div class="logo-container">
                <h1 class="main-logo">ADAMAS</h1>
                <p style="color:var(--cyan); font-size: 10px; letter-spacing: 4px;">QUANTUM_NODE_V2</p>
            </div>
            <div class="terminal-box">
                <div class="term-row"><span style="color:#666">CORE_ENGINE</span><span style="color:var(--p-green)">STABLE</span></div>
                <div class="term-row"><span style="color:#666">AUTH_STATE</span><span id="auth-label" style="color:#ff4444">AWAITING_HANDSHAKE</span></div>
                <div id="handshake-loader"><div id="handshake-bar"></div></div>
                <p id="term-msg" style="font-size: 10px; color: #555; margin-top: 10px;">Please confirm the wallet request to identify your node status.</p>
            </div>
        </section>

        <section id="phase-social">
            <h2 style="color:var(--p-green); font-size: 1.5rem; margin:0;">IDENTITY SYNC</h2>
            <div class="task-list">
                <div class="task-card"><span style="font-size:11px;">TELEGRAM CHANNEL (+200)</span><div id="pill-t1" class="status-pill" onclick="handleTask('t1', 'https://t.me/ADSProtocol')">FOLLOW</div></div>
                <div class="task-card"><span style="font-size:11px;">TELEGRAM GROUP (+200)</span><div id="pill-t2" class="status-pill" onclick="handleTask('t2', 'https://t.me/adsprotocolcommunity')">FOLLOW</div></div>
                <div class="task-card"><span style="font-size:11px;">FOLLOW @DIAMO X (+200)</span><div id="pill-t3" class="status-pill" onclick="handleTask('t3', 'https://x.com/DiamoProtocol')">FOLLOW</div></div>
                <div class="task-card"><span style="font-size:11px;">FOLLOW @ADAMAS X (+200)</span><div id="pill-t4" class="status-pill" onclick="handleTask('t4', 'https://x.com/AdamasADS')">FOLLOW</div></div>
            </div>
            <button id="final-btn" class="btn-unlock locked" onclick="finalRegistration()">GENERATE ACCESS KEY</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script> 

    <script>
        let activeWallet = null;
        let tasksDone = 0;
        let taskStates = { t1:'init', t2:'init', t3:'init', t4:'init' };

        async function handleEntry() {
            if (!window.ethereum) return alert("Please use Metamask/Trust Wallet");
            
            try {
                // 1. Force Confirmation (Popup dikhayega har baar)
                await window.ethereum.request({
                    method: 'wallet_requestPermissions',
                    params: [{ eth_accounts: {} }]
                });

                document.getElementById('handshake-loader').style.display = 'block';
                document.getElementById('auth-label').innerText = "IDENTIFYING...";
                document.getElementById('auth-label').style.color = "#ffcc00";

                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                activeWallet = accounts[0].toLowerCase();
                
                // 2. Database Identification Scan
                const snap = await db.ref('users/' + activeWallet).once('value');
                
                if(snap.exists()) {
                    // OLD USER
                    document.getElementById('auth-label').innerText = "NODE_RECOGNIZED";
                    document.getElementById('auth-label').style.color = "var(--p-green)";
                    localStorage.setItem('adamas_user', activeWallet);
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
                } else {
                    // NEW USER
                    document.getElementById('auth-label').innerText = "NEW_NODE_DETECTED";
                    document.getElementById('auth-label').style.color = "var(--cyan)";
                    setTimeout(() => { switchToSocial(); }, 1500);
                }
            } catch (e) {
                document.getElementById('handshake-loader').style.display = 'none';
                document.getElementById('auth-label').innerText = "HANDSHAKE_CANCELLED";
            }
        }

        function switchToSocial() {
            document.getElementById('phase-intro').classList.remove('active-phase');
            document.getElementById('phase-social').classList.add('active-phase');
        }

        function handleTask(id, link) {
            const pill = document.getElementById('pill-' + id);
            if(taskStates[id] === 'init') {
                window.open(link, '_blank');
                taskStates[id] = 'awaiting';
                pill.innerText = "VERIFY";
                pill.classList.add('verify-mode');
            } else if(taskStates[id] === 'awaiting') {
                pill.style.pointerEvents = 'none';
                let sec = 12;
                const timer = setInterval(() => {
                    sec--;
                    pill.innerText = sec + "S";
                    if(sec <= 0) {
                        clearInterval(timer);
                        taskStates[id] = 'done';
                        tasksDone++;
                        pill.innerText = "SYNCED";
                        pill.style.background = "var(--p-green)"; pill.style.color = "#000";
                        if(tasksDone >= 4) document.getElementById('final-btn').classList.remove('locked');
                    }
                }, 1000);
            }
        }

        async function finalRegistration() {
            const ref = localStorage.getItem('adamas_referrer') || "DIRECT";
            try {
                await db.ref('users/' + activeWallet).set({
                    balance: 800, wallet: activeWallet, referredBy: ref, joinedAt: new Date().toISOString()
                });
                localStorage.setItem('adamas_user', activeWallet);
                window.location.href = "dashboard.html";
            } catch (e) { alert("Error"); }
        }
    </script>
</body>
</html>
