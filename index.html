<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | The 21,000 Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-glow"></div>

    <main class="hero-section">
        <div class="logo-container">
            <div class="diamond-wrapper">
                <div class="diamond-shape">ADS</div>
            </div>
        </div>

        <div class="hero-text">
            <h1>ADAMAS <span>PROTOCOL</span></h1>
            <p>Gold is heavy. Diamonds are Forever.</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">SUPPLY: <span>21,000</span></div>
            <div class="stat-divider"></div>
            <div class="stat-item">NETWORK: <span>AMOY</span></div>
        </div>

        <button id="connectBtn" class="main-cta">CLAIM YOUR DESTINY</button>
        <p class="footer-note">SAFE • DECENTRALIZED • IMMUTABLE</p>
    </main>

    <div id="authModal" class="modal-overlay">
        <div class="modal-box glass">
            <h2>PROTOCOL ACCESS</h2>
            <div class="wallet-info">
                <small>Connected Wallet</small>
                <p id="walletInfo">0x...000</p>
            </div>
            <p class="modal-desc">Complete social validation to unlock the mining node.</p>
            <button id="verifyBtn" class="verify-btn">VERIFY & ENTER</button>
        </div>
    </div>

    <script src="js/web3.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
