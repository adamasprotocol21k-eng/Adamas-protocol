<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adamas Protocol | Web3</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero-section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #1a2026 0%, #0b0e11 100%); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(8px); }
        
        .wallet-option {
            background: #1e2329; padding: 18px; border-radius: 16px; display: flex; align-items: center; 
            margin-bottom: 15px; cursor: pointer; border: 1px solid #333; transition: 0.3s; width: 100%;
        }
        .wallet-option:active { transform: scale(0.98); border-color: #F3BA2F; }
        .wallet-option img { width: 35px; height: 35px; margin-right: 20px; object-fit: contain; }
        .wallet-option span { font-weight: bold; color: #fff; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="hero-content">
            <h1 style="color: #F3BA2F; font-size: 3rem; margin-bottom: 10px;">ADAMAS</h1>
            <p style="color: #848e9c; margin-bottom: 40px;">Next-Gen Web3 Gaming Ecosystem</p>
            <button class="btn-neon-large" onclick="openWalletModal()">LAUNCH APP</button>
        </div>
    </div>

    <div id="walletModal" class="modal-overlay">
        <div class="glass-card" style="width: 90%; max-width: 360px; padding: 30px; text-align: center;">
            <h3 style="color: #F3BA2F; margin-bottom: 25px;">Select Wallet</h3>
            
            <div class="wallet-option" onclick="processConnect('MetaMask')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Mirror_Logo.svg" alt="MetaMask">
                <span>MetaMask</span>
            </div>

            <div class="wallet-option" onclick="processConnect('TrustWallet')">
                <img src="https://trustwallet.com/assets/images/media/assets/trust_platform.svg" alt="TrustWallet">
                <span>Trust Wallet</span>
            </div>

            <p style="color: #ff4d4d; margin-top: 20px; cursor: pointer;" onclick="closeModal()">Close</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>

    <script>
        function openWalletModal() { document.getElementById('walletModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('walletModal').style.display = 'none'; }

        async function processConnect(type) {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // Yahan se connect trigger hoga
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const walletAddress = accounts[0];
                    
                    localStorage.setItem('adamas_wallet', walletAddress);
                    
                    // Dashboard par bhejne se pehle notification
                    alert("Connected: " + type + "\nAddress: " + walletAddress.substring(0,10) + "...");
                    
                    window.location.href = "dashboard.html";
                } catch (err) {
                    alert("Connection Refused! Please try again.");
                }
            } else {
                alert("Wallet Not Found! Please open this site inside MetaMask or Trust Wallet DApp Browser.");
                // Deep link for mobile
                window.location.href = "https://metamask.app.link/dapp/" + window.location.hostname;
            }
        }
    </script>
</body>
</html>
