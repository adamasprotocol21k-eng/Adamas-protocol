<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS PROTOCOL | The Future of Mining</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --bg-black: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Particles Background */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1b26 0%, #05060a 100%);
            z-index: -1;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            animation: fadeIn 1.5s ease-out;
        }

        /* Bada aur Glowing Logo */
        .logo-section {
            margin-bottom: 2rem;
            position: relative;
        }
        .main-logo {
            width: 220px; /* Bada size jaisa aapne kaha */
            height: auto;
            filter: drop-shadow(0 0 20px var(--primary-neon));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        /* Glassmorphism Panel */
        .launch-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        h1 span {
            color: var(--primary-neon);
            text-shadow: 0 0 15px var(--primary-neon);
        }

        .reward-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .badge {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--primary-neon);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--primary-neon);
            font-weight: bold;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Final Connect Button */
        .connect-btn {
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 100px;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .connect-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--primary-neon);
            letter-spacing: 1px;
        }

        .connect-btn:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer Links */
        .footer-socials {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            opacity: 0.6;
        }
        .footer-socials a { color: white; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .footer-socials a:hover { color: var(--primary-neon); opacity: 1; }

    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="container">
        <div class="logo-section">
            <img src="assets/logo.png" class="main-logo" alt="ADAMAS LOGO">
        </div>

        <div class="launch-card">
            <h1>ADAMAS <span>PROTOCOL</span></h1>
            
            <div class="reward-info">
                <span class="badge">💎 21,000 SUPPLY</span>
                <span class="badge">🚀 AIRDROP READY</span>
            </div>

            <p>Bhai! Welcome to the Next-Gen Mining. Connect your wallet to claim your <b>Welcome ABP Points</b> and start your journey. 🌕</p>
            
            <button class="connect-btn" id="connectBtn">
                🔗 CONNECT WALLET
            </button>
        </div>

        <div class="footer-socials">
            <a href="https://t.me/daimodmo" target="_blank">Telegram ✈️</a>
            <a href="https://twitter.com/DiamoProtocol" target="_blank">Twitter 🐦</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
