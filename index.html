<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS PROTOCOL | The Future of Mining</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; background: var(--dark);
            color: white; font-family: 'Rajdhani', sans-serif;
            overflow: hidden; height: 100%;
        }

        /* 3D Background Engine */
        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .hero-section {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 0 20px; position: relative;
        }

        /* Animated Logo Portal */
        .portal-container {
            position: relative; width: 220px; height: 220px;
            margin-bottom: 30px; display: flex; align-items: center;
            justify-content: center;
        }

        .portal-ring {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--primary); border-radius: 50%;
            border-top-color: transparent; border-bottom-color: transparent;
            animation: rotate 3s linear infinite;
            box-shadow: 0 0 30px var(--primary);
        }

        .main-logo {
            width: 140px; height: 140px; border-radius: 50%;
            z-index: 2; filter: drop-shadow(0 0 15px var(--primary));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Typography */
        h1 {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.8rem;
            margin: 0; letter-spacing: 5px; text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem; opacity: 0.7; max-width: 400px;
            margin: 15px 0 40px; line-height: 1.6;
        }

        /* Connect Button */
        .connect-btn {
            background: transparent; border: 2px solid var(--primary);
            color: var(--primary); padding: 18px 50px; border-radius: 100px;
            font-family: 'Orbitron'; font-weight: bold; font-size: 1rem;
            text-transform: uppercase; cursor: pointer; transition: 0.5s;
            position: relative; overflow: hidden; letter-spacing: 2px;
        }

        .connect-btn:hover {
            background: var(--primary); color: black;
            box-shadow: 0 0 50px var(--primary); transform: scale(1.05);
        }

        .footer-note {
            position: absolute; bottom: 30px; font-size: 0.8rem;
            opacity: 0.4; letter-spacing: 2px;
        }

    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="hero-section">
        <div class="portal-container">
            <div class="portal-ring"></div>
            <img src="38682.jpg" class="main-logo" alt="Adamas Logo">
        </div>

        <h1>ADAMAS</h1>
        <div style="font-family: 'Orbitron'; color: var(--primary); letter-spacing: 8px; font-size: 1.2rem;">PROTOCOL</div>

        <p>Unlock the future of Web3 mining. Connect your wallet to claim your ABP points and secure your Airdrop.</p>

        <button class="connect-btn" onclick="connectWallet()">Connect Wallet</button>

        <div class="footer-note">V2.0 | SECURE WEB3 ECOSYSTEM</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. THREE.JS Hyper-Drive Background
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const posArray = new Float32Array(starsCount * 3);

        for(let i=0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 15;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.008, color: 0x00f2ff, transparent: true });
        const starsMesh = new THREE.Points(starsGeometry, material);
        scene.add(starsMesh);

        camera.position.z = 2;

        function animate() {
            requestAnimationFrame(animate);
            starsMesh.rotation.z += 0.001;
            starsMesh.position.z += 0.005; // Fast forward effect
            if(starsMesh.position.z > 2) starsMesh.position.z = 0;
            renderer.render(scene, camera);
        }
        animate();

        // 2. Connection Logic
        function connectWallet() {
            // Simulated connection for now
            const mockWallet = "0x997f" + Math.random().toString(16).slice(2, 6) + "..." + "3b29";
            localStorage.setItem('userWallet', "0x997f267154823901723468192347612348123b29");
            
            const btn = document.querySelector('.connect-btn');
            btn.innerText = "CONNECTING...";
            btn.style.borderColor = "#7000ff";
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
    </script>
</body>
</html>
