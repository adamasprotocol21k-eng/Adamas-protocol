<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | Elite Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Landing Page Overlays */
        #phase-intro, #phase-social { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .active-phase { display: flex !important; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .btn-entry { 
            background: transparent; color: var(--cyan); border: 1px solid var(--cyan); 
            padding: 15px 40px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .btn-entry:hover { background: var(--cyan); color: #000; box-shadow: 0 0 30px var(--cyan); }
    </style>
</head>
<body>

    <div class="app-container">
        <section id="phase-intro" class="active-phase">
            <div style="text-align: center;">
                <h1 id="typing-logo" class="glow-text" style="font-family: 'Orbitron'; font-size: 2rem; letter-spacing: 5px;"></h1>
                <p style="font-size: 10px; color: #555; margin-top: 10px; letter-spacing: 3px;">DECENTRALIZED REWARD SYSTEM</p>
                <div style="margin-top: 40px;">
                    <button class="btn-entry" onclick="startJourney()">ENTER SYSTEM</button>
                </div>
            </div>
        </section>

        <section id="phase-social">
            <div class="premium-card" style="width: 90%; max-width: 400px; text-align: center;">
                <h2 style="font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 20px;">NODE <span style="color: var(--cyan);">VALIDATION</span></h2>
                
                <div class="task-list" style="margin-bottom: 25px;">
                    <div class="task-card" onclick="verifyTask(this, 'https://t.me/ADSProtocol')">
                        <div style="text-align: left;">
                            <span style="font-size: 10px; color: var(--cyan);">NODE 01</span>
                            <p style="font-weight: bold; font-size: 13px;">TELEGRAM COMMUNITY</p>
                        </div>
                        <span class="status-icon" style="color: #444;">PENDING</span>
                    </div>

                    <div class="task-card" onclick="verifyTask(this, 'https://x.com/AdamasADS')">
                        <div style="text-align: left;">
                            <span style="font-size: 10px; color: var(--cyan);">NODE 02</span>
                            <p style="font-weight: bold; font-size: 13px;">X PROTOCOL</p>
                        </div>
                        <span class="status-icon" style="color: #444;">PENDING</span>
                    </div>
                </div>

                <button id="connect-wallet-btn" class="btn-primary" onclick="connectWeb3()">CONNECT WALLET</button>
                <p style="font-size: 10px; color: #444; margin-top: 15px;">Secure Web3 connection required for data sync.</p>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
    const ADMIN_WALLET = "0xC9267828a11dB4cb32f0A5Ea5FC29b38FF0fF25e";

    const firebaseConfig = {
      apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
      authDomain: "adamas-protocol-v2.firebaseapp.com",
      databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
      projectId: "adamas-protocol-v2",
      storageBucket: "adamas-protocol-v2.firebasestorage.app",
      messagingSenderId: "197711342782",
      appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef",
      measurementId: "G-FKP19J67TT"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Typing Effect
    const logoText = "ADAMAS PROTOCOL";
    let charIndex = 0;
    function typeEffect() {
        if (charIndex < logoText.length) {
            document.getElementById("typing-logo").innerHTML += logoText.charAt(charIndex);
            charIndex++;
            setTimeout(typeEffect, 80);
        }
    }

    window.onload = () => {
        typeEffect();
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) localStorage.setItem('adamas_referrer', refCode);
    };

    function startJourney() {
        document.getElementById('phase-intro').classList.remove('active-phase');
        document.getElementById('phase-social').classList.add('active-phase');
    }

    function verifyTask(element, link) {
        window.open(link, '_blank');
        element.style.borderColor = "var(--cyan)";
        element.querySelector('.status-icon').innerText = "VERIFIED ✅";
        element.querySelector('.status-icon').style.color = "var(--cyan)";
    }

    async function connectWeb3() {
        if (!window.ethereum && /Android|iPhone|iPad/i.test(navigator.userAgent)) {
            const dappUrl = window.location.href.split('://')[1];
            window.location.href = `https://metamask.app.link/dapp/${dappUrl}`;
            return;
        }

        if (typeof window.ethereum !== 'undefined') {
            try {
                const btn = document.getElementById('connect-wallet-btn');
                btn.innerText = "AUTHORIZING...";
                
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const wallet = accounts[0];
                localStorage.setItem('adamas_user', wallet);

                const isAdmin = wallet.toLowerCase() === ADMIN_WALLET.toLowerCase();
                const userRef = database.ref('users/' + wallet);

                userRef.once('value').then((snapshot) => {
                    if (!snapshot.exists()) {
                        const referrer = localStorage.getItem('adamas_referrer') || "DIRECT";
                        userRef.set({
                            balance: isAdmin ? 1000000 : 0,
                            referredBy: referrer,
                            streak: 0,
                            lastClaim: "NEVER",
                            role: isAdmin ? "FOUNDER" : "USER",
                            joinedAt: new Date().toISOString(),
                            currentMultiplier: isAdmin ? 5.0 : 1.0
                        });
                        if (referrer !== "DIRECT" && !isAdmin) {
                            database.ref('users/' + referrer + '/myReferrals/' + wallet).set(true);
                        }
                    }
                    btn.innerText = "ACCESS GRANTED ✅";
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
                });
            } catch (err) {
                alert("Auth Failed: " + err.message);
                document.getElementById('connect-wallet-btn').innerText = "RETRY CONNECTION";
            }
        } else {
            alert("Please open in MetaMask/Trust Wallet browser.");
        }
    }
    </script>
</body>
</html>
