<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Daily Harvest</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow-y: auto; padding-bottom: 30px; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at 50% -10%, rgba(0, 242, 255, 0.15) 0%, transparent 70%); z-index: -1; }
        
        header { padding: 35px 20px; display: flex; align-items: center; gap: 15px; }
        .back-btn { font-size: 1.5rem; cursor: pointer; opacity: 0.5; }

        .streak-container { padding: 0 20px; }
        .streak-header { text-align: center; margin-bottom: 30px; }
        .streak-header h2 { font-family: 'Orbitron'; font-size: 1.2rem; letter-spacing: 3px; }
        .streak-header p { font-size: 0.65rem; color: #666; margin-top: 5px; }

        /* --- STREAK TRACKER --- */
        .streak-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .day-box { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 15px 5px; text-align: center; transition: 0.3s; }
        .day-box.active { border-color: var(--cyan); background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .day-box.claimed { opacity: 0.3; border-color: transparent; }
        
        .day-num { font-size: 0.5rem; color: #555; font-weight: 800; margin-bottom: 5px; }
        .day-reward { font-family: 'Orbitron'; font-size: 0.7rem; color: #fff; }
        
        /* Special Day 7 Box */
        .day7 { grid-column: span 2; background: linear-gradient(135deg, rgba(255,215,0,0.1), transparent); border-color: rgba(255,215,0,0.3); }
        .day7 .day-reward { color: #ffd700; }

        .main-claim-card { background: var(--glass); border: 1px solid var(--border); border-radius: 25px; padding: 30px; text-align: center; margin-top: 10px; }
        .claim-icon { font-size: 2.5rem; margin-bottom: 15px; }
        
        .btn-harvest { width: 100%; padding: 22px; border-radius: 100px; border: none; font-family: 'Orbitron'; font-weight: 900; font-size: 0.8rem; background: #fff; color: #000; cursor: pointer; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .btn-harvest:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; }
        
        .next-timer { margin-top: 15px; font-size: 0.6rem; color: var(--cyan); font-family: 'Orbitron'; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <header>
        <div class="back-btn" onclick="location.href='dashboard.html'">←</div>
        <div style="font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 2px;">DAILY HARVEST</div>
    </header>

    <div class="streak-container">
        <div class="streak-header">
            <h2>STREAK: <span id="streakCount">0</span> DAYS</h2>
            <p>Maintain your streak to unlock the Day 7 Jackpot.</p>
        </div>

        <div class="streak-grid">
            <div class="day-box" id="day1"><div class="day-num">DAY 1</div><div class="day-reward">100</div></div>
            <div class="day-box" id="day2"><div class="day-num">DAY 2</div><div class="day-reward">150</div></div>
            <div class="day-box" id="day3"><div class="day-num">DAY 3</div><div class="day-reward">300</div></div>
            <div class="day-box" id="day4"><div class="day-num">DAY 4</div><div class="day-reward">400</div></div>
            <div class="day-box" id="day5"><div class="day-num">DAY 5</div><div class="day-reward">500</div></div>
            <div class="day-box" id="day6"><div class="day-num">DAY 6</div><div class="day-reward">600</div></div>
            <div class="day-box day7" id="day7"><div class="day-num">DAY 7</div><div class="day-reward">1000 🔥</div></div>
        </div>

        <div class="main-claim-card">
            <div class="claim-icon">💎</div>
            <div id="rewardText" style="font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 20px;">READY TO HARVEST</div>
            <button class="btn-harvest" id="harvestBtn">CLAIM DAILY ABP</button>
            <div class="next-timer" id="timerDisplay">AVAILABLE NOW</div>
        </div>
    </div>

    <script type="module">
        import { DBModule } from './js/database.js';
        const wallet = localStorage.getItem('userWallet');
        
        let currentStreak = 0;
        let lastClaim = 0;
        const rewards = [100, 150, 300, 400, 500, 600, 1000];

        DBModule.listenToProfile(wallet, (data) => {
            if(data) {
                currentStreak = data.streak || 0;
                lastClaim = data.lastClaim || 0;
                updateUI();
            }
        });

        function updateUI() {
            document.getElementById('streakCount').innerText = currentStreak;
            
            // Highlight current day
            const nextDay = (currentStreak % 7) + 1;
            for(let i=1; i<=7; i++) {
                const el = document.getElementById(`day${i}`);
                el.classList.remove('active', 'claimed');
                if(i < nextDay) el.classList.add('claimed');
                if(i === nextDay) el.classList.add('active');
            }

            // Check if 24 hours passed
            const now = Date.now();
            const hoursPassed = (now - lastClaim) / (1000 * 60 * 60);
            
            if(hoursPassed < 24) {
                const btn = document.getElementById('harvestBtn');
                btn.disabled = true;
                btn.innerText = "ALREADY HARVESTED";
                startTimer(24 - hoursPassed);
            }
        }

        function startTimer(hours) {
            let seconds = Math.floor(hours * 3600);
            const timer = setInterval(() => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                document.getElementById('timerDisplay').innerText = `NEXT: ${h}h ${m}m ${s}s`;
                if(seconds <= 0) {
                    clearInterval(timer);
                    location.reload();
                }
                seconds--;
            }, 1000);
        }

        document.getElementById('harvestBtn').onclick = async () => {
            const reward = rewards[currentStreak % 7];
            try {
                await DBModule.updateBalance(wallet, reward);
                await DBModule.updateStreak(wallet, currentStreak + 1);
                alert(`Successfully harvested ${reward} ABP!`);
                location.reload();
            } catch (e) {
                alert("Harvest failed. Try again.");
            }
        };
    </script>
</body>
</html>
