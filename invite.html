<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div style="padding: 40px 20px; text-align: center;">
        <h2 style="color: var(--binance-yellow);">INVITE & EARN</h2>
        <p style="color: var(--text-sub);">Get 10% of your friend's earnings</p>
        
        <div class="glass-card" style="margin-top: 30px;">
            <small style="color: var(--text-sub);">Your Referral Link</small>
            <div id="refLink" style="font-size: 0.7rem; margin: 15px 0; word-break: break-all; color: var(--neon-blue);">
                adamas.app/?ref=loading...
            </div>
            <button class="btn-neon" onclick="copyRef()">COPY LINK</button>
        </div>

        <div class="glass-card" style="display: flex; justify-content: space-around;">
            <div><small>Invited</small><h3 id="refCount">0</h3></div>
            <div><small>Bonus Earned</small><h3>0 ABP</h3></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="invite.html" class="nav-item active"><span>🔗</span>Invite</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function copyRef() {
            const link = document.getElementById('refLink').innerText;
            navigator.clipboard.writeText(link);
            showNotification("Link Copied to Clipboard!");
        }
        // Referral initialization logic in app.js will update the UI
    </script>
</body>
</html>
