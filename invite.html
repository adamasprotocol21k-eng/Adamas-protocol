<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Invite & Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* All your CSS remains exactly as you provided */
        :root { --primary: #00f2ff; --secondary: #7000ff; --dark: #05060a; --glass: rgba(255, 255, 255, 0.05); --gold: #ffcc00; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }
        .header-section { padding: 15px 20px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(0, 242, 255, 0.1); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding: 8px 15px; background: var(--glass); border-radius: 50px; border: 1px solid rgba(0, 242, 255, 0.1); width: fit-content; }
        .mini-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .top-nav-bar { display: flex; justify-content: space-around; background: rgba(255, 255, 255, 0.03); padding: 12px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.1); }
        .nav-btn { text-decoration: none; color: rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .nav-btn i { font-size: 1.1rem; }
        .nav-btn span { font-size: 0.55rem; font-family: 'Orbitron'; letter-spacing: 1px; }
        .container { padding: 30px 20px 100px; max-width: 500px; margin: auto; text-align: center; }
        .invite-card { background: var(--glass); border-radius: 30px; padding: 30px 20px; border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(20px); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .reward-badge { background: rgba(255, 204, 0, 0.1); color: var(--gold); padding: 10px 20px; border-radius: 50px; font-family: 'Orbitron'; font-size: 0.8rem; display: inline-block; margin-bottom: 20px; border: 1px solid var(--gold); }
        .link-box { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 10px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1); margin: 20px 0; }
        .link-input { background: transparent; border: none; color: white; width: 100%; font-family: 'Rajdhani'; font-size: 0.8rem; outline: none; overflow: hidden; text-overflow: ellipsis; }
        .copy-btn { background: var(--primary); color: black; border: none; padding: 10px 20px; border-radius: 12px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .social-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 0.7rem; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header-section">
        <div class="profile-header">
            <img src="assets/logo.png" id="userAvatar" class="mini-avatar">
            <div id="userName" style="font-weight: bold; font-family: 'Orbitron'; font-size: 0.7rem; color: var(--primary);">LOADING...</div>
        </div>

        <div class="top-nav-bar">
            <a href="dashboard.html" class="nav-btn"><i class="fas fa-th-large"></i><span>HOME</span></a>
            <a href="games.html" class="nav-btn"><i class="fas fa-gamepad"></i><span>GAMES</span></a>
            <a href="wallet.html" class="nav-btn"><i class="fas fa-wallet"></i><span>WALLET</span></a>
            <a href="invite.html" class="nav-btn active"><i class="fas fa-users"></i><span>FRIENDS</span></a>
            <a href="profile.html" class="nav-btn"><i class="fas fa-user-astronaut"></i><span>USER</span></a>
        </div>
    </div>

    <div class="container">
        <div class="invite-card">
            <div class="reward-badge">REFERRAL BONUS: +100 ABP</div>
            <h1 style="font-family: 'Orbitron'; color: var(--primary); font-size: 1.5rem; margin: 10px 0;">REFER & EARN</h1>
            <p style="opacity: 0.7; font-size: 0.9rem;">Invite friends to ADAMAS and get <span style="color:var(--gold)">10%</span> of their rewards directly!</p>

            <div class="link-box">
                <input type="text" id="refLink" class="link-input" value="Connecting Wallet..." readonly>
                <button class="copy-btn" id="copyBtn">COPY</button>
            </div>

            <div class="social-grid">
                <a href="https://t.me/share/url?url=YOUR_LINK_HERE" id="tgShare" class="social-btn"><i class="fab fa-telegram" style="color: #229ED9; font-size: 1.5rem;"></i>TELEGRAM</a>
                <a href="https://twitter.com/intent/tweet?text=Join ADAMAS!" id="twShare" class="social-btn"><i class="fab fa-x-twitter" style="font-size: 1.5rem;"></i>TWITTER</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let userWallet = "";
        let currentBalance = 0;

        async function initInvite() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userWallet = accounts[0];
                
                // 1. Set Referral Link
                const inviteUrl = window.location.origin + "/login.html?ref=" + userWallet;
                document.getElementById('refLink').value = inviteUrl;

                // 2. Update Social Share Links
                document.getElementById('tgShare').href = `https://t.me/share/url?url=${inviteUrl}&text=Join Adamas Protocol and earn ABP tokens!`;
                document.getElementById('twShare').href = `https://twitter.com/intent/tweet?text=Join Adamas Protocol and earn ABP tokens! ${inviteUrl}`;

                // 3. Fetch User Details for Header
                const userPath = 'users/' + userWallet.substring(0, 10);
                onValue(ref(db, userPath), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        currentBalance = data.currentBalance || 0;
                        document.getElementById('userName').innerText = "OPERATOR: " + userWallet.substring(0, 6) + "...";
                        if(data.profilePic) document.getElementById('userAvatar').src = data.profilePic;
                    }
                });
            }
        }

        // Copy Logic
        document.getElementById('copyBtn').addEventListener('click', async () => {
            const link = document.getElementById('refLink').value;
            await navigator.clipboard.writeText(link);
            
            // Optional: Bonus on first copy
            alert("Referral Link Copied! Share it with your friends to earn 10% bonus. 🚀");
        });

        // Background
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(1500), 3));
        const particles = new THREE.Points(geo, new THREE.PointsMaterial({size: 0.005, color: 0x00f2ff}));
        scene.add(particles); camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); } animate();

        window.onload = initInvite;
    </script>
</body>
</html>
