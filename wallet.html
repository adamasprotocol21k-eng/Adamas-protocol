<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="updateUI()">

    <div class="header-pro" style="padding: 20px 15px; text-align: center;">
        <h2 style="color: var(--binance-yellow);">DIGITAL ASSETS</h2>
        <p style="color: var(--text-sub); font-size: 0.7rem;">MANAGE YOUR EXTRACTED ABP TOKENS</p>
    </div>

    <div style="padding: 0 15px;">
        <div class="glass-card" style="text-align: center; border-color: var(--neon-blue);">
            <small style="color: var(--text-sub);">AVAILABLE FOR WITHDRAWAL</small>
            <h1 style="margin: 10px 0;"><span id="balance">0</span> <small style="font-size: 0.8rem;">ABP</small></h1>
        </div>

        <div class="glass-card">
            <h4 style="margin:0 0 15px 0;">WITHDRAWAL REQUEST</h4>
            <label style="font-size: 0.6rem; color: var(--text-sub);">SELECT NETWORK</label>
            <select class="btn-neon" style="width: 100%; background: #000; margin-bottom: 15px; text-align: left;">
                <option>Binance Smart Chain (BEP-20)</option>
                <option>Polygon (Soon)</option>
            </select>

            <label style="font-size: 0.6rem; color: var(--text-sub);">AMOUNT TO WITHDRAW</label>
            <input type="number" id="withdrawAmt" placeholder="Min. 50,000 ABP" class="btn-neon" style="background: #000; text-align: center; margin-bottom: 20px;">
            
            <button class="btn-neon" style="border-color: var(--neon-green); color: var(--neon-green);" onclick="requestWithdraw()">SUBMIT REQUEST</button>
            <p style="font-size: 0.55rem; color: var(--neon-red); text-align: center; margin-top: 10px;">
                Note: Requests are processed within 24-48 hours after manual verification.
            </p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="wallet.html" class="nav-item active"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function requestWithdraw() {
            const amt = parseInt(document.getElementById('withdrawAmt').value);
            if(amt < 50000) {
                alert("Minimum withdrawal is 50,000 ABP!");
                return;
            }
            if(userStats.balance < amt) {
                alert("Insufficient Balance!");
                return;
            }
            
            // Logic to send request to Admin in Firebase
            db.ref('withdrawals').push({
                wallet: userStats.wallet,
                name: userStats.realName,
                amount: amt,
                status: 'pending',
                date: Date.now()
            });

            userStats.balance -= amt;
            saveToFirebase();
            showNotification("Request Submitted! 🚀");
            updateUI();
        }
    </script>
</body>
</html>
