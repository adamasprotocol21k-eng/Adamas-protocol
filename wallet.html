<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="glass-card" style="margin-top: 40px; text-align: center;">
        <p style="color:var(--text-sub)">Network: Polygon Amoy</p>
        <h2 id="balance">0</h2>
        <small>ABP Tokens Available</small>
    </div>

    <div class="glass-card">
        <h4>WITHDRAW ASSETS</h4>
        <input type="text" placeholder="Wallet Address" id="withdrawAddr" class="btn-neon" style="text-align:left; background:#000; color:#fff">
        <p style="font-size:0.6rem; color:var(--text-sub)">Min. Withdraw: 5000 ABP</p>
        <button class="btn-neon" style="background:var(--binance-yellow); color:#000" onclick="handleWithdraw()">PROCESS WITHDRAWAL</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="invite.html" class="nav-item"><span>🔗</span>Invite</a>
        <a href="wallet.html" class="nav-item active"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function handleWithdraw() {
            if(userStats.balance < 5000) {
                alert("Insufficient Balance. You need at least 5000 ABP.");
                return;
            }
            showNotification("Processing on Polygon Amoy...");
            // Yahan par Polygon Transaction ka code aayega
        }
    </script>
</body>
</html>
