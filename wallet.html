<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="updateUI()">

    <div class="news-ticker">
        <div class="ticker-content">
            ⚠️ WITHDRAWAL NOTICE: COMPLETE SOCIAL TASKS TO UNLOCK | 💎 MIN 5,000 ABP REQUIRED
        </div>
    </div>

    <div class="header-pro" style="margin-top: 15px;">
        <h2 style="color: var(--binance-yellow);">🏦 MY ASSETS</h2>
        <p style="font-size: 0.8rem; color: var(--text-sub);">ESTIMATED VALUE: <span class="text-neon-green">$142.50</span></p>
    </div>

    <div style="padding: 0 15px;">
        <div class="glass-card">
            <small>Available Balance</small>
            <h2 id="balance">0</h2>
            <div style="background: rgba(255,255,255,0.05); height: 8px; border-radius: 10px; margin: 15px 0; overflow: hidden;">
                <div id="pBar" style="background: var(--binance-yellow); height: 100%; width: 0%;"></div>
            </div>
            <button class="btn-neon" onclick="alert('Verification Needed!')">WITHDRAW</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="stake.html" class="nav-item"><span>🔐</span>Stake</a>
        <a href="refer.html" class="nav-item"><span>👥</span>Refer</a>
        <a href="wallet.html" class="nav-item active"><span>💰</span>Wallet</a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        window.addEventListener('load', () => {
            let progress = Math.min((userStats.balance / 5000) * 100, 100);
            document.getElementById('pBar').style.width = progress + "%";
        });
    </script>
</body>
</html>
