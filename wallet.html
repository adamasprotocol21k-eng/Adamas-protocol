<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallet | Adamas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="updateAllUI()">
    <div style="padding:20px; text-align:center;">
        <h2 style="color:#F3BA2F;">MY WALLET</h2>
        <div class="balance-card" style="margin:20px; padding:30px; background:#1e2329; border-radius:20px; border:1px solid #F3BA2F;">
            <small style="color:#848e9c">Available for Withdraw</small>
            <h1 style="color:#F3BA2F; margin:10px 0;"><span id="walletBalance">0</span> ABP</h1>
            <div id="userWalletAddr" style="font-size:0.6rem; color:#00ff88; opacity:0.8;">0x...</div>
        </div>

        <div class="glass-card" style="margin:20px; padding:20px;">
            <input type="number" id="wAmt" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; border-radius:10px; text-align:center;" placeholder="Enter ABP (Min 5000)">
            <button class="btn-neon" style="width:100%; margin-top:20px;" onclick="handleWithdraw()">WITHDRAW TO POLYGON</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠 Home</a>
        <a href="games.html" class="nav-item">🎮 Games</a>
        <a href="earn.html" class="nav-item">⛏️ Earn</a>
        <a href="invite.html" class="nav-item">🔗 Invite</a>
        <a href="wallet.html" class="nav-item active">💰 Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function handleWithdraw() {
            const val = document.getElementById('wAmt').value;
            if(window.userStats.balance < val || val < 5000) {
                return showNotification("Check Balance or Minimum Limit (5000)!");
            }
            showNotification("Request Sent to Polygon Network!");
        }
    </script>
</body>
</html>
