<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer & Earn | Adamas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="initReferral()">

    <div class="header" style="padding: 20px; text-align: center;">
        <h2 style="color: var(--neon-green);">REFER & EARN</h2>
        <p style="font-size: 0.9rem;">Get 500 ABP per friend + 1% Daily</p>
    </div>

    <div class="card">
        <h4>Your Referral Link</h4>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="text" id="referLink" readonly style="flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; font-size: 0.8rem;">
            <button class="btn-neon" style="padding: 5px 15px;" onclick="copyLink()">Copy</button>
        </div>
    </div>

    <div class="refer-stats" style="display: flex; gap: 15px; padding: 0 15px;">
        <div class="card" style="flex: 1; text-align: center;">
            <span style="font-size: 0.8rem; color: #8b949e;">Total Invites</span>
            <h2 id="inviteCount" style="margin: 5px 0; color: var(--neon-blue);">0</h2>
        </div>
        <div class="card" style="flex: 1; text-align: center;">
            <span style="font-size: 0.8rem; color: #8b949e;">Referral Earned</span>
            <h2 id="referIncome" style="margin: 5px 0; color: var(--neon-green);">0</h2>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html">🏠<br>Home</a>
        <a href="earn.html">⛏️<br>Earn</a>
        <a href="stake.html">🔐<br>Stake</a>
        <a href="refer.html" class="active">👥<br>Refer</a>
        <a href="wallet.html">💰<br>Wallet</a>
    </nav>

    <script src="js/app.js"></script>
    <script src="js/referral.js"></script>
</body>
</html>
