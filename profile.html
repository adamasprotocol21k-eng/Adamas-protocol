<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-field {
            margin-bottom: 20px;
            text-align: left;
        }
        .profile-field label {
            display: block;
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 5px;
        }
        .profile-field input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 12px;
            border-radius: 10px;
            color: white;
            outline: none;
        }
        .profile-field input:focus {
            border-color: var(--primary-neon);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <a href="dashboard.html" style="position: fixed; top: 20px; left: 20px; color: var(--primary-neon); text-decoration: none; font-size: 0.9rem;">← Back</a>

    <div class="container" style="padding-top: 80px; text-align: center;">
        <div class="glass-card" style="max-width: 450px; margin: auto;">
            <div style="width: 80px; height: 80px; background: var(--primary-neon); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: black; font-weight: bold;" id="profile-initial">
                ?
            </div>
            <h2 style="margin-bottom: 5px;">User Identity</h2>
            <p id="user-wallet-short" style="font-size: 0.8rem; opacity: 0.5; margin-bottom: 30px;">0x...1234</p>

            <form id="profile-form">
                <div class="profile-field">
                    <label>Full Name</label>
                    <input type="text" id="prof-name" placeholder="Enter your real name">
                </div>
                <div class="profile-field">
                    <label>Email Address</label>
                    <input type="email" id="prof-email" placeholder="name@example.com">
                </div>
                
                <div style="background: rgba(255, 204, 0, 0.1); border-radius: 10px; padding: 15px; margin-bottom: 25px; border-left: 4px solid #ffcc00;">
                    <p style="font-size: 0.75rem; color: #ffcc00; margin: 0; text-align: left;">
                        <b>Note:</b> Make sure your name matches your ID for future ADS Token Airdrop verification.
                    </p>
                </div>

                <button type="button" class="neon-btn" style="width: 100%;" onclick="saveProfile()">Save Profile</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Load existing data
        window.addEventListener('DOMContentLoaded', () => {
            if(userData) {
                document.getElementById('prof-name').value = userData.name || "";
                document.getElementById('prof-email').value = userData.email || "";
                document.getElementById('user-wallet-short').innerText = userWallet;
                document.getElementById('profile-initial').innerText = (userData.name || "?")[0].toUpperCase();
            }
        });

        async function saveProfile() {
            const name = document.getElementById('prof-name').value;
            const email = document.getElementById('prof-email').value;

            if(!name || !email) return alert("Please fill all fields!");

            // Update Firebase
            await db.collection("users").doc(userWallet).update({
                name: name,
                email: email
            });

            alert("Profile Secured! Eligibility Updated.");
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
