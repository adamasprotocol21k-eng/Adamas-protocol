<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Identity | ADAMAS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --success: #00ff88; --dark: #05060a; --glass: rgba(255, 255, 255, 0.05); --gold: #ffcc00; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        .status-banner { background: rgba(255, 68, 68, 0.15); color: #ff4444; padding: 12px; border-bottom: 1px solid rgba(255, 68, 68, 0.3); font-family: 'Orbitron'; font-size: 0.65rem; text-align: center; letter-spacing: 2px; backdrop-filter: blur(10px); transition: 0.5s; }
        .status-banner.eligible { background: rgba(0, 255, 136, 0.15); color: var(--success); border-color: var(--success); box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }

        .container { padding: 20px 20px 120px; max-width: 500px; margin: auto; text-align: center; }

        .profile-pic-container { position: relative; width: 120px; height: 120px; margin: 20px auto; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); background: #111; }
        .verify-badge { position: absolute; bottom: 5px; right: 5px; background: var(--success); color: black; width: 28px; height: 28px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 0.8rem; border: 2px solid var(--dark); }

        .section-title { font-family: 'Orbitron'; font-size: 0.7rem; text-align: left; margin: 25px 0 12px; color: var(--primary); letter-spacing: 1px; opacity: 0.8; }

        .task-card { background: var(--glass); border-radius: 20px; padding: 18px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; transition: 0.3s; }
        .task-card:hover { border-color: rgba(0, 242, 255, 0.3); transform: translateY(-2px); }
        .task-info { display: flex; align-items: center; gap: 15px; text-align: left; }
        .task-info i { font-size: 1.2rem; color: var(--primary); width: 25px; text-align: center; }
        .task-name { font-family: 'Orbitron'; font-size: 0.65rem; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        .task-points { font-size: 0.75rem; color: var(--gold); font-weight: bold; }

        .btn-verify { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 18px; border-radius: 10px; font-family: 'Orbitron'; font-size: 0.55rem; cursor: pointer; transition: 0.3s; }
        .btn-verify:hover { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }
        .completed-icon { color: var(--success); font-size: 1.4rem; display: none; animation: scaleIn 0.3s ease-out; }

        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }

        /* Webcam Modal */
        .cam-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #webcam { width: 90%; max-width: 400px; border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 25px; }

        /* Navigation */
        .top-nav-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); margin: 15px; backdrop-filter: blur(10px); }
        .nav-btn { text-decoration: none; color: rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .nav-btn i { font-size: 1.1rem; }
        .nav-btn span { font-size: 0.55rem; font-family: 'Orbitron'; letter-spacing: 1px; }
    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>
    <div id="eligibilityBanner" class="status-banner"><i class="fas fa-lock"></i> ACCOUNT NOT VERIFIED</div>

    <div class="top-nav-bar">
        <a href="dashboard.html" class="nav-btn"><i class="fas fa-th-large"></i><span>HOME</span></a>
        <a href="games.html" class="nav-btn"><i class="fas fa-gamepad"></i><span>GAMES</span></a>
        <a href="wallet.html" class="nav-btn"><i class="fas fa-wallet"></i><span>WALLET</span></a>
        <a href="invite.html" class="nav-btn"><i class="fas fa-users"></i><span>FRIENDS</span></a>
        <a href="profile.html" class="nav-btn active"><i class="fas fa-user-astronaut"></i><span>USER</span></a>
    </div>

    <div class="container">
        <div class="profile-pic-container">
            <img src="https://cdn-icons-png.flaticon.com/512/6596/6596121.png" id="mainAvatar" class="profile-pic">
            <div id="verifiedTick" class="verify-badge"><i class="fas fa-check"></i></div>
        </div>
        <h2 id="dispName" style="margin: 0; font-family: 'Orbitron'; font-size: 1.1rem; letter-spacing: 2px;">NODE OPERATOR</h2>
        <p id="dispWallet" style="opacity: 0.5; font-size: 0.65rem; margin-top: 8px; font-family: monospace; letter-spacing: 1px;">0x00...0000</p>

        <div class="section-title">VERIFICATION TASKS (+700 ABP)</div>
        
        <div class="task-card" id="task-photo">
            <div class="task-info"><i class="fas fa-user-shield"></i><div><span class="task-name">LIVE FACE KYC</span><span class="task-points">+500 ABP</span></div></div>
            <button class="btn-verify" onclick="startKyc()">VERIFY</button><i class="fas fa-check-circle completed-icon"></i>
        </div>
        <div class="task-card" id="task-location">
            <div class="task-info"><i class="fas fa-map-marker-alt"></i><div><span class="task-name">NODE LOCATION</span><span id="locVal" class="task-points">+100 ABP</span></div></div>
            <button class="btn-verify" onclick="syncLocation()">SYNC</button><i class="fas fa-check-circle completed-icon"></i>
        </div>
        <div class="task-card" id="task-email">
            <div class="task-info"><i class="fas fa-envelope"></i><div><span class="task-name">EMAIL VERIFY</span><span class="task-points">+50 ABP</span></div></div>
            <button class="btn-verify" onclick="otpVerify('email', 50)">VERIFY</button><i class="fas fa-check-circle completed-icon"></i>
        </div>
        <div class="task-card" id="task-mobile">
            <div class="task-info"><i class="fas fa-phone"></i><div><span class="task-name">MOBILE LINK</span><span class="task-points">+50 ABP</span></div></div>
            <button class="btn-verify" onclick="otpVerify('mobile', 50)">VERIFY</button><i class="fas fa-check-circle completed-icon"></i>
        </div>
    </div>

    <div class="cam-modal" id="camModal">
        <video id="webcam" autoplay playsinline></video>
        <div style="display:flex; gap:15px;">
            <button class="btn-verify" style="padding:15px 25px; border-color:#ff4444; color:#ff4444;" onclick="closeCam()">CANCEL</button>
            <button class="btn-verify" style="padding:15px 25px; background:var(--primary); color:black;" onclick="captureKyc()">CAPTURE FACE</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, update, onValue, increment } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let userWallet = "", userShort = "";
        let currentBalance = 0;
        let userTasks = { photo: false, location: false, email: false, mobile: false };

        async function initProfile() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) {
                    userWallet = accounts[0];
                    userShort = userWallet.substring(0, 10);
                    document.getElementById('dispWallet').innerText = userWallet;
                    
                    onValue(ref(db, 'users/' + userShort), (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            currentBalance = data.currentBalance || 0;
                            if(data.tasks) syncTaskUI(data.tasks);
                            if(data.profilePic) document.getElementById('mainAvatar').src = data.profilePic;
                        }
                    });
                } else { window.location.href = 'index.html'; }
            }
        }

        function syncTaskUI(tasks) {
            userTasks = { ...userTasks, ...tasks };
            Object.keys(userTasks).forEach(id => {
                if (userTasks[id]) {
                    const card = document.getElementById('task-' + id);
                    if (card) {
                        card.querySelector('.btn-verify').style.display = 'none';
                        card.querySelector('.completed-icon').style.display = 'block';
                    }
                }
            });
            checkEligibility();
        }

        async function completeTask(id, points) {
            const userPath = 'users/' + userShort;
            const updates = {};
            updates[`tasks/${id}`] = true;
            updates[`currentBalance`] = increment(points);
            
            await update(ref(db, userPath), updates);
            alert(`✅ +${points} ABP Security Reward!`);
        }

        // Camera Logic
        window.startKyc = async () => {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('camModal').style.display = 'flex';
                document.getElementById('webcam').srcObject = s;
            } catch (e) { alert("Camera access denied!"); }
        };

        window.closeCam = () => {
            const video = document.getElementById('webcam');
            if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('camModal').style.display = 'none';
        };

        window.captureKyc = async () => {
            const video = document.getElementById('webcam');
            const canvas = document.createElement('canvas');
            canvas.width = 300; canvas.height = 300;
            const ctx = canvas.getContext('2d');
            
            // Circular Crop
            ctx.beginPath();
            ctx.arc(150, 150, 150, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(video, -50, 0, 400, 300); // Center crop
            
            const photoData = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById('mainAvatar').src = photoData;
            
            closeCam();
            await update(ref(db, 'users/' + userShort), { profilePic: photoData });
            completeTask('photo', 500);
        };

        window.syncLocation = () => {
            navigator.geolocation.getCurrentPosition((p) => {
                document.getElementById('locVal').innerText = `LAT: ${p.coords.latitude.toFixed(2)}`;
                completeTask('location', 100);
            }, () => alert("GPS Required for Node Verification"));
        };

        window.otpVerify = (type, pts) => {
            const otp = Math.floor(100000 + Math.random() * 900000);
            alert(`ADAMAS PROTOCOL CODE: ${otp}`);
            const input = prompt("Enter 6-digit verification code:");
            if(input == otp) completeTask(type, pts);
            else alert("Invalid Code!");
        };

        function checkEligibility() {
            if(Object.values(userTasks).every(v => v === true)) {
                const b = document.getElementById('eligibilityBanner');
                b.classList.add('eligible');
                b.innerHTML = `<i class="fas fa-check-circle"></i> ELIGIBLE FOR AIRDROP PHASE 1`;
                document.getElementById('verifiedTick').style.display = 'flex';
            }
        }

        // Background
        const scene = new THREE.Scene();
        const camera3d = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(1500), 3));
        const particles = new THREE.Points(geo, new THREE.PointsMaterial({size: 0.005, color: 0x00f2ff}));
        scene.add(particles); camera3d.position.z = 2;
        function animate() { requestAnimationFrame(animate); particles.rotation.y += 0.001; renderer.render(scene, camera3d); }
        animate();

        window.onload = initProfile;
    </script>
</body>
</html>
