<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sirf Dashboard ke liye specific animations */
        .hero-balance-card {
            background: linear-gradient(145deg, rgba(10,10,10,0.9) 0%, rgba(5,5,5,1) 100%);
            border: 1px solid rgba(130, 71, 229, 0.2); 
            border-radius: 30px; padding: 30px 20px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin-bottom: 25px;
            overflow: hidden;
        }
        
        .mining-engine-vessel {
            width: 180px; height: 180px; margin: 20px auto;
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        .engine-glow {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px dashed rgba(0, 242, 255, 0.2);
            animation: spin 15s linear infinite;
        }

        .mining-trigger-btn {
            width: 140px; height: 140px; border-radius: 50%;
            background: #000; border: 3px solid var(--cyan);
            color: #fff; font-family: 'Orbitron'; font-weight: 900;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            cursor: pointer; z-index: 5; transition: 0.3s; outline: none;
        }

        .mining-trigger-btn.active {
            border-color: var(--p-green);
            box-shadow: 0 0 40px rgba(173, 255, 47, 0.2);
            animation: pulse-green 2s infinite;
        }

        .copy-btn {
            background: var(--cyan); color: #000; border: none;
            padding: 0 15px; border-radius: 12px; font-family: 'Orbitron';
            font-size: 10px; font-weight: 900; cursor: pointer;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-green { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="main-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div class="brand-identity" style="display: flex; align-items: center; gap: 10px;" onclick="window.location.href='profile.html'">
                <div style="background: var(--cyan); width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #000; font-family: 'Orbitron'; font-weight: 900;">A</div>
                <div style="display: flex; flex-direction: column;">
                    <span style="font-family: 'Orbitron'; font-size: 14px; color: #fff; letter-spacing: 2px;">ADAMAS</span>
                    <span style="font-size: 8px; color: #555; letter-spacing: 1px;">PROTOCOL</span>
                </div>
            </div>

            <div style="text-align: right;">
                <div id="user-address" style="font-family: monospace; font-size: 10px; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px;">0x...</div>
                <div style="font-size: 8px; color: var(--p-green); margin-top: 4px; font-family: 'Orbitron';">POLYGON_AMOY_V2 ✅</div>
            </div>
        </header>

        <main>
            <section class="hero-balance-card">
                <p style="font-size: 10px; letter-spacing: 3px; color: #555; font-family: 'Orbitron';">TOTAL_MINED_POINTS</p>
                <h1 id="total-balance" style="font-family: 'Orbitron'; font-size: 2.8rem; margin: 15px 0; font-weight: 900; color: #fff;">0.00</h1>
                <div style="color: var(--cyan); font-family: 'Orbitron'; font-size: 12px; letter-spacing: 4px;">ABP_UNITS</div>
                
                <div style="margin-top: 25px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px;">
                    <div style="display: flex; justify-content: space-between; font-size: 9px; color: var(--cyan); margin-bottom: 8px; font-family: 'Orbitron';">
                        <span>GENESIS_SUPPLY_FILL</span>
                        <span id="scarcity-percent">0%</span>
                    </div>
                    <div style="height: 8px; background: #111; border-radius: 10px; overflow: hidden;">
                        <div id="scarcity-fill" style="width: 0%; height: 100%; background: var(--p-green); transition: 0.5s;"></div>
                    </div>
                </div>
            </section>

            <div class="mining-engine-vessel">
                <div class="engine-glow"></div>
                <button class="mining-trigger-btn" onclick="toggleMining()" id="mining-btn">INITIALIZE</button>
            </div>

            <div style="display: flex; gap: 12px; margin-bottom: 25px;">
                <div class="premium-card" style="flex: 1; text-align: center;">
                    <span style="font-size: 9px; color: #555; font-family: 'Orbitron';">ACTIVE_NODES</span>
                    <span id="ref-count" style="display: block; font-size: 18px; font-family: 'Orbitron'; color: #fff; margin-top: 5px;">0</span>
                </div>
                <div class="premium-card" style="flex: 1; text-align: center;">
                    <span style="font-size: 9px; color: #555; font-family: 'Orbitron';">STREAK</span>
                    <span id="streak-info-dash" style="display: block; font-size: 18px; font-family: 'Orbitron'; color: #fff; margin-top: 5px;">1</span>
                </div>
            </div>

            <div class="premium-card" style="display: flex; justify-content: space-between; align-items: center; border-color: rgba(173, 255, 47, 0.2);">
                <div>
                    <h3 style="font-size: 12px; font-family: 'Orbitron'; color: var(--p-green); margin: 0;">DAILY_PROTOCOL_SYNC</h3>
                    <p id="streak-text" style="font-size: 10px; color: #666; margin-top: 5px;">Claim daily bonus rewards</p>
                </div>
                <button class="btn-primary" id="daily-claim-btn" style="width: auto; padding: 10px 18px; font-size: 11px; background: var(--p-green); color: #000;" onclick="claimDailyBonus()">SYNC</button>
            </div>

            <div class="premium-card" style="background: rgba(255,255,255,0.03);">
                <p style="font-size: 9px; color: var(--cyan); margin-bottom: 12px; font-family: 'Orbitron'; letter-spacing: 1px;">NETWORK_INVITE_LINK</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="ref-link-input" readonly value="LOADING..." 
                           style="flex: 1; background: #000; border: 1px solid #222; color: #888; padding: 12px; border-radius: 12px; font-size: 10px; font-family: monospace; outline: none;">
                    <button class="copy-btn" onclick="copyRefLink()">COPY</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item active">🏠 HOME</a>
            <a href="vault.html" class="nav-item">🔒 VAULT</a>
            <a href="missions.html" class="nav-item">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
    const userWallet = localStorage.getItem('adamas_user');
    if (!userWallet) { window.location.href = "index.html"; }

    const userRef = db.ref('users/' + userWallet);
    let currentBalance = 0;
    let isMining = false;

    function formatABP(num) {
        if (num >= 1000000000) return (num / 1000000000).toFixed(2) + 'B';
        if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return parseFloat(num).toFixed(4);
    }

    userRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            currentBalance = parseFloat(data.balance || 0);
            if(!isMining) updateBalanceUI(currentBalance);
            
            document.getElementById('user-address').innerText = userWallet.substring(0, 6) + "..." + userWallet.slice(-4);
            document.getElementById('streak-info-dash').innerText = data.streak || 1;
            
            const baseUrl = window.location.origin + window.location.pathname.replace('dashboard.html', 'index.html');
            document.getElementById('ref-link-input').value = baseUrl + "?ref=" + userWallet;
            
            db.ref('users').orderByChild('referredBy').equalTo(userWallet).once('value', (refSnap) => {
                document.getElementById('ref-count').innerText = refSnap.numChildren() || 0;
            });

            updateScarcity(currentBalance);
            checkClaimStatus(data.lastClaim);
        }
    });

    function updateBalanceUI(val) {
        document.getElementById('total-balance').innerText = formatABP(val);
    }

    function updateScarcity(bal) {
        const progress = Math.min((bal / 21000) * 100, 100).toFixed(2);
        document.getElementById('scarcity-percent').innerText = progress + "%";
        document.getElementById('scarcity-fill').style.width = progress + "%";
    }

    function toggleMining() {
        if(isMining) return;
        isMining = true;
        const btn = document.getElementById('mining-btn');
        btn.innerText = "MINING...";
        btn.classList.add('active');

        setInterval(() => {
            currentBalance += 0.0001;
            updateBalanceUI(currentBalance);
        }, 1000);

        setInterval(() => {
            userRef.update({ balance: currentBalance });
            db.ref('global_stats/total_forged').transaction(t => (t || 0) + 0.003); 
        }, 30000);
    }

    function checkClaimStatus(lastClaimTime) {
        const btn = document.getElementById('daily-claim-btn');
        if (!lastClaimTime) return;
        const now = new Date().getTime();
        const last = new Date(lastClaimTime).getTime();
        const hoursPassed = (now - last) / (1000 * 60 * 60);
        
        if (hoursPassed < 24) {
            btn.innerText = "SYNCED";
            btn.style.opacity = "0.3";
            btn.style.background = "#222";
            btn.style.pointerEvents = "none";
            document.getElementById('streak-text').innerText = "Next sync in " + (24 - hoursPassed).toFixed(1) + "h";
        }
    }

    async function claimDailyBonus() {
        try {
            await userRef.update({
                balance: firebase.database.ServerValue.increment(10),
                lastClaim: new Date().toISOString()
            });
            alert("Daily Sync Complete! +10 ABP credited.");
        } catch (e) { alert("Sync Failed: " + e.message); }
    }

    function copyRefLink() {
        const copyText = document.getElementById("ref-link-input");
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert("Invite Link Copied!");
    }
</script>
</body>
</html>
