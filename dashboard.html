<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="initDashboard()">

    <div class="header-pro" style="padding: 25px 20px; display: flex; justify-content: space-between;">
        <div><small style="color:var(--text-sub)">Protocol Active</small><h3 id="userNameDisplay" style="margin:0">Miner</h3></div>
        <div id="walletBadge" style="background:var(--glass); padding:5px 12px; border-radius:10px; border:1px solid var(--binance-yellow); font-size:0.7rem; color:var(--binance-yellow)">0x...</div>
    </div>

    <div class="glass-card" style="text-align: center; background: linear-gradient(135deg, #1e2329 0%, #000 100%);">
        <small style="color:var(--text-sub)">Available Assets</small>
        <h1 style="font-size: 3rem; margin: 10px 0; color:var(--binance-yellow)"><span id="balance">0</span> <small style="font-size:1rem">ABP</small></h1>
        <button class="btn-neon" onclick="location.href='earn.html'">Start Mining</button>
    </div>

    <div style="padding: 0 15px;">
        <h4 style="margin-left: 10px;">Protocol Ecosystem</h4>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="glass-card" onclick="location.href='games.html'" style="margin:0; text-align:center"><span>🎮</span><p>Games</p></div>
            <div class="glass-card" onclick="location.href='invite.html'" style="margin:0; text-align:center"><span>👥</span><p>Invite</p></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="invite.html" class="nav-item"><span>🔗</span>Invite</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
