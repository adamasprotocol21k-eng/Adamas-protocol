<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at 50% 35%, rgba(0, 242, 255, 0.18) 0%, transparent 60%); z-index: -1; }
        
        header { padding: 45px 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .wallet-pill { background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan); padding: 8px 15px; border-radius: 12px; font-family: 'Orbitron'; font-size: 0.6rem; color: var(--cyan); letter-spacing: 1px; }
        
        .main-stage { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .bal-val { font-family: 'Orbitron'; font-size: 3.8rem; font-weight: 900; text-shadow: 0 0 30px var(--cyan); margin: 10px 0; }
        
        .bento-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .bento-card { background: var(--glass); border: 1px solid var(--border); padding: 22px; border-radius: 25px; backdrop-filter: blur(15px); transition: 0.3s; }
        .bento-card:active { transform: scale(0.95); border-color: var(--cyan); }
        .bento-card h4 { font-size: 0.55rem; color: #666; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
        .bento-card p { font-family: 'Orbitron'; font-size: 1.1rem; font-weight: 900; margin-top: 5px; }

        .harvest-btn { margin: 25px 20px; background: #fff; color: #000; padding: 22px; border-radius: 100px; text-align: center; font-family: 'Orbitron'; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; box-shadow: 0 10px 30px rgba(255,255,255,0.1); cursor: pointer; }
        
        .nav-bar { position: fixed; bottom: 35px; left: 20px; right: 20px; background: rgba(10,10,10,0.85); padding: 18px; border-radius: 25px; display: flex; justify-content: space-around; border: 1px solid var(--border); backdrop-filter: blur(20px); }
        .nav-item { font-size: 1.3rem; opacity: 0.3; transition: 0.3s; cursor: pointer; }
        .active { opacity: 1; color: var(--cyan); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <header>
        <div class="wallet-pill" id="walletDisplay">LINKING...</div>
        <div style="opacity: 0.3; font-size: 1.5rem;" onclick="location.href='admin.html'">⚙️</div>
    </header>

    <div class="main-stage">
        <p style="font-size: 0.5rem; letter-spacing: 6px; color: #444; font-weight: 900;">TOTAL ABP ASSETS</p>
        <div class="bal-val" id="userBalance">0</div>
        <p style="color: var(--cyan); font-size: 0.5rem; letter-spacing: 2px; font-family: 'Orbitron'; font-weight: 800;">ADAMAS ELITE PROTOCOL</p>
    </div>

    <div class="bento-grid">
        <div class="bento-card" onclick="location.href='mines.html'">
            <h4>Arcade</h4>
            <p>MINES 💣</p>
        </div>
        <div class="bento-card" onclick="location.href='staking.html'">
            <h4>Quantum</h4>
            <p>VAULT 🛡️</p>
        </div>
        <div class="bento-card">
            <h4>Energy</h4>
            <p id="userEnergy">100% ⚡</p>
        </div>
        <div class="bento-card" onclick="location.href='referral.html'">
            <h4>Network</h4>
            <p>FLEET 🚀</p>
        </div>
    </div>

    <div class="harvest-btn" id="claimBtn">INITIALIZE HARVEST</div>

    <div class="nav-bar">
        <div class="nav-item active">🏠</div>
        <div class="nav-item" onclick="location.href='game.html'">🎮</div>
        <div class="nav-item" onclick="location.href='wallet.html'">🏦</div>
        <div class="nav-item" onclick="location.href='profile.html'">👤</div>
    </div>

    <script type="module">
        import { DBModule } from './js/database.js';
        const wallet = localStorage.getItem('userWallet');
        
        if(!wallet) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('walletDisplay').innerText = wallet.substring(0,6) + "..." + wallet.substring(wallet.length-4);
            
            // Real-time Firebase Link
            DBModule.listenToProfile(wallet, (data) => {
                if(data) {
                    document.getElementById('userBalance').innerText = (data.balance || 0).toLocaleString();
                    document.getElementById('userEnergy').innerText = (data.energy || 100) + "% ⚡";
                }
            });
        }
    </script>
</body>
</html>
