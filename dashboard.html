<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | The Galaxy Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ffffff;
            --sub-text: #636366;
            --bg-black: #000000;
            --neon-blue: #0A84FF;
        }

        body {
            margin: 0; background: var(--bg-black);
            color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* --- 1. DYNAMIC MESH BACKGROUND (Very Expensive Look) --- */
        .mesh-gradient {
            position: fixed; width: 100vw; height: 100vh;
            background: 
                radial-gradient(at 0% 0%, rgba(10, 132, 255, 0.15) 0%, transparent 50%),
                radial-gradient(at 100% 0%, rgba(191, 90, 242, 0.15) 0%, transparent 50%);
            z-index: -1;
        }

        /* --- 2. LUXURY HEADER --- */
        header {
            padding: 40px 25px; display: flex; justify-content: space-between; align-items: flex-start;
        }
        .founder-label { font-size: 0.6rem; letter-spacing: 4px; color: var(--sub-text); font-weight: 800; }
        .wallet-pill {
            background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1);
            padding: 8px 16px; border-radius: 100px; font-size: 0.7rem; font-weight: 600;
            backdrop-filter: blur(10px);
        }

        /* --- 3. MAIN ASSET DISPLAY (The Core) --- */
        .asset-hero {
            text-align: center; margin-top: 10vh; padding: 0 20px;
        }
        .main-balance-label { font-size: 0.7rem; color: var(--sub-text); letter-spacing: 5px; margin-bottom: 10px; }
        .balance-value { 
            font-size: 4.5rem; font-family: 'Inter', sans-serif; font-weight: 900; 
            letter-spacing: -4px; margin: 0; position: relative;
        }
        .currency-tag { font-size: 1rem; color: var(--neon-blue); letter-spacing: 3px; font-weight: 800; }

        /* --- 4. RICH CARDS (Floating Deck) --- */
        .deck-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            padding: 40px 25px; margin-top: 20px;
        }
        .rich-card {
            background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.08);
            border-radius: 32px; padding: 25px; backdrop-filter: blur(20px);
            transition: 0.4s cubic-bezier(0.2, 0, 0, 1);
        }
        .rich-card:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }
        .card-icon { font-size: 1.5rem; margin-bottom: 15px; display: block; }
        .card-label { font-size: 0.55rem; color: var(--sub-text); letter-spacing: 2px; font-weight: 800; }
        .card-val { font-size: 1.2rem; font-weight: 800; margin-top: 8px; }

        /* --- 5. THE "RICH-TOUCH" ACTION HUB --- */
        .hub-dock {
            position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(255,255,255,0.03);
            padding: 10px; border-radius: 100px; border: 0.5px solid rgba(255,255,255,0.1);
        }
        .hub-item {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255,255,255,0.05); display: flex; 
            justify-content: center; align-items: center; font-size: 1.2rem;
        }

        /* --- 6. PRESTIGE CLAIM BUTTON --- */
        .prestige-btn {
            position: fixed; bottom: 100px; left: 5%; width: 90%;
            background: var(--accent); color: black; padding: 22px;
            border-radius: 24px; font-size: 0.8rem; font-weight: 900;
            text-align: center; letter-spacing: 2px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="mesh-gradient"></div>

    <header>
        <div>
            <div class="founder-label">ADAMAS PROTOCOL</div>
            <div style="font-weight: 200; font-size: 1.5rem;">The Galaxy Vault</div>
        </div>
        <div class="wallet-pill" id="walletDisplay">0X...7DAB</div>
    </header>

    <div class="asset-hero">
        <div class="main-balance-label">PORTFOLIO VALUE</div>
        <h1 class="balance-value" id="userBalance">3,003</h1>
        <div class="currency-tag">ABP CORE</div>
    </div>

    <div class="deck-container">
        <div class="rich-card" onclick="window.location.href='staking.html'">
            <span class="card-icon">🛡️</span>
            <span class="card-label">VAULT STAKED</span>
            <div class="card-val" id="userStaked" style="color: var(--neon-blue);">0</div>
        </div>
        <div class="rich-card">
            <span class="card-icon">⚡</span>
            <span class="card-label">SYSTEM ENERGY</span>
            <div class="card-val" id="userEnergy" style="color: #34C759;">100%</div>
        </div>
    </div>

    <div class="hub-dock">
        <div class="hub-item" onclick="window.location.href='game.html'">🕹️</div>
        <div class="hub-item" onclick="window.location.href='mines.html'">💣</div>
        <div class="hub-item" onclick="window.location.href='referral.html'">🚀</div>
        <div class="hub-item" onclick="window.location.href='admin.html'">⚙️</div>
    </div>

    <div class="prestige-btn" onclick="alert('Accessing Daily Rewards...')">
        EXECUTE DAILY PROTOCOL
    </div>

    <div id="navbar-placeholder"></div>

    <script type="module">
        import { DBModule } from './js/database.js';
        // Your logic to update values...
    </script>
    <script src="js/nav.js"></script>
</body>
</html>
