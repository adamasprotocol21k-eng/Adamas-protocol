<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | Adamas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="updateAllUI()">

    <div style="position: sticky; top: 0; background: #181a20; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; z-index: 1000;">
        <div style="font-weight: 900; color: #F3BA2F; font-size: 1.2rem;">ADAMAS</div>
        <div style="background: #1e2329; padding: 8px 15px; border-radius: 50px; border: 1px solid #F3BA2F;">
            <span id="balance" style="font-weight: bold; color: #fff;">0</span> <small style="color: #F3BA2F;">ABP</small>
        </div>
    </div>

    <div style="padding: 20px; padding-bottom: 100px;">
        <div class="glass-card" style="padding: 20px; margin-bottom: 20px; text-align: center;">
            <p style="color: #848e9c; font-size: 0.8rem; margin: 0;">Total Assets</p>
            <h1 style="margin: 10px 0; font-size: 2.5rem;">$ <span id="usdVal">0.00</span></h1>
            <p id="userWalletAddr" style="font-size: 0.7rem; color: #555; word-break: break-all;">0x...</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="glass-card" onclick="location.href='games.html'" style="padding: 20px; text-align: center; cursor: pointer;">
                <div style="font-size: 1.5rem; margin-bottom: 10px;">🎮</div>
                <div style="font-weight: bold; font-size: 0.9rem;">PLAY GAMES</div>
            </div>
            <div class="glass-card" onclick="location.href='earn.html'" style="padding: 20px; text-align: center; cursor: pointer;">
                <div style="font-size: 1.5rem; margin-bottom: 10px;">⛏️</div>
                <div style="font-weight: bold; font-size: 0.9rem;">MINING</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">🏠 Home</a>
        <a href="games.html" class="nav-item">🎮 Games</a>
        <a href="earn.html" class="nav-item">⛏️ Earn</a>
        <a href="wallet.html" class="nav-item">💰 Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
