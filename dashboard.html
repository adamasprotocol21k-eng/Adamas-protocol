<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adamas Dashboard | Testnet v1</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&display=swap" rel="stylesheet">
</head>
<body class="dash-body">

    <header class="fixed-header">
        <div class="user-info">
            <span class="testnet-badge">AMOY TESTNET</span>
            <div id="walletAddr" class="wallet-pilla">0x...0000</div>
        </div>
        <div class="balance-card">
            <span class="dia-icon">💎</span>
            <span id="balance">1250</span> <small>ABP</small>
        </div>
    </header>

    <main class="content-area">
        <section class="pro-card mining-section">
            <div class="flex-row">
                <h4>ADS MINING NODE</h4>
                <span class="live-indicator">● ACTIVE</span>
            </div>
            <div class="mining-visual">
                <div class="diamond-pulse">💎</div>
                <h2 id="liveAds">0.0000</h2>
            </div>
        </section>

        <div class="game-grid">
            <div class="game-item pro-card" onclick="openGame('spin')">
                <span class="icon">🎡</span> <h4>SPIN</h4>
            </div>
            <div class="game-item pro-card" onclick="openGame('scratch')">
                <span class="icon">🎫</span> <h4>SCRATCH</h4>
            </div>
            <div class="game-item pro-card" onclick="openGame('mines')">
                <span class="icon">💣</span> <h4>MINES</h4>
                <small class="badge-new">NEW</small>
            </div>
            <div class="game-item pro-card" onclick="openGame('patti')">
                <span class="icon">🃏</span> <h4>3D PATTI</h4>
                <small class="badge-new">NEW</small>
            </div>
        </div>
    </main>

    <div id="gameModal" class="modal-overlay">
        <div class="modal-content glass-effect">
            <span class="close-btn" onclick="closeGame()">&times;</span>
            <div id="gameContainer"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-btn active">🏠</div>
        <div class="nav-btn">🏆</div>
        <div class="nav-btn">💳</div>
    </nav>

    <script src="js/ui.js"></script>
    <script src="js/game-mines.js"></script>
    <script src="js/game-patti.js"></script>
</body>
</html>
