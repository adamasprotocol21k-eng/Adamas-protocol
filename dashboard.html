<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Cosmic Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --emerald: #00ff88;
            --deep-space: #020205;
            --galaxy-blue: #00f2ff;
        }

        body {
            margin: 0; background: var(--deep-space); color: white;
            font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* --- 🌌 GALAXY BACKGROUND ANIMATION --- */
        .universe {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1a1a2e, #020205);
            z-index: -2;
        }

        .stars-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.1; z-index: -1;
        }

        /* --- LUXURY HEADER --- */
        .header-lux {
            padding: 25px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .brand-title {
            font-family: 'Orbitron', sans-serif; font-size: 0.9rem;
            letter-spacing: 3px; color: var(--gold); margin: 0;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3));
        }

        /* --- MAIN BALANCE CARD --- */
        .vault-hero {
            margin: 25px 20px; padding: 45px 20px;
            background: rgba(255, 255, 255, 0.03); border-radius: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3); text-align: center;
            position: relative; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .vault-hero::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--galaxy-blue), transparent);
            animation: rotate-nebula 10s infinite linear; opacity: 0.05; z-index: -1;
        }
        @keyframes rotate-nebula { 100% { transform: rotate(360deg); } }

        .balance-val {
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem;
            font-weight: 900; margin: 10px 0;
            background: linear-gradient(180deg, #fff 40%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.2));
        }

        /* --- SHINING DAILY BUTTON --- */
        .daily-btn {
            background: linear-gradient(45deg, #FFD700, #F3E5AB, #FFD700);
            background-size: 200% auto;
            color: black; border: none; padding: 18px 30px;
            border-radius: 100px; font-weight: 800; font-size: 0.85rem;
            width: 85%; margin: 0 auto 35px; display: block;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
            cursor: pointer; transition: 0.4s; letter-spacing: 1px;
        }
        .daily-btn:hover { background-position: right center; transform: translateY(-3px); }
        .daily-btn:active { transform: scale(0.95); }

        /* --- INTERACTIVE ACTION GRID --- */
        .grid-actions {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px;
        }

        .tile {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 30px 10px; text-align: center;
            transition: 0.3s; cursor: pointer; position: relative; overflow: hidden;
        }
        .tile:active { transform: scale(0.92); border-color: var(--gold); }
        .tile::after {
            content: ''; position: absolute; top: -100%; left: -100%; width: 50%; height: 300%;
            background: rgba(255,255,255,0.1); transform: rotate(45deg); transition: 0.5s;
        }
        .tile:hover::after { left: 150%; }

        /* --- MODERN GALAXY DOCK --- */
        .nav-dock {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: rgba(5, 6, 12, 0.85);
            backdrop-filter: blur(25px); border-radius: 100px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            display: flex; justify-content: space-around; padding: 12px 5px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 1000;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #555; transition: 0.3s; min-width: 60px; }
        .nav-item.active { color: var(--galaxy-blue); filter: drop-shadow(0 0 8px var(--galaxy-blue)); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
        .nav-text { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .eligibility-dot { position: absolute; top: 0; right: 10px; width: 8px; height: 8px; background: var(--emerald); border-radius: 50%; box-shadow: 0 0 10px var(--emerald); }
    </style>
</head>
<body>

    <div class="universe"></div>
    <div class="stars-bg"></div>

    <header class="header-lux">
        <h1 class="brand-title">ADAMAS PROTOCOL</h1>
        <div id="userAddr" style="font-size: 0.65rem; color: #888; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);">
            0x00...000
        </div>
    </header>

    <section class="vault-hero">
        <p style="font-size: 0.6rem; letter-spacing: 5px; color: #888; margin-bottom: 10px;">TOTAL TREASURY</p>
        <div class="balance-val" id="balanceDisplay">0.00</div>
        <div style="margin-top: 15px;">
            <span style="border: 1px solid var(--galaxy-blue); padding: 5px 15px; border-radius: 50px; font-size: 0.6rem; color: var(--galaxy-blue); font-weight: 800; background: rgba(0, 242, 255, 0.05);">
                ELIGIBILITY: <span id="eligibilityPerc">0</span>% READY
            </span>
        </div>
    </section>

    <button class="daily-btn" onclick="RewardsModule.claimDailyBonus()">
        ✨ CLAIM COSMIC REWARD
    </button>

    <div class="grid-actions">
        <div class="tile" onclick="Notify.show('Hyper-Spin Initializing...', 'info')">
            <span style="font-size: 30px;">🌀</span><br>
            <span style="font-size: 0.6rem; color: var(--gold); font-weight: 800; letter-spacing: 1px;">NEON SPIN</span>
        </div>
        <div class="tile" onclick="window.location.href='admin.html'">
            <span style="font-size: 30px;">🛡️</span><br>
            <span style="font-size: 0.6rem; color: var(--gold); font-weight: 800; letter-spacing: 1px;">GOVERNANCE</span>
        </div>
    </div>

    <nav class="nav-dock">
        <a href="#" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Home</span>
        </a>
        <a href="#" class="nav-item" onclick="Notify.show('Gaming Sector Locked', 'info')">
            <span class="nav-icon">🎮</span>
            <span class="nav-text">Games</span>
        </a>
        <a href="#" class="nav-item" onclick="Notify.show('Knowledge Base v1.0', 'info')">
            <span class="nav-icon">📖</span>
            <span class="nav-text">Learn</span>
        </a>
        <a href="#" class="nav-item" onclick="Notify.show('Referral Link Copied!', 'success')">
            <span class="nav-icon">👥</span>
            <span class="nav-text">Invite</span>
        </a>
        <a href="#" class="nav-item" onclick="openWallet()">
            <div class="eligibility-dot"></div>
            <span class="nav-icon">💰</span>
            <span class="nav-text">Wallet</span>
        </a>
    </nav>

    <script src="js/notify.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/rewards.js"></script>

    <script type="module">
        import { DBModule } from './js/database.js';

        window.addEventListener('DOMContentLoaded', async () => {
            const wallet = localStorage.getItem('userWallet');
            if(!wallet) return window.location.href = "index.html";

            // UI Initial Set
            document.getElementById('userAddr').innerText = wallet.substring(0,6) + '...' + wallet.substring(wallet.length-4);

            // REAL-TIME SYNC (Important!)
            DBModule.listenToUpdates(wallet, (data) => {
                if(data) {
                    // Update Balance with Commas
                    document.getElementById('balanceDisplay').innerText = data.balance.toLocaleString();
                    
                    // Update Eligibility Progress
                    const prog = Math.min((data.balance / 1000) * 100, 100);
                    document.getElementById('eligibilityPerc').innerText = Math.floor(prog);
                }
            });
        });

        window.openWallet = () => {
            const bal = document.getElementById('balanceDisplay').innerText;
            const elig = document.getElementById('eligibilityPerc').innerText;
            Notify.show(`Vault: ${bal} ABP | Status: ${elig}% Eligible`, 'success');
        };
    </script>
</body>
</html>
