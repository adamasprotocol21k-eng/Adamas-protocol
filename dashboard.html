<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Premium Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        :root {
            --luxury-gold: #D4AF37; /* Pure Gold */
            --soft-gold: #f3e5ab;
            --black-diamond: #050609;
            --emerald: #00ff88;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--black-diamond);
            color: #ffffff;
            margin: 0;
            padding-bottom: 120px;
        }

        /* --- LUXURY TEXT COLORS --- */
        .gold-text {
            color: var(--luxury-gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            font-weight: 800;
        }

        .dim-text { color: #b0b0b0; font-size: 0.75rem; }

        /* --- DASHBOARD FEATURES --- */
        .feature-container { padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .lux-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .lux-card:hover {
            border-color: var(--luxury-gold);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-5px);
        }

        /* --- DYNAMIC BALANCE SECTION --- */
        .vault-hero {
            margin: 30px 20px;
            padding: 45px 20px;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.15), transparent 80%);
            border-radius: 35px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
        }

        .balance-num {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 10px 0;
            color: #ffffff; /* Bright White for readability */
            letter-spacing: -2px;
        }

        /* --- NAVIGATION --- */
        .nav-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            border-radius: 40px; border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; justify-content: space-around; padding: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .nav-btn { text-align: center; text-decoration: none; color: #777; transition: 0.3s; }
        .nav-btn.active { color: var(--luxury-gold); }
    </style>
</head>
<body>

    <header style="padding: 25px 20px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 45px; height: 45px; border: 1px solid var(--luxury-gold); border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #000;">
                <span style="color: var(--luxury-gold); font-weight: 900; font-family: 'Cinzel';">A</span>
            </div>
            <div>
                <p id="userAddr" class="gold-text" style="margin:0; font-size: 0.9rem;">0x00...000</p>
                <p style="margin:0; font-size: 0.6rem; color: var(--emerald); font-weight: bold;">VERIFIED FOUNDER ●</p>
            </div>
        </div>
        <div onclick="AuthModule.logout()" style="font-size: 20px; cursor: pointer;">🔌</div>
    </header>

    <section class="vault-hero">
        <p class="dim-text" style="letter-spacing: 3px; font-weight: 800;">TOTAL ASSETS</p>
        <h1 class="balance-num" id="balanceDisplay">0.00</h1>
        <div style="display: inline-block; padding: 6px 15px; background: rgba(212, 175, 55, 0.1); border-radius: 50px; border: 1px solid var(--luxury-gold);">
            <span style="font-size: 0.75rem; font-weight: 800; color: var(--luxury-gold);">ELIGIBILITY: <span id="eligPerc">0</span>%</span>
        </div>
    </section>

    <div class="feature-container">
        
        <div class="lux-card" onclick="RewardsModule.claimDailyBonus()">
            <span style="font-size: 30px; display: block; margin-bottom: 10px;">💎</span>
            <span class="gold-text" style="font-size: 0.8rem;">DAILY CLAIM</span>
            <p class="dim-text">+100 ABP</p>
        </div>

        <div class="lux-card" onclick="Notify.show('Spin Wheel Loading...', 'info')">
            <span style="font-size: 30px; display: block; margin-bottom: 10px;">🎡</span>
            <span class="gold-text" style="font-size: 0.8rem;">LUCKY WHEEL</span>
            <p class="dim-text">Win Big</p>
        </div>

        <div class="lux-card" onclick="Notify.show('Link copied to clipboard!', 'success')">
            <span style="font-size: 30px; display: block; margin-bottom: 10px;">👥</span>
            <span class="gold-text" style="font-size: 0.8rem;">REFERRAL</span>
            <p class="dim-text">Earn 10%</p>
        </div>

        <div class="lux-card" onclick="window.location.href='admin.html'">
            <span style="font-size: 30px; display: block; margin-bottom: 10px;">🛡️</span>
            <span class="gold-text" style="font-size: 0.8rem;">GOVERNANCE</span>
            <p class="dim-text">Founder Panel</p>
        </div>

    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-btn active"><span>🏠</span><br><span style="font-size: 0.6rem; font-weight: bold;">HOME</span></a>
        <a href="#" class="nav-btn"><span>🎮</span><br><span style="font-size: 0.6rem; font-weight: bold;">GAMES</span></a>
        <a href="#" class="nav-btn"><span>💰</span><br><span style="font-size: 0.6rem; font-weight: bold;">WALLET</span></a>
        <a href="admin.html" class="nav-btn"><span>🛡️</span><br><span style="font-size: 0.6rem; font-weight: bold;">FOUNDER</span></a>
    </nav>

    <script src="js/notify.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/rewards.js"></script>

    <script type="module">
        import { DBModule } from './js/database.js';

        window.addEventListener('DOMContentLoaded', async () => {
            const wallet = localStorage.getItem('userWallet');
            if (!wallet) return window.location.href = "index.html";

            // Update UI with wallet
            const shortAddr = wallet.substring(0, 6) + "..." + wallet.substring(wallet.length - 4);
            document.getElementById('userAddr').innerText = shortAddr;

            // Sync with Database
            const data = await DBModule.getUserData(wallet);
            if (data) {
                document.getElementById('balanceDisplay').innerText = parseFloat(data.balance).toLocaleString();
                const prog = Math.min((data.balance / 1000) * 100, 100);
                document.getElementById('eligPerc').innerText = Math.floor(prog);
            }
        });
    </script>
</body>
</html>
