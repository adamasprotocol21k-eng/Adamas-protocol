<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ADAMAS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
            background: radial-gradient(circle at top right, #0a0b14, #05060a);
        }

        .container { padding: 20px; max-width: 500px; margin: auto; padding-bottom: 100px; }

        /* --- Header Section --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .wallet-display { 
            font-family: 'Orbitron'; font-size: 0.6rem; color: var(--primary);
            background: var(--glass); padding: 5px 12px; border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        /* --- Balance Card --- */
        .balance-card {
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.2), rgba(0, 242, 255, 0.1));
            border-radius: 25px; padding: 30px 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px;
        }
        .main-balance { font-size: 2.8rem; font-weight: 700; margin: 10px 0; font-family: 'Orbitron'; text-shadow: 0 0 20px var(--primary); }
        .currency { font-size: 1rem; color: var(--gold); margin-left: 5px; }

        /* --- Action Hub --- */
        .action-hub { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .action-item { text-align: center; cursor: pointer; text-decoration: none; color: white; }
        .icon-box {
            width: 50px; height: 50px; background: var(--glass); border-radius: 15px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; font-size: 1.2rem;
        }
        .action-item:hover .icon-box { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }
        .action-item span { font-size: 0.6rem; font-family: 'Orbitron'; opacity: 0.7; }

        /* --- Daily Reward --- */
        .reward-bar {
            background: var(--glass); border-radius: 15px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;
        }
        .btn-claim {
            background: var(--primary); color: black; border: none; padding: 8px 20px;
            border-radius: 50px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
        }
        .btn-claim:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* --- Nav --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px); border-radius: 25px; padding: 12px;
            display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-link { color: rgba(255,255,255,0.4); text-decoration: none; text-align: center; }
        .nav-link.active { color: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }
        .nav-link i { font-size: 1.2rem; }
        .nav-link span { display: block; font-size: 0.5rem; font-family: 'Orbitron'; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h3 style="margin:0; font-family: 'Orbitron';">ADAMAS</h3>
                <div class="wallet-display" id="walletAddr">CONNECTING...</div>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 0.6rem; color: var(--success);"><i class="fas fa-circle"></i> MAINNET</div>
            </div>
        </div>

        <div class="balance-card">
            <div style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px;">TOTAL ASSETS</div>
            <div class="main-balance" id="totalBalance">0.00<span class="currency">ABP</span></div>
        </div>

        <div class="reward-bar">
            <div>
                <div style="font-size: 0.7rem; font-family: 'Orbitron'; color: var(--primary);">DAILY BONUS</div>
                <div id="checkinStatus" style="font-size: 0.6rem; opacity: 0.7;">Checking status...</div>
            </div>
            <button id="checkinBtn" class="btn-claim" onclick="claimDaily()">CLAIM</button>
        </div>

        <div class="action-hub">
            <a href="rewards.html" class="action-item"><div class="icon-box"><i class="fas fa-ticket-alt"></i></div><span>SCRATCH</span></a>
            <a href="games.html" class="action-item"><div class="icon-box"><i class="fas fa-dice"></i></div><span>CASINO</span></a>
            <a href="rewards.html" class="action-item"><div class="icon-box"><i class="fas fa-sync-alt"></i></div><span>SPIN</span></a>
            <a href="earn.html" class="action-item"><div class="icon-box"><i class="fas fa-coins"></i></div><span>EARN</span></a>
        </div>

        <div style="background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);">
            <div style="display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.6rem; margin-bottom: 10px;">
                <span>AIRDROP ELIGIBILITY</span>
                <span id="progressText">0%</span>
            </div>
            <div style="width:100%; height:6px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden;">
                <div id="barFill" style="width:0%; height:100%; background:var(--primary); box-shadow: 0 0 10px var(--primary);"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-link active"><i class="fas fa-th-large"></i><span>HOME</span></a>
        <a href="games.html" class="nav-link"><i class="fas fa-gamepad"></i><span>GAMES</span></a>
        <a href="wallet.html" class="nav-link"><i class="fas fa-wallet"></i><span>WALLET</span></a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user-astronaut"></i><span>USER</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let userWallet = "";
        let currentBalance = 0;

        // --- 1. Real Metamask Connection ---
        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userWallet = accounts[0];
                    const shortAddr = userWallet.substring(0, 6) + "..." + userWallet.substring(userWallet.length - 4);
                    document.getElementById('walletAddr').innerText = shortAddr;
                    
                    startAppLogic();
                } catch (err) {
                    document.getElementById('walletAddr').innerText = "CONNECTION FAILED";
                }
            } else {
                alert("Please install Metamask!");
            }
        }

        // --- 2. Main Logic after Connection ---
        function startAppLogic() {
            const userPath = 'users/' + userWallet.substring(0, 10);
            
            // Fetch and Init User
            onValue(ref(db, userPath), (snapshot) => {
                let data = snapshot.val();
                
                // Agar user naya hai toh database mein create karein
                if (!data) {
                    set(ref(db, userPath), {
                        currentBalance: 0,
                        lastCheckin: 0,
                        checkinDay: 0,
                        address: userWallet
                    });
                    return;
                }

                currentBalance = data.currentBalance || 0;
                document.getElementById('totalBalance').innerHTML = `${parseFloat(currentBalance).toLocaleString()}<span class="currency">ABP</span>`;
                
                // Progress Logic
                updateProgress(data);
                // Checkin Logic
                checkDailyStatus(data, userPath);
            });
        }

        function updateProgress(data) {
            let tasksDone = 0;
            if(data.tasks) tasksDone = Object.values(data.tasks).filter(v => v === true).length;
            const percent = Math.min((tasksDone / 4) * 100, 100);
            document.getElementById('barFill').style.width = percent + '%';
            document.getElementById('progressText').innerText = percent + '%';
        }

        function checkDailyStatus(data, path) {
            const lastTime = data.lastCheckin || 0;
            const now = Date.now();
            const diff = now - lastTime;
            const btn = document.getElementById('checkinBtn');
            const statusText = document.getElementById('checkinStatus');

            if (diff < 86400000) {
                btn.disabled = true;
                btn.innerText = "DONE";
                statusText.innerText = "Reward Claimed Today!";
            } else {
                btn.disabled = false;
                btn.innerText = "CLAIM";
                statusText.innerText = "100 ABP Reward Ready";
            }
        }

        window.claimDaily = async () => {
            const userPath = 'users/' + userWallet.substring(0, 10);
            await update(ref(db, userPath), {
                currentBalance: currentBalance + 100,
                lastCheckin: Date.now()
            });
            alert("100 ABP Added!");
        };

        // Initialize on load
        window.addEventListener('load', connectWallet);
    </script>
</body>
</html>
