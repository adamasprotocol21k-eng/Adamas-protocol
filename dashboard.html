<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Protocol Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --emerald: #00ff88;
            --deep-space: #020205;
        }

        body {
            margin: 0; background: var(--deep-space); color: white;
            font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 100px;
        }

        /* Galaxy Background Effect */
        .universe {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1a1a2e, #020205);
            z-index: -1;
        }

        /* 1. Updated Header: ADAMAS PROTOCOL */
        .header-lux {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .brand-title {
            font-family: 'Orbitron', sans-serif; font-size: 0.9rem;
            letter-spacing: 2px; color: var(--gold); margin: 0;
        }

        /* 2. Main Balance Section: ABP POINTS */
        .vault-hero {
            margin: 25px 20px; padding: 40px 20px;
            background: rgba(255, 255, 255, 0.03); border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3); text-align: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .balance-val {
            font-family: 'Orbitron', sans-serif; font-size: 3.2rem;
            font-weight: 900; margin: 10px 0;
            background: linear-gradient(180deg, #fff, #aaa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .unit-text { font-size: 1rem; color: var(--gold); letter-spacing: 2px; }

        /* 3. Daily Check-in Button */
        .daily-btn {
            background: linear-gradient(45deg, var(--gold), #b8860b);
            color: black; border: none; padding: 15px 30px;
            border-radius: 50px; font-weight: 800; font-size: 0.9rem;
            width: 80%; margin: 0 auto 30px; display: block;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            cursor: pointer; transition: 0.3s;
        }
        .daily-btn:active { transform: scale(0.95); }

        /* 4. Action Grid */
        .grid-actions {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px;
        }

        .tile {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 25px 10px; text-align: center;
        }

        /* 5. Modern Navigation Bar */
        .nav-dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px); border-radius: 100px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex; justify-content: space-around; padding: 12px 5px;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #666; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="universe"></div>

    <header class="header-lux">
        <h1 class="brand-title">ADAMAS PROTOCOL</h1>
        <div id="userAddr" style="font-size: 0.6rem; color: #888;">0x00...000</div>
    </header>

    <section class="vault-hero">
        <p style="font-size: 0.7rem; letter-spacing: 3px; color: #888;">CURRENT ASSETS</p>
        <div class="balance-val" id="balanceDisplay">0.00</div>
        <span class="unit-text">ABP POINTS</span>
    </section>

    <button class="daily-btn" onclick="RewardsModule.claimDailyBonus()">
        ✨ CLAIM DAILY REWARD
    </button>

    <div class="grid-actions">
        <div class="tile" onclick="Notify.show('Hyper-Spin locked', 'info')">
            <span style="font-size: 25px;">🌀</span><br>
            <span style="font-size: 0.7rem; color: var(--gold);">NEON SPIN</span>
        </div>
        <div class="tile" onclick="window.location.href='admin.html'">
            <span style="font-size: 25px;">⚙️</span><br>
            <span style="font-size: 0.7rem; color: var(--gold);">ADMIN</span>
        </div>
    </div>

    <nav class="nav-dock">
        <a href="#" class="nav-item active">
            <span class="nav-icon">🏠</span> Home
        </a>
        <a href="#" class="nav-item" onclick="Notify.show('Games coming soon', 'info')">
            <span class="nav-icon">🎮</span> Games
        </a>
        <a href="#" class="nav-item" onclick="Notify.show('Knowledge Base v1.0', 'info')">
            <span class="nav-icon">📖</span> Learn
        </a>
        <a href="#" class="nav-item" onclick="Notify.show('Referral link copied', 'success')">
            <span class="nav-icon">👥</span> Invite
        </a>
        <a href="#" class="nav-item" onclick="openWallet()">
            <span class="nav-icon">💰</span> Wallet
        </a>
    </nav>

    <script src="js/notify.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/rewards.js"></script>

    <script type="module">
        import { DBModule } from './js/database.js';
        window.addEventListener('DOMContentLoaded', async () => {
            const wallet = localStorage.getItem('userWallet');
            if(wallet) {
                document.getElementById('userAddr').innerText = wallet.substring(0,6) + '...' + wallet.substring(wallet.length-4);
                const data = await DBModule.getUserData(wallet);
                if(data) document.getElementById('balanceDisplay').innerText = data.balance.toLocaleString();
            }
        });

        window.openWallet = () => {
            const bal = document.getElementById('balanceDisplay').innerText;
            Notify.show(`Vault Balance: ${bal} ABP | Status: Eligible`, 'success');
        };
    </script>
</body>
</html>
