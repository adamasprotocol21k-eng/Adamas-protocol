<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Adamas Protocol</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="updateUI()">

    <div class="header" style="padding: 20px; text-align: center;">
        <h2 style="color: var(--neon-blue);">ADAMAS PROTOCOL</h2>
        <small id="walletAddress">Not Connected</small>
    </div>

    <div class="card" style="text-align: center; border: 2px solid var(--neon-blue);">
        <p>Your ABP Balance</p>
        <h1 id="balance" style="font-size: 3rem; margin: 10px 0;">0</h1>
        <button class="btn-neon" onclick="window.location.href='earn.html'">Start Earning</button>
    </div>

    <div class="card" style="background: linear-gradient(45deg, #161b22, #0d1117);">
        <h4>ADS Token Status</h4>
        <p style="font-size: 0.8rem; color: #8b949e;">Fixed Supply: 21,000 ADS</p>
        <div style="width: 100%; background: #30363d; height: 10px; border-radius: 5px; margin-top: 10px;">
            <div style="width: 5%; background: var(--neon-blue); height: 100%; border-radius: 5px;"></div>
        </div>
        <p style="font-size: 0.7rem; margin-top: 5px;">Phase 1: Early Mining Active</p>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="active">🏠<br>Home</a>
        <a href="earn.html">⛏️<br>Earn</a>
        <a href="stake.html">🔐<br>Stake</a>
        <a href="refer.html">👥<br>Refer</a>
        <a href="wallet.html">💰<br>Wallet</a>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
