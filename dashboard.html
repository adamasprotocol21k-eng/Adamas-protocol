<style>
    /* --- ADVANCED GALAXY DOCK --- */
    .galaxy-dock {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        width: 92%;
        max-width: 500px;
        background: rgba(10, 11, 20, 0.8);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 40px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 12px 5px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 
                    inset 0 0 15px rgba(255, 255, 255, 0.05);
        z-index: 9999;
    }

    .dock-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        position: relative;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        min-width: 65px;
    }

    /* Icon Styling */
    .dock-icon {
        font-size: 24px;
        margin-bottom: 5px;
        transition: 0.3s;
        filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
    }

    .dock-label {
        font-size: 0.55rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        transition: 0.3s;
    }

    /* Active & Hover States with Modern Colors */
    .dock-item:hover, .dock-item.active {
        transform: translateY(-10px);
    }

    /* Colors per Button */
    .home-btn:hover, .home-btn.active { color: #00f2ff; }
    .game-btn:hover { color: #ff00ff; }
    .edu-btn:hover { color: #00ff88; }
    .ref-btn:hover { color: #ffcc00; }
    .wallet-btn:hover, .wallet-btn.active { color: #ffffff; }

    /* Airdrop Eligibility Indicator on Wallet Button */
    .eligibility-dot {
        position: absolute;
        top: -2px;
        right: 15px;
        background: #00ff88;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        box-shadow: 0 0 10px #00ff88;
        border: 2px solid #000;
    }

    /* Glow Effect */
    .dock-item.active .dock-icon {
        filter: drop-shadow(0 0 12px currentColor);
    }
</style>

<nav class="galaxy-dock">
    <a href="dashboard.html" class="dock-item home-btn active">
        <span class="dock-icon">🏠</span>
        <span class="dock-label">Home</span>
    </a>

    <a href="#" class="dock-item game-btn" onclick="Notify.show('Hyper-Games Unlocking...', 'info')">
        <span class="dock-icon">🎮</span>
        <span class="dock-label">Games</span>
    </a>

    <a href="#" class="dock-item edu-btn" onclick="Notify.show('Knowledge Base Syncing...', 'info')">
        <span class="dock-icon">📖</span>
        <span class="dock-label">Learn</span>
    </a>

    <a href="#" class="dock-item ref-btn" onclick="Notify.show('Referral Link Copied!', 'success')">
        <span class="dock-icon">👥</span>
        <span class="dock-label">Invite</span>
    </a>

    <a href="#" class="dock-item wallet-btn" onclick="openAirdropModal()">
        <div class="eligibility-dot"></div> <span class="dock-icon">💰</span>
        <span class="dock-label">Wallet</span>
    </a>
</nav>

<script>
    function openAirdropModal() {
        const balance = document.getElementById('balanceDisplay').innerText;
        const eligibility = document.getElementById('eligibilityPerc').innerText;
        
        Notify.show(`Vault Balance: ${balance} ABP | Airdrop: ${eligibility}% Ready`, 'success');
        
        // Yahan aap ek extra modal pop-up bhi dikha sakte hain jo detailed info de
    }
</script>
