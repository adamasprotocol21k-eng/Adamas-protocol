<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Galaxy Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --galaxy-purple: #6a11cb;
            --galaxy-blue: #2575fc;
            --gold-sun: #FFD700;
            --stardust: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0; padding-bottom: 120px;
            background: #020205; /* Space Black */
            color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* --- GALAXY ANIMATED BACKGROUND --- */
        .universe {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -2;
        }

        /* Stars Animation */
        .stars {
            position: fixed; top: 0; left: 0; width: 2px; height: 2px;
            background: white; border-radius: 50%;
            box-shadow: 10vw 20vh white, 50vw 40vh white, 80vw 10vh white, 30vw 70vh white, 90vw 80vh white;
            animation: twinkle 5s infinite linear; z-index: -1;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; }
        }

        /* --- COSMIC CARDS (CHAMAKDAR SECTIONS) --- */
        .cosmic-card {
            margin: 20px; padding: 40px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            text-align: center;
            position: relative;
            box-shadow: 0 0 30px rgba(106, 17, 203, 0.2);
            overflow: hidden;
        }

        /* Moving Nebula Effect inside card */
        .cosmic-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--galaxy-blue), var(--galaxy-purple), transparent);
            animation: rotate-nebula 10s infinite linear; opacity: 0.1; z-index: -1;
        }

        @keyframes rotate-nebula { 100% { transform: rotate(360deg); } }

        .balance-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem; font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--gold-sun));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        /* --- SHINING BUTTONS (GALAXY BUTTONS) --- */
        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }

        .galaxy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 25px 10px;
            text-align: center; transition: 0.3s;
            position: relative; overflow: hidden;
        }

        /* The Shine/Chamki effect */
        .galaxy-btn:hover {
            border-color: var(--gold-sun);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transform: translateY(-5px);
        }

        .galaxy-btn::after {
            content: ''; position: absolute; top: -100%; left: -100%;
            width: 50%; height: 300%; background: rgba(255,255,255,0.2);
            transform: rotate(45deg); transition: 0.5s;
        }
        .galaxy-btn:hover::after { left: 150%; }

        .btn-icon { font-size: 2.2rem; margin-bottom: 10px; display: block; filter: drop-shadow(0 0 5px white); }

        .btn-label { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; letter-spacing: 2px; color: var(--gold-sun); }

        /* --- FLOATING NAV (ASTRO DOCK) --- */
        .astro-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 400px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px); border-radius: 100px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex; justify-content: space-around; padding: 15px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        .nav-item { font-size: 1.5rem; filter: grayscale(1); transition: 0.4s; }
        .nav-item.active { filter: grayscale(0) drop-shadow(0 0 10px var(--gold-sun)); transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="universe"></div>
    <div class="stars"></div>

    <header style="padding: 25px; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-family: 'Orbitron', sans-serif; color: var(--gold-sun); letter-spacing: 2px; font-size: 0.8rem;">
            SYSTEM: ONLINE
        </div>
        <div id="userAddr" style="font-size: 0.7rem; color: #888; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);">
            0x00...0000
        </div>
    </header>

    <section class="cosmic-card">
        <p style="font-size: 0.6rem; letter-spacing: 5px; color: #888; margin-bottom: 10px;">GALAXY ASSETS</p>
        <h1 class="balance-val" id="balanceDisplay">0.00</h1>
        <div style="margin-top: 15px;">
            <span style="border: 1px solid var(--galaxy-blue); padding: 5px 15px; border-radius: 50px; font-size: 0.6rem; color: var(--galaxy-blue); font-weight: 800; box-shadow: 0 0 10px var(--galaxy-blue);">
                AIRDROP READY
            </span>
        </div>
    </section>

    <div class="grid-buttons">
        <div class="galaxy-btn" onclick="RewardsModule.claimDailyBonus()">
            <span class="btn-icon">✨</span>
            <span class="btn-label">CLAIM STAR</span>
        </div>
        <div class="galaxy-btn" onclick="Notify.show('Opening Nebula Portal...', 'info')">
            <span class="btn-icon">🌀</span>
            <span class="btn-label">SPIN VOID</span>
        </div>
        <div class="galaxy-btn" onclick="window.location.href='admin.html'">
            <span class="btn-icon">👑</span>
            <span class="btn-label">GOVERNOR</span>
        </div>
        <div class="galaxy-btn" onclick="Notify.show('Connecting to Nodes...', 'success')">
            <span class="btn-icon">🛰️</span>
            <span class="btn-label">STATIONS</span>
        </div>
    </div>

    <nav class="astro-nav">
        <div class="nav-item active">🏠</div>
        <div class="nav-item" onclick="Notify.show('Coming Soon', 'info')">🎮</div>
        <div class="nav-item" onclick="Notify.show('Vault Locked', 'info')">💎</div>
        <div id="logoutBtn" class="nav-item" onclick="AuthModule.logout()">🔌</div>
    </nav>

    <script src="js/notify.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/rewards.js"></script>
    <script type="module">
        import { DBModule } from './js/database.js';
        window.addEventListener('DOMContentLoaded', async () => {
            const wallet = localStorage.getItem('userWallet');
            if(wallet) {
                document.getElementById('userAddr').innerText = wallet.substring(0,6)+'...'+wallet.substring(wallet.length-4);
                const data = await DBModule.getUserData(wallet);
                if(data) document.getElementById('balanceDisplay').innerText = data.balance;
            }
        });
    </script>
</body>
</html>
