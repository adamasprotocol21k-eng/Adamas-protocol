<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Zone | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .game-list { padding: 20px; display: grid; gap: 15px; margin-top: 10px; }
        .game-card { 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; position: relative; overflow: hidden;
        }
        .game-info h3 { font-size: 1rem; color: var(--primary-neon); margin-bottom: 5px; }
        .game-info p { font-size: 0.7rem; color: #888; }
        .icon-large { font-size: 2.5rem; opacity: 0.8; }
        .badge { 
            position: absolute; top: 10px; right: -20px; background: var(--gold); 
            color: black; font-size: 0.5rem; font-weight: 900; padding: 2px 20px; 
            transform: rotate(45deg); font-family: 'Orbitron';
        }
    </style>
</head>
<body>
    <div class="universe-bg"></div>

    <div style="padding: 20px;">
        <h1 class="title-font gradient-text" style="font-size: 1.5rem; text-align: center;">GAMING SECTOR</h1>
        
        <div class="game-list">
            <div class="glass-card game-card" onclick="window.location.href='mines.html'">
                <div class="game-info">
                    <h3 class="title-font">DIAMOND MINES</h3>
                    <p>Find Diamonds, Avoid Bombs</p>
                </div>
                <div class="icon-large">💎</div>
            </div>

            <div class="glass-card game-card" onclick="LotteryModule.openUI()">
                <div class="game-info">
                    <h3 class="title-font">COSMIC LOTTERY</h3>
                    <p>Jackpot: 5,000 ABP</p>
                </div>
                <div class="icon-large">🎟️</div>
                <div class="badge">HOT</div>
            </div>

            <div class="glass-card game-card" onclick="Notify.show('Syncing Card Deck...', 'info')">
                <div class="game-info">
                    <h3 class="title-font">TEEN PATTI</h3>
                    <p>Multiplayer Battle (Coming)</p>
                </div>
                <div class="icon-large">🃏</div>
            </div>
        </div>
    </div>

    <div id="lotteryModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center;">
        <div class="glass-card" style="width: 90%; max-width: 350px; text-align: center; border-color: var(--gold);">
            <h2 class="title-font" style="color: var(--gold); margin-bottom: 15px;">BUY TICKET</h2>
            <p style="font-size: 0.8rem; margin-bottom: 20px;">1 Ticket = 50 ABP<br><span style="color: #666;">Winner drawn every 24h</span></p>
            <button class="btn-cosmic btn-gold" onclick="LotteryModule.buyTicket()">CONFIRM (50 ABP)</button>
            <button onclick="LotteryModule.closeUI()" style="background:none; border:none; color:white; margin-top:15px; cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <div id="navbar-placeholder"></div>

    <script src="js/notify.js"></script>
    <script src="js/database.js" type="module"></script>
    <script src="js/lottery.js" type="module"></script>
    <script src="js/nav.js"></script>
</body>
</html>
