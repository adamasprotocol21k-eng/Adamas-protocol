<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonus | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="updateUI()">

    <div class="news-ticker">
        <div class="ticker-content">
            🎁 NEW PROMO CODE DROPPED ON TELEGRAM | 💎 REDEEM NOW FOR FREE ABP
        </div>
    </div>

    <div class="header-pro" style="margin-top: 15px;">
        <h2 style="color: var(--binance-yellow);">SECRET REWARDS</h2>
    </div>

    <div class="glass-card" style="text-align: center;">
        <div style="font-size: 5rem;">🎁</div>
        <input type="text" id="promoCode" placeholder="ENTER CODE" style="margin-top: 20px; text-align: center; letter-spacing: 5px;">
        <button class="btn-neon" style="margin-top: 20px;" onclick="unlockBonus()">REDEEM</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="stake.html" class="nav-item"><span>🔐</span>Stake</a>
        <a href="refer.html" class="nav-item"><span>👥</span>Refer</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        function unlockBonus() {
            const code = document.getElementById('promoCode').value.toUpperCase();
            if (code === "ADAMAS500") {
                userStats.balance += 500; saveStats(); updateUI();
                alert("🎉 Success! +500 ABP added.");
            } else { alert("Invalid Code!"); }
        }
    </script>
</body>
</html>
