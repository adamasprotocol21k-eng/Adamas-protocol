<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch & Win | ADAMAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --dark: #05060a;
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; text-align: center;
        }

        .container { padding: 20px; max-width: 400px; margin: auto; }

        /* Scratch Card Box */
        .scratch-card-wrapper {
            position: relative; width: 300px; height: 180px;
            margin: 50px auto; background: #111; border-radius: 15px;
            overflow: hidden; border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .reward-display {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1;
        }

        .reward-amt { font-family: 'Orbitron'; font-size: 2rem; color: var(--gold); }

        canvas#scratchCanvas {
            position: absolute; top: 0; left: 0; z-index: 2; cursor: crosshair;
        }

        .status-msg { margin: 20px 0; font-family: 'Orbitron'; font-size: 0.8rem; color: var(--primary); }

        .btn-retry {
            background: var(--primary); color: black; border: none;
            padding: 12px 30px; border-radius: 50px; font-family: 'Orbitron';
            font-weight: bold; cursor: pointer; display: none;
        }

        .timer { font-size: 0.9rem; color: #ff4444; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="font-family: 'Orbitron';">LUCKY SCRATCH</h2>
        <p style="opacity: 0.6;">Win up to 2,000 ABP Points Daily!</p>

        <div class="scratch-card-wrapper">
            <div class="reward-display">
                <span style="font-size: 0.8rem;">YOU WON</span>
                <div class="reward-amt" id="winAmount">0</div>
                <span style="font-size: 0.8rem;">ABP POINTS</span>
            </div>
            <canvas id="scratchCanvas" width="300" height="180"></canvas>
        </div>

        <div id="status" class="status-msg">Scratch the silver layer!</div>
        
        <div id="lockArea" style="display:none;">
            <div class="timer" id="timer">Next Free: 24h 00m</div>
            <p style="font-size: 0.7rem;">OR</p>
            <button class="btn-retry" id="retryBtn" onclick="payToScratch()">
                RE-SCRATCH FOR <span id="costText">10</span> ABP
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, update, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wallet = "0x6DbC17D9950e0b3A7627ec6bFc6b210A998da690";
        const userPath = 'users/' + wallet.substring(0, 10);

        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        let isScratched = false;
        let currentBalance = 0;
        let nextRetryCost = 10;

        // Canvas Setup (Silver Layer)
        function setupCanvas() {
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 20px Orbitron';
            ctx.fillStyle = '#888';
            ctx.fillText('SCRATCH HERE', 60, 100);
            isScratched = false;
        }

        // Scratch Logic
        function scratch(e) {
            if (isScratched) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.pageX || e.touches[0].pageX) - rect.left;
            const y = (e.pageY || e.touches[0].pageY) - rect.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fill();

            // Check how much is scratched
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let clearPixels = 0;
            for (let i = 0; i < data.length; i += 4) {
                if (data[i + 3] === 0) clearPixels++;
            }

            if (clearPixels > (data.length / 4) * 0.5) {
                revealReward();
            }
        }

        async function revealReward() {
            if (isScratched) return;
            isScratched = true;
            canvas.style.display = 'none';
            
            const win = Math.floor(Math.random() * (2000 - 1000 + 1)) + 1000;
            document.getElementById('winAmount').innerText = win.toLocaleString();
            
            currentBalance += win;
            
            // Save to Firebase
            await update(ref(db, userPath), {
                currentBalance: currentBalance,
                lastScratchTime: Date.now(),
                nextRetryCost: nextRetryCost + 10 // Agli baar ke liye price badha do
            });

            document.getElementById('status').innerText = "SUCCESS! POINTS ADDED.";
            checkLock();
        }

        async function checkLock() {
            const snap = await get(ref(db, userPath));
            if (snap.exists()) {
                const data = snap.val();
                currentBalance = data.currentBalance || 0;
                nextRetryCost = data.nextRetryCost || 10;
                const lastTime = data.lastScratchTime || 0;
                const now = Date.now();
                const diff = now - lastTime;

                if (diff < 24 * 60 * 60 * 1000) {
                    document.getElementById('lockArea').style.display = 'block';
                    document.getElementById('retryBtn').style.display = 'inline-block';
                    document.getElementById('costText').innerText = nextRetryCost;
                    startTimer(24 * 60 * 60 * 1000 - diff);
                } else {
                    document.getElementById('lockArea').style.display = 'none';
                    canvas.style.display = 'block';
                    setupCanvas();
                    // Reset cost if 24h passed
                    await update(ref(db, userPath), { nextRetryCost: 10 });
                }
            }
        }

        window.payToScratch = async () => {
            if (currentBalance < nextRetryCost) return alert("Paisa nahi hai bhai!");
            
            currentBalance -= nextRetryCost;
            await update(ref(db, userPath), { currentBalance: currentBalance });
            
            // Reset UI for new scratch
            document.getElementById('lockArea').style.display = 'none';
            canvas.style.display = 'block';
            setupCanvas();
            document.getElementById('status').innerText = "Scratch again!";
        };

        function startTimer(ms) {
            const countdown = setInterval(() => {
                ms -= 1000;
                let h = Math.floor(ms / 3600000);
                let m = Math.floor((ms % 3600000) / 60000);
                document.getElementById('timer').innerText = `Next Free: ${h}h ${m}m`;
                if (ms <= 0) {
                    clearInterval(countdown);
                    checkLock();
                }
            }, 1000);
        }

        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', scratch);
        window.onload = () => {
            setupCanvas();
            checkLock();
        };
    </script>
</body>
</html>
